    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function startTest() {
        shuffle(questionPool);
        selectedQuestions = questionPool.slice(0, 5); 
        selectedQuestions.forEach(q => shuffle(q.options));
        document.getElementById('start-area').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        showQuestion();
    }

        container.innerHTML = "";
        currentData.options.forEach(opt => {
            let btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt.text;
            btn.onclick = () => nextQuestion(opt.points);
            container.appendChild(btn);
        });
    }

    function nextQuestion(points) {
        for (let key in points) {
            scores[key] += points[key];
        }
        currentQ++;
        if (currentQ < selectedQuestions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        
        let mbti = "";
        mbti += (scores.E >= scores.I) ? "E" : "I";
        mbti += (scores.S >= scores.N) ? "S" : "N";
        mbti += (scores.T >= scores.F) ? "T" : "F";
        mbti += (scores.J >= scores.P) ? "J" : "P";

        let resultData = resultsMapping[mbti];
        let totalObsess = Math.min(100, Math.round(scores.Obsess / 5 * 2)); // 보정

        // 컨페티 (핑크/레드)
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#ff007f', '#ff40ac', '#ffffff'] });

        document.getElementById('res-score').innerText = resultData.score + "%";
        document.getElementById('res-name').innerText = resultData.emoji + " " + resultData.name;
        document.getElementById('res-desc').innerHTML = resultData.desc;
    }
</script>
</body>
</html>
