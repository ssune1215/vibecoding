<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메뉴 이상형 월드컵 | 오늘 뭐 먹지? 16강전 🍱</title>
    
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="오늘의 점심 메뉴 최강자전 🍱🏆" />
    <meta property="og:description" content="결정 장애는 이제 그만! 16강 월드컵으로 오늘 최고의 메뉴를 골라보세요." />
    <meta property="og:url" content="./" />
    <meta property="og:image" content="../assets/share-thumb.jpg" />

    <link rel="stylesheet" href="../assets/vibe-theme.css">
    <style>
        :root {
            --title-color: #334155;
            --secondary-color: #94a3b8;
        }

        body {
            background-color: #f8fafc;
            color: #1e293b;
            min-height: 100vh;
        }

        .worldcup-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }

        .header {
            margin-bottom: 30px;
        }

        .round-info {
            background: #fff;
            display: inline-block;
            padding: 6px 16px;
            border-radius: 50px;
            font-weight: 800;
            color: var(--main-color);
            border: 2px solid var(--border-color);
            margin-bottom: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* Matchup Area */
        .match-area {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 10px;
        }

        .food-card {
            flex: 1;
            background: #fff;
            border: 3px solid transparent;
            border-radius: 24px;
            padding: 40px 20px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }

        .food-card:hover {
            transform: translateY(-5px);
            border-color: var(--main-color);
            box-shadow: 0 15px 30px rgba(255, 143, 163, 0.2);
        }

        .food-card:active {
            transform: scale(0.96);
        }

        .food-emoji {
            font-size: 80px;
            margin-bottom: 15px;
            z-index: 1;
        }

        .food-name {
            font-size: 24px;
            font-weight: 900;
            color: #1e293b;
            margin: 0;
            z-index: 1;
        }

        .vs-badge {
            font-weight: 900;
            font-size: 20px;
            color: #cbd5e1;
            margin: 5px 0;
        }

        /* Result Area */
        #result-area {
            display: none;
        }

        .winner-card {
            background: #fff;
            border: 4px solid var(--main-color);
            border-radius: 32px;
            padding: 50px 30px;
            box-shadow: 0 20px 40px rgba(255, 143, 163, 0.2);
            margin-top: 20px;
            animation: bounceIn 0.8s;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }
        }

        .winner-label {
            color: var(--main-color);
            font-weight: 800;
            font-size: 14px;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .action-btns {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-blog {
            background-color: #22c55e;
            color: #fff;
            padding: 18px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 800;
            font-size: 16px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-retry {
            background-color: #e2e8f0;
            color: #475569;
            padding: 18px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 800;
            font-size: 16px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        /* Responsive */
        @media (min-width: 500px) {
            .match-area {
                flex-direction: row;
                height: 450px;
            }
            .vs-badge {
                display: flex;
                align-items: center;
                margin: 0 10px;
            }
        }
    </style>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
</head>
<body>

<div class="worldcup-container">
    <!-- Start View -->
    <div id="start-area" class="card" style="padding: 40px 20px;">
        <div style="font-size: 60px; margin-bottom: 20px;">🍱🏆</div>
        <h1 class="title">오늘의 점심 메뉴<br>이상형 월드컵 (16강)</h1>
        <p class="description">더 이상의 결정 장애는 거부한다!<br>토너먼트를 통해 오늘 운명의 메뉴를 골라보세요.</p>
        <button class="btn-start" onclick="startGame()">월드컵 시작하기 🔥</button>
    </div>

    <!-- Quiz View -->
    <div id="quiz-area" style="display: none;">
        <div class="header">
            <div class="round-info" id="round-text">16강전</div>
            <div id="current-progress" style="font-size: 14px; color: var(--secondary-color); font-weight: 700;">1 / 8</div>
        </div>

        <div class="match-area">
            <div class="food-card" id="left-card" onclick="pick('left')">
                <div class="food-emoji" id="left-emoji">🍱</div>
                <div class="food-name" id="left-name">메뉴 이름</div>
            </div>
            <div class="vs-badge">VS</div>
            <div class="food-card" id="right-card" onclick="pick('right')">
                <div class="food-emoji" id="right-emoji">🍙</div>
                <div class="food-name" id="right-name">메뉴 이름</div>
            </div>
        </div>
    </div>

    <!-- Result View -->
    <div id="result-area">
        <div class="winner-card">
            <div class="winner-label">✨ 당신의 최종 우승 메뉴 ✨</div>
            <div id="winner-emoji" style="font-size: 100px; margin: 20px 0;">🍗</div>
            <h2 id="winner-name" style="font-size: 32px; font-weight: 900; margin-bottom: 10px;">치킨</h2>
            <p id="winner-desc" style="color: #64748b; font-weight: 700;">오늘 당신에게 가장 완벽한 한 끼입니다!</p>
        </div>

        <div class="action-btns">
            <button class="btn-kakao" id="kakao-share" style="background-color: #fde047; color: #451a03; padding: 18px; border-radius: 16px; border: none; font-weight: 800; cursor: pointer;">
                내 점심 메뉴 친구한테 말하기 💬
            </button>
            <a href="https://blog.naver.com/forgiven_77/224219719421" target="_blank" class="btn-blog">
                👉 다른 테스트&운세 더 보기
            </a>
            <button class="btn-retry" onclick="location.reload()">🔄 다시 하기 (새 목록)</button>
        </div>
    </div>
</div>

<script>
    // 음식 데이터셋 (32종)
    const FOODS_POOL = [
        { name: "김치찌개", emoji: "🥘", color: "#fef2f2" },
        { name: "제육볶음", emoji: "🥓", color: "#fff1f0" },
        { name: "돈까스", emoji: "🍱", color: "#fffbeb" },
        { name: "짜장면", emoji: "🥣", color: "#f8fafc" },
        { name: "짬뽕", emoji: "🍜", color: "#fef2f2" },
        { name: "삼겹살", emoji: "🥓", color: "#fff1f2" },
        { name: "치킨", emoji: "🍗", color: "#fff7ed" },
        { name: "피자", emoji: "🍕", color: "#fef2f2" },
        { name: "햄버거", emoji: "🍔", color: "#fffbeb" },
        { name: "비빔밥", emoji: "🥗", color: "#f0fdf4" },
        { name: "쌀국수", emoji: "🍜", color: "#ecfdf5" },
        { name: "마라탕", emoji: "🌶️", color: "#fff1f0" },
        { name: "초밥", emoji: "🍣", color: "#f0f9ff" },
        { name: "떡볶이", emoji: "🥘", color: "#fff1f0" },
        { name: "국밥", emoji: "🥣", color: "#f8fafc" },
        { name: "된장찌개", emoji: "🍲", color: "#fff7ed" }
    ];

    let currentCandidates = [];
    let nextCandidates = [];
    let roundLevel = 16;
    let matchIndex = 0;

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function startGame() {
        // 대중적인 16개 메뉴를 랜덤하게 섞어서 시작
        currentCandidates = shuffle([...FOODS_POOL]);
        
        document.getElementById('start-area').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        updateMatch();
    }

    function updateMatch() {
        // 라운드 이름 표시
        let roundName = roundLevel === 2 ? "결승전 🏆" : (roundLevel === 4 ? "준결승 4강전" : `${roundLevel}강전`);
        document.getElementById('round-text').innerText = roundName;
        
        // 현재 진행도
        document.getElementById('current-progress').innerText = `${matchIndex + 1} / ${roundLevel / 2}`;

        const left = currentCandidates[matchIndex * 2];
        const right = currentCandidates[matchIndex * 2 + 1];

        // 이미지 및 배경색 적용
        const lCard = document.getElementById('left-card');
        const rCard = document.getElementById('right-card');
        
        document.getElementById('left-emoji').innerText = left.emoji;
        document.getElementById('left-name').innerText = left.name;
        lCard.style.backgroundColor = left.color;

        document.getElementById('right-emoji').innerText = right.emoji;
        document.getElementById('right-name').innerText = right.name;
        rCard.style.backgroundColor = right.color;

        // 애니메이션 효과
        lCard.classList.remove('fade-in');
        rCard.classList.remove('fade-in');
        void lCard.offsetWidth; // reflow
        lCard.classList.add('fade-in');
        rCard.classList.add('fade-in');
    }

    function pick(side) {
        const winner = side === 'left' ? currentCandidates[matchIndex * 2] : currentCandidates[matchIndex * 2 + 1];
        nextCandidates.push(winner);
        matchIndex++;

        if (matchIndex >= roundLevel / 2) {
            // 이번 라운드 종료
            if (nextCandidates.length === 1) {
                showResult(nextCandidates[0]);
            } else {
                currentCandidates = [...nextCandidates];
                nextCandidates = [];
                roundLevel = roundLevel / 2;
                matchIndex = 0;
                setTimeout(updateMatch, 300);
            }
        } else {
            setTimeout(updateMatch, 300);
        }
    }

    function showResult(winner) {
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';

        document.getElementById('winner-emoji').innerText = winner.emoji;
        document.getElementById('winner-name').innerText = winner.name;

        // 컨페티 효과
        confetti({
            particleCount: 150,
            spread: 70,
            origin: { y: 0.6 },
            colors: ['#ff8fa3', '#ffb3c1', '#f8fafc', '#fbbf24']
        });

        // 카카오 공유 설정 (제목에 우승 메뉴 포함)
        if (window.Kakao && Kakao.isInitialized()) {
            Kakao.Share.createDefaultButton({
                container: '#kakao-share',
                objectType: 'feed',
                content: {
                    title: `나의 오늘 운명의 점심 메뉴는 [${winner.name}]!`,
                    description: '결정 장애 해결! 당신도 오늘 점심 메뉴를 월드컵으로 골라보세요.',
                    imageUrl: 'https://ssune1215.github.io/vibecoding/assets/share-thumb.jpg',
                    link: {
                        mobileWebUrl: window.location.href,
                        webUrl: window.location.href,
                    },
                },
                buttons: [
                    {
                        title: '나도 해보기',
                        link: {
                            mobileWebUrl: window.location.href,
                            webUrl: window.location.href,
                        },
                    },
                ],
            });
        }
    }
</script>

</body>
</html>
