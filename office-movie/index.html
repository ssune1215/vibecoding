<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사회생활 생존기 | 내 직장생활은 어떤 영화일까? 💼</title>
    
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="나의 사회생활, 영화로 만든다면 어떤 장르일까? 💼🎬" />
    <meta property="og:description" content="악마는 프라다를 입는다부터 해리포터 생존기까지! 오피스 속 나의 생존 본능 100% 매칭" />
    <meta property="og:url" content="./" />
    <meta property="og:image" content="../assets/share-thumb.jpg" />

    <link rel="stylesheet" href="../assets/vibe-theme.css">
    <style>
        :root {
            /* 오피스/빌딩을 상징하는 시크한 네이비/골드 톤 */
            --main-color: #1e3a8a; /* 딥 네이비 */
            --bg-light: #f0fdf4; /* 아주 밝은 민트톤/화이트 */
            --border-color: #bfdbfe;
            --btn-hover-shadow: rgba(30, 58, 138, 0.2);
        }
        
        body, .result-image, .option-btn, .result-title, .title, .btn-start {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", sans-serif !important;
        }
    </style>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="../assets/kakao-share.js" defer></script>
</head>
<body style="background-color: #f8fafc;">

<div class="card" style="box-shadow: 0 10px 25px rgba(30, 58, 138, 0.1);">
    <div id="start-area">
        <div class="result-image">💼🏢</div>
        <h1 class="title">나의 사회생활<br>생존 무비 시상식</h1>
        <p class="description">환장할 노릇인 직장과 인간관계 속에서<br>나는 어떤 장르의 영화를 찍고 있을까요?</p>
        <button class="btn-start" onclick="startTest()">출근표 끊기 🎟️</button>
    </div>

    <div id="quiz-area" style="display: none;">
        <div class="progress-bar"><div class="progress" id="progress" style="background-color: var(--main-color);"></div></div>
        <div id="q-number" class="tiny" style="margin-bottom: 10px; font-weight:700; color: #1e3a8a;">씬 1 / 5</div>
        <div class="title" id="question-text" style="font-size: 19px; line-height: 1.4;">대본 분석 중...</div>
        <div id="options-container"></div>
    </div>

    <div id="result-area" style="display: none;">
        <div class="tiny" style="font-weight: 700; color: #1e3a8a;">✨ 컷 컷! 당신이 찍고 있는 영화는...</div>
        <div id="res-image" class="result-image" style="font-size: 50px; margin-top: 15px;">🎬</div>
        <div id="res-name" class="result-title" style="margin-top: 5px; color: #1e3a8a; font-size: 24px;">결과 이름</div>
        
        <div class="result-box" style="border: 2px solid #3b82f6; background-color: white;">
            <span class="result-box-title" style="background-color: #1e3a8a; color: white;">📝 캐릭터 분석 리포트</span>
            <div id="res-desc" class="result-desc" style="color: #1e293b;">결과 분석 내용이 여기에 표시됩니다.</div>
        </div>

        <div class="action-btns">
            <button class="btn-kakao" style="background-color: #fde047; color: #451a03; border: 1px solid #facc15;">
                <img src="https://developers.kakao.com/assets/img/about/logos/kakaotalksharing/kakaotalk_sharing_btn_medium.png" width="20">
                내 오피스 무비 카톡 공유하기
            </button>
            <a href="https://blog.naver.com/forgiven_77/224198478277" target="_blank" class="btn-blog" style="background-color: #dbeafe; color: #1e3a8a;">
                👀 다른 테스트 구경 가기
            </a>
            <button class="btn-retry" onclick="location.reload()" style="background-color: #1e3a8a; color: white;">🔄 다른 회사로 이직하기 (다시하기)</button>
        </div>
    </div>
</div>

<script>
    let currentQ = 0;
    let score = 0;

    const questions = [
        {
            q: "🏢 출근 첫날, 낯선 환경에 뚝 떨어졌다! 나의 생존 전략은?",
            options: [
                { text: "제발 아무 일도 없기를 속으로 비는 [투명인간]", point: 1 },
                { text: "조용히 눈치 보며 분위기 파악하는 [관찰자]", point: 2 },
                { text: "먼저 인사하며 두루두루 친해지는 [인싸]", point: 3 },
                { text: "첫날부터 업무 프로세스 스캔하는 [능률 기획자]", point: 4 }
            ]
        },
        {
            q: "🔥 중요한 프로젝트 중 상사 폭발 직전! 대형 사고가 터졌다!",
            options: [
                { text: "속으로 내 책임이 아님을 증명할 증거물부터 탐색", point: 1 },
                { text: "멘탈 붕괴! 스스로 자책하거나 어찌할 줄 모름", point: 2 },
                { text: "어떻게든 됨! 화려한 말빨과 인맥으로 무마 시도", point: 3 },
                { text: "천불이 끓지만 일단 내가 총대 메고 해결부터", point: 4 }
            ]
        },
        {
            q: "🍱 뼈 빠지는 오전 노동 끝, 꿀맛 같은 점심시간!",
            options: [
                { text: "조용한 곳에서 유튜브 보며 나 홀로 침묵 충전", point: 1 },
                { text: "빨리 밥 박살내고 동료들과 티타임 폭풍 수다 힐링", point: 2 },
                { text: "오전부터 고민한 가장 맛있는 메뉴로 미각 타임", point: 3 },
                { text: "샌드위치 대충 때우며 남은 오후 업무 시뮬레이션", point: 4 }
            ]
        },
        {
            q: "😤 말이 안 통하는 빌런 상사가 억럭 지시를 내렸을 때?",
            options: [
                { text: "맑은 눈으로 대답만 잘해놓고 내 맘대로 적당히 함", point: 1 },
                { text: "기분 상하지 않게 능구렁이처럼 부드럽게 빠져나감", point: 2 },
                { text: "그건 이런 문제가 있다며 논리와 팩트로 반박함", point: 3 },
                { text: "짜증 나지만 꾹 누르고 시키는 대로 완벽히 해냄", point: 4 }
            ]
        },
        {
            q: "🌃 피곤한 하루를 마치고 퇴근하는 길, 머릿속엔?",
            options: [
                { text: "로또 1등 되면 당장 퇴사다... 끝없는 현실 도피", point: 1 },
                { text: "오늘 대화에서 실수한 건 없나? 내내 감정 곱씹기", point: 2 },
                { text: "집 가서 유튜브 맥주! 회사 스위치 완벽히 OFF", point: 3 },
                { text: "아씨, 내일 아침 출근하면 이 업무부터 쳐내야지", point: 4 }
            ]
        }
    ];

    const results = [
        { min: 5, max: 7, name: "[해리 포터]\n고통받는 불행의 소년가장", img: "🧙‍♂️⚡", desc: "분명 나는 가만히 평화롭게 지내고 싶었는데, 주변 빌런들이 매번 대형 사고를 치고 왜인지 네가 그 수습을 다 떠맡고 있네요. 불행과 피로는 나의 몫. 속으로는 매일 퇴사와 도망을 100번씩 꿈꾸는 짠내 나는 마법사 생존기를 찍고 있습니다." },
        { min: 8, max: 10, name: "[월터의 상상은 현실이 된다]\n일탈을 꿈꾸는 몽상가", img: "🏔️🛹", desc: "겉보기엔 온순하고 시키는 일 잘하는 평범한 직원인 척 다 하고 있지만, 속마음엔 엄청난 똘기와 일탈의 욕구가 부글부글 끓고 있습니다. 로또만 되어봐라! 언젠가 시원하게 사표를 집어 던지고 나만의 자유를 진짜로 만끽할 자유로운 영혼입니다." },
        { min: 11, max: 13, name: "[인턴]\n무던하고 평화로운 유지군", img: "☕👔", desc: "어떤 또라이나 진상 상사를 만나도 허허 웃어넘기는 강력한 해탈과 무던함 멘탈 장착! 내 일은 묵묵하게 해내면서 남들에게 적도 만들지 않는 사회생활 짬바이브가 장난 아닙니다. 주변 팀원들에겐 언제나 안정감을 주는 소중한 동료네요." },
        { min: 14, max: 15, name: "[캐치 미 이프 유 캔]\n입으로 때우는 임기응변 사기캐", img: "✈️🕶️", desc: "실무 능력도 나쁘지 않지만 그보다 센스와 눈치, 화려한 언변이 모든 것을 지배합니다! 예측하지 못한 엄청난 위기가 닥쳐와도 특유의 '아가리 파이터' 기질과 임기응변으로 요리조리 미꾸라지처럼 다 빠져나가는 천재적인 오피스 생명력을 지녔습니다." },
        { min: 16, max: 17, name: "[극한직업]\n웃음 가득 실속 챙기는 꿀러", img: "🍗🚔", desc: "동료들과 함께 수다 떨고 회식하며 맛있는 거 먹는 낙으로 회사를 버팁니다! 어딘가 은은하게 개그 욕심이 넘치고, 적당한 똘기가 섞여 있지만 일할 때는 또 기가 막힌 실속파 팀워크를 보여줍니다. 회사에 없으면 가장 아쉬운 존재!" },
        { min: 18, max: 19, name: "[존 윅]\n건드리면 끝장내는 팩폭러", img: "✏️🐕", desc: "평소엔 조용히 내 할 일만 칼같이 끝내지만, 굳이 내 구역을 침범하거나 내게 일을 무논리로 떠넘기는 사람이 있다면 자비는 없습니다. 빙빙 돌려 말하지 않고 날카로운 논리와 팩트 체크 코멘트로 상대방을 은은하고 치명적으로 묵살해 버리는 킬러!" },
        { min: 20, max: 20, name: "[악마는 프라다를 입는다]\n능력 만렙 워커홀릭 리더", img: "👠📱", desc: "일 못하는 동료나 답답한 핑계를 대는 건 도저히 못 참습니다. 완벽주의와 칼 같은 스케줄 관리! 이왕 하는 거 남들 멱살 쥐고서 하드캐리 해버리는 성격. 자비 없는 업무 텐션으로 모두를 두려움에 떨게 하지만, 능력만큼은 누구도 부정 못 할 진짜 괴물이네요." }
    ];

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function startTest() {
        shuffle(questions);
        questions.forEach(q => shuffle(q.options));
        document.getElementById('start-area').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        let percent = (currentQ / questions.length) * 100;
        document.getElementById('progress').style.width = percent + '%';
        document.getElementById('q-number').innerText = `씬 ${currentQ + 1} / ${questions.length}`;
        let currentData = questions[currentQ];
        document.getElementById('question-text').innerText = currentData.q;
        let container = document.getElementById('options-container');
        container.innerHTML = "";
        currentData.options.forEach(opt => {
            let btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt.text;
            btn.onclick = () => nextQuestion(opt.point);
            container.appendChild(btn);
        });
    }

    function nextQuestion(point) {
        score += point;
        currentQ++;
        if (currentQ < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        
        // 오피스 테마 컨페티 (네이비 골드 블루)
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#1e3a8a', '#facc15', '#3b82f6', '#cbd5e1'] });
        
        let resultData = results.find(r => score >= r.min && score <= r.max);
        if(!resultData) resultData = results[results.length - 1];

        document.getElementById('res-image').innerText = resultData.img;
        document.getElementById('res-name').innerHTML = resultData.name.replace('\n', '<br>');
        document.getElementById('res-desc').innerHTML = resultData.desc;
    }
</script>
</body>
</html>
