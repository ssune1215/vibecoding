<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연애 세포 생존율 테스트 | 내 세포들은 아직 살아있을까? 🦠</title>
    
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="나의 연애 세포 생존율 테스트!" />
    <meta property="og:description" content="겨울잠? 화석? 아니면 폭주 중? 팩폭 주의 연애 세포 정밀 검사!" />
    <meta property="og:url" content="./" />
    <meta property="og:image" content="../assets/share-thumb.jpg" />

    <link rel="stylesheet" href="../assets/vibe-theme.css">
    <style>
        :root {
            --main-color: #f59e0b; /* 앰버/옐로우 */
            --bg-light: #fffbeb;
            --border-color: #fcd34d;
            --btn-hover-shadow: rgba(245, 158, 11, 0.2);
        }
    </style>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="../assets/kakao-share.js" defer></script>
</head>
<body>

<div class="card">
    <div id="start-area">
        <div class="result-image">🦠💤</div>
        <h1 class="title">팩폭 주의!<br>연애 세포 생존율 테스트</h1>
        <p class="description">내 안의 연애 세포는 혹시 화석이 된 건 아닐까?<br>지금 바로 당신의 연애 세포 상태를 진단해 보세요!</p>
        <button class="btn-start" onclick="startTest()">세포 부검 시작하기 🔍</button>
    </div>

    <div id="quiz-area" style="display: none;">
        <div class="progress-bar"><div class="progress" id="progress"></div></div>
        <div id="q-number" class="tiny" style="margin-bottom: 10px; font-weight:700;">Question 1 / 5</div>
        <div class="title" id="question-text" style="font-size: 19px; line-height: 1.4;">세포 반응 검사 중...</div>
        <div id="options-container"></div>
    </div>

    <div id="result-area" style="display: none;">
        <div class="tiny" style="font-weight: 700; color: #f59e0b;">진단 결과 보고서</div>
        <div id="res-image" class="result-image">🔬</div>
        <div id="res-name" class="result-title">결과 이름</div>
        
        <div class="result-box">
            <span class="result-box-title">📋 전문 세포 분석</span>
            <div id="res-desc" class="result-desc">결과 분석 내용이 여기에 표시됩니다.</div>
        </div>

        <div class="action-btns">
            <button class="btn-kakao">
                <img src="https://developers.kakao.com/assets/img/about/logos/kakaotalksharing/kakaotalk_sharing_btn_medium.png" width="20">
                내 결과 카톡 공유하기
            </button>
            <a href="https://blog.naver.com/forgiven_77/224198478277" target="_blank" class="btn-blog">
                👀 다른 테스트 구경 가기
            </a>
            <button class="btn-retry" onclick="location.reload()">🔄 다시 검사하기</button>
        </div>
    </div>
</div>

<script>
    let currentQ = 0;
    let score = 0;

    const questions = [
        {
            q: "주말 저녁, 갑자기 '오늘 뭐해? 나올래?' 라는 카톡이 온다면?",
            options: [
                { text: "아 귀찮아... 이미 씻었는데 그냥 안 나간다고 한다.", point: 1 },
                { text: "상대가 누구냐에 따라 다르지만 일단 누워있는다.", point: 2 },
                { text: "거울부터 보며 나갈 핑계를 찾고 설레기 시작한다.", point: 4 },
                { text: "어장관리인지 촉을 먼저 세우고 철벽을 준비한다.", point: 3 }
            ]
        },
        {
            q: "길을 걷다 우연히 내 이상형을 마주쳤을 때 당신의 본능은?",
            options: [
                { text: "그냥 눈으로만 감상하고 조용히 10초 컷으로 잊는다.", point: 1 },
                { text: "곁눈질로 훔쳐보다가 혼자 상상의 나래만 펼친다.", point: 3 },
                { text: "번호를 딸까 말까 오조오억 번 고민하다가 포기한다.", point: 2 },
                { text: "운명이다 싶어 앞뒤 안 재고 당장 다가가서 말을 건다.", point: 4 }
            ]
        },
        {
            q: "최근 들어 당신의 플레이리스트와 유튜브 알고리즘 상태는?",
            options: [
                { text: "오로지 먹방, 예능, 게임 등 로맨스와 담쌓은 상태.", point: 1 },
                { text: "어쩌다 한 번 로맨스 영화를 보면 대리 설렘을 느낀다.", point: 2 },
                { text: "이별 노래나 짝사랑 노래를 들으며 혼자 감성에 젖는다.", point: 3 },
                { text: "달달한 연애 정보나 연애 리얼리티 프로를 섭렵 중이다.", point: 4 }
            ]
        },
        {
            q: "소개팅이 잡혔습니다! 전날 밤 당신의 심리 상태는?",
            options: [
                { text: "'아 내일 나가기 귀찮다. 그냥 파투 났으면 좋겠다.'", point: 1 },
                { text: "'옷 뭐 입지? 상대가 별로면 어쩌지?' 걱정이 태산이다.", point: 3 },
                { text: "'제발 이번엔 괜찮은 사람이길!' 소소한 희망을 품는다.", point: 2 },
                { text: "'내 매력을 어떻게 발산할까?' 완벽한 질문 리스트를 짠다.", point: 4 }
            ]
        },
        {
            q: "상대방이 당신에게 '너 참 괜찮은 사람인 것 같아'라고 칭찬한다면?",
            options: [
                { text: "'나한테 돈 빌리려고 그러나?' 극강의 경계 모드 발동.", point: 3 },
                { text: "'이 사람 혹시 나 좋아하나?' 0.1초 만에 손주까지 상상.", point: 4 },
                { text: "'ㅎ 빈말 땡큐구리' 타격감 제로, 영혼 없는 대답.", point: 1 },
                { text: "기분은 좋지만 속으로만 삼키고 티 내지 않으려 애쓴다.", point: 2 }
            ]
        }
    ];

    const results = [
        { min: 5, max: 6, name: "삐빅- 사망입니다.\n[연애 세포 화석화]", img: "🪨🦴", desc: "심각합니다. 심장에 거미줄이 쳤군요! 귀찮음이 연애 세포를 압도하여 완전히 화석이 되어버린 상태입니다. 혼자가 제일 재미있는 진정한 자발적 고독 마스터입니다." },
        { min: 7, max: 8, name: "Zzz... 깨우지 마세요\n[기면증 세포]", img: "🛌💤", desc: "연애 세포들이 집단 겨울잠에 빠졌습니다! 연애를 하고 싶은 생각은 아주 가~끔 들지만, 막상 기회가 오면 이불 밖으로 나가기 귀찮아하는 심각한 만성 피로 상태네요." },
        { min: 9, max: 10, name: "배고프고 외로운\n[좀비 세포]", img: "🧟‍♂️🍖", desc: "외로움에 굶주려 있지만 막상 썸을 시작할 기력은 없는 상태! 연애 콘텐츠를 보며 대리 만족만 하거나, 영혼 없이 소개팅을 나가는 슬픈 반송장 영혼입니다." },
        { min: 11, max: 12, name: "평온을 깨지 마\n[평화주의자 세포]", img: "🕊️🍵", desc: "불타는 사랑보다는 내 인생의 평화가 우선인 타입! 연애 세포가 살아있긴 하지만, 상처받거나 스트레스받는 상황을 극도로 꺼려하여 조심성이 매우 많습니다." },
        { min: 13, max: 14, name: "바늘 하나 안 들어가는\n[철벽 방패 세포]", img: "🛡️🚧", desc: "다가오는 사람도 쳐내는 극강의 빗장 수비수! 의심이 많고 낯가림이 심해 상대를 철저히 검증하려고 합니다. 세포는 살아있으나 두꺼운 방탄복을 입고 있네요!" },
        { min: 15, max: 16, name: "눈치는 백단 팩트는 쫄보\n[스나이퍼 세포]", img: "🎯👀", desc: "멀리서 지켜보기만 하는 짝사랑 전문! 상대의 마음결을 읽어내는 분석력은 훌륭하지만 막상 다가갈 용기는 부족해서 혼자 애만 태우는 억울한 세포입니다." },
        { min: 17, max: 18, name: "시속 200km 호감도 급상승\n[금사빠 치타 세포]", img: "🐆💘", desc: "작은 친절 하나에도 심장이 나대기 시작합니다! 연애 세포가 과도하게 활성화되어 있어 0.1초 만에 결혼식장 입장까지 상상하는 폭주 기관차 같은 매력이 있네요." },
        { min: 19, max: 20, name: "열정 과다 핫 보이/걸\n[불타는 용광로 세포]", img: "🌋🔥", desc: "연애 세포 전투력 9999%! 맘에 드는 사람이 나타나면 물불 가리지 않고 덤벼드는 엄청난 행동파입니다. 당신의 들이대는 에너지에 상대방이 화상을 입을 수도 있겠어요!" }
    ];

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function startTest() {
        shuffle(questions);
        questions.forEach(q => shuffle(q.options));
        document.getElementById('start-area').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        let percent = (currentQ / questions.length) * 100;
        document.getElementById('progress').style.width = percent + '%';
        document.getElementById('q-number').innerText = `Question ${currentQ + 1} / ${questions.length}`;
        let currentData = questions[currentQ];
        document.getElementById('question-text').innerText = currentData.q;
        let container = document.getElementById('options-container');
        container.innerHTML = "";
        currentData.options.forEach(opt => {
            let btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt.text;
            btn.onclick = () => nextQuestion(opt.point);
            container.appendChild(btn);
        });
    }

    function nextQuestion(point) {
        score += point;
        currentQ++;
        if (currentQ < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        
        let resultData = results.find(r => score >= r.min && score <= r.max);
        if(!resultData) resultData = results[results.length - 1];

        document.getElementById('res-image').innerText = resultData.img;
        document.getElementById('res-name').innerHTML = resultData.name.replace('\n', '<br>');
        document.getElementById('res-desc').innerHTML = resultData.desc;
    }
</script>
</body>
</html>
