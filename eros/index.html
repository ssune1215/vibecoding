<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>음란마귀 테스트 | 내 안의 숨겨진 에로스 지수는? 😏</title>
    
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="음란마귀 테스트 | 나의 에로 등급은?" />
    <meta property="og:description" content="아슬아슬 묘한 상상력의 영역... 당신의 본능을 정밀하게 측정해드립니다." />
    <meta property="og:url" content="./" />
    <meta property="og:image" content="../assets/share-thumb.jpg" />

    <link rel="stylesheet" href="../assets/vibe-theme.css">
    <style>
        :root {
            --main-color: #9f1239; /* 로즈/크림슨 */
            --bg-light: #fff1f2;
            --border-color: #fecdd3;
            --btn-hover-shadow: rgba(159, 18, 57, 0.2);
        }
    </style>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="../assets/kakao-share.js" defer></script>
</head>
<body>

<div class="card">
    <div id="start-area">
        <div class="result-image">🤫👀</div>
        <h1 class="title">내 안의 묘한 본능<br>음란마귀 테스트</h1>
        <p class="description">평소 아주 얌전하고 보수적인 당신...<br>무의식 깊은 곳엔 무엇이 숨어있을까요?</p>
        <button class="btn-start" onclick="startTest()">본능 확인하기 🤫</button>
    </div>

    <div id="quiz-area" style="display: none;">
        <div class="progress-bar"><div class="progress" id="progress"></div></div>
        <div id="q-number" class="tiny" style="margin-bottom: 10px; font-weight:700;">Question 1 / 5</div>
        <div class="title" id="question-text" style="font-size: 19px; line-height: 1.4;">심도 있는 분석 중...</div>
        <div id="options-container"></div>
    </div>

    <div id="result-area" style="display: none;">
        <div class="tiny" style="font-weight: 700; color: #9f1239;">🙊 은밀한 분석 결과</div>
        <div id="res-image" class="result-image">🦊</div>
        <div id="res-name" class="result-title">결과 이름</div>
        
        <div class="result-box">
            <span class="result-box-title">🙊 본능 리포트</span>
            <div id="res-desc" class="result-desc">당신의 은밀한 속마음이 공개됩니다.</div>
        </div>

        <div class="action-btns">
            <button class="btn-kakao">
                <img src="https://developers.kakao.com/assets/img/about/logos/kakaotalksharing/kakaotalk_sharing_btn_medium.png" width="20">
                결과 카톡 공유하기
            </button>
            <a href="https://blog.naver.com/forgiven_77/224219719421" target="_blank" class="btn-blog">
                👀 더 화끈한 테스트 보기
            </a>
            <button class="btn-retry" onclick="location.reload()">🔄 다시 하기</button>
        </div>
    </div>
</div>

<script>
    let currentQ = 0;
    let score = 0;

    const questions = [
        {
            q: "친구들과 대화 중, 누군가 야릇한 농담을 던졌을 때 당신의 첫 반응은?",
            options: [
                { text: "이미 머릿속엔 그다음 전개가 아슬아슬하게 펼쳐진다.", point: 3 },
                { text: "당황하는 척하며 슬쩍 자리를 피하려 한다.", point: 1 },
                { text: "더 재치 있고 묘한 농담으로 맞받아쳐 분위기를 달군다.", point: 3 },
                { text: "무슨 뜻인지 몰라 멀뚱멀뚱 친구만 쳐다본다.", point: 0 }
            ]
        },
        {
            q: "와인 바에서 낯선 이성이 섹시한 눈빛을 보낸다면?",
            options: [
                { text: "이후의 화끈한 전개를 상상하며 내심 기대한다.", point: 3 },
                { text: "당황해서 시선을 피하고 심장이 빠르게 뛴다.", point: 2 },
                { text: "맞불을 놓으며 상대를 유혹하는 눈빛을 보낸다.", point: 3 },
                { text: "내 얼굴에 뭐가 묻었나? 하며 거울을 본다.", point: 0 }
            ]
        },
        {
            q: "멜로 영화 중 아슬아슬한 스킨십 장면을 볼 때 당신의 반응은?",
            options: [
                { text: "숨죽이며 주인공의 손길 하나하나에 몰입한다.", point: 3 },
                { text: "이루어질 수 없는 비극적인 감정에 집중한다.", point: 1 },
                { text: "나도 모르게 상상력이 자극되어 얼굴이 달아오른다.", point: 2 },
                { text: "영화의 배경 음악이나 연출 방식을 분석한다.", point: 0 }
            ]
        },
        {
            q: "당신이 선호하는 데이트 장소를 딱 하나 고른다면?",
            options: [
                { text: "우리 둘만 있는 아늑하고 프라이빗한 장소.", point: 3 },
                { text: "어두운 조명의 펍이나 비밀스러운 공간.", point: 2 },
                { text: "햇살이 내리쬐는 탁 트인 공원이나 카페.", point: 1 },
                { text: "조용한 박물관이나 지적인 대화가 가능한 곳.", point: 0 }
            ]
        },
        {
            q: "호텔 방에 들어서자마자 당신이 가장 먼저 하고 싶은 일은?",
            options: [
                { text: "연인과 가벼운 스킨십부터 나누며 분위기를 잡는다.", point: 3 },
                { text: "테라스에서 술 한잔하며 경치를 즐긴다.", point: 1 },
                { text: "따뜻한 욕조를 준비하며 로맨틱한 목욕을 준비한다.", point: 2 },
                { text: "주변 맛집이 어디 있는지 구글 맵을 켠다.", point: 0 }
            ]
        }
    ];

    const results = [
        { min: 0, max: 3, name: "청정한 1급수 영혼\n순백의 천사 등급", img: "👼✨", desc: "음란마귀가 발붙일 틈이 없는 깨끗한 영혼이군요! 너무 순수해서 당황하는 모습조차 매력이지만, 가끔은 조금 대범해져도 괜찮아요." },
        { min: 4, max: 8, name: "귀여운 호기심 대장\n음란마귀 꿈나무 등급", img: "😳✨", desc: "호기심은 많지만 막상 닥치면 수줍어하는 타입! 야한 상상을 하다가도 금세 얼굴이 붉어지는 귀여운 매력의 소유자군요." },
        { min: 9, max: 12, name: "세련된 에로스\n치명적인 유혹의 기술자", img: "🍷🔥", desc: "성숙한 연애의 향기를 풍기는 진정한 어른! 적당한 긴장감을 즐길 줄 알며 상대를 안달 나게 만드는 치명적인 매력을 가졌네요." },
        { min: 13, max: 15, name: "상상력의 끝판왕\n거부할 수 없는 본능의 화신", img: "🦊🔥", desc: "머릿속엔 이미 거대한 음란마귀가 자리했군요! 모든 상황을 묘하게 해석하는 당신, 당신과의 만남은 매 순간이 짜릿한 반전의 연속이겠어요." }
    ];

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function startTest() {
        shuffle(questions);
        questions.forEach(q => shuffle(q.options));
        document.getElementById('start-area').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        let percent = (currentQ / questions.length) * 100;
        document.getElementById('progress').style.width = percent + '%';
        document.getElementById('q-number').innerText = `Question ${currentQ + 1} / ${questions.length}`;
        let currentData = questions[currentQ];
        document.getElementById('question-text').innerText = currentData.q;
        let container = document.getElementById('options-container');
        container.innerHTML = "";
        currentData.options.forEach(opt => {
            let btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt.text;
            btn.onclick = () => nextQuestion(opt.point);
            container.appendChild(btn);
        });
    }

    function nextQuestion(point) {
        score += point;
        currentQ++;
        if (currentQ < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        let resultData = results.find(r => score >= r.min && score <= r.max);
        if(!resultData) resultData = results[0];
        document.getElementById('res-image').innerText = resultData.img;
        document.getElementById('res-name').innerHTML = resultData.name.replace('\n', '<br>');
        document.getElementById('res-desc').innerHTML = resultData.desc;
    }
</script>
</body>
</html>
