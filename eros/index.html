<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>치명적 매력 스캐너 | 나의 에로스 등급 테스트</title>
    
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="나의 치명적 매력 지수는? | 에로스 테스트" />
    <meta property="og:description" content="당신에게 숨겨진 치명적인 매력을 스캔합니다. 당신의 에로스 등급은?" />
    <meta property="og:url" content="./" />
    <meta property="og:image" content="../assets/share-thumb.jpg" />

    <link rel="stylesheet" href="../assets/vibe-theme.css">
    <style>
        :root {
            --main-color: #be123c; /* 크림슨 */
            --bg-light: #fff1f2;
            --border-color: #ffe4e6;
            --btn-hover-shadow: rgba(190, 18, 60, 0.3);
        }
    </style>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="../assets/kakao-share.js" defer></script>
</head>
<body>

<div class="card">
    <div id="start-area">
        <div class="result-image">🔥👄</div>
        <h1 class="title">치명적 매력<br>에로스 스캐너</h1>
        <p class="description">당신에게 숨겨진 치명적인 매력을 스캔합니다.<br>당신의 진짜 등급을 확인해 보세요!</p>
        <button class="btn-start" onclick="startTest()">매력 스캔 시작 🚀</button>
    </div>

    <div id="quiz-area" style="display: none;">
        <div class="progress-bar"><div class="progress" id="progress"></div></div>
        <div id="q-number" class="tiny" style="margin-bottom: 10px; font-weight:700;">Question 1 / 5</div>
        <div class="title" id="question-text" style="font-size: 20px;">질문 불러오는 중...</div>
        <div id="options-container"></div>
    </div>

    <div id="result-area" style="display: none;">
        <div class="tiny" style="font-weight: 700;">나의 에로스 스캔 결과</div>
        <div id="res-image" class="result-image">✨</div>
        <div id="res-name" class="result-title">결과 이름</div>
        
        <div class="result-box">
            <span class="result-box-title">🔍 매력 유전학자 분석</span>
            <div id="res-desc" class="result-desc">결과 설명이 여기에 나옵니다.</div>
        </div>

        <div class="action-btns">
            <button class="btn-kakao">
                <img src="https://developers.kakao.com/assets/img/about/logos/kakaotalksharing/kakaotalk_sharing_btn_medium.png" width="20">
                내 매력 지수 공유하기
            </button>
            <a href="https://blog.naver.com/forgiven_77/224195220807" target="_blank" class="btn-blog">
                👀 다른 재미있는 테스트 구경가기
            </a>
            <button class="btn-retry" onclick="location.reload()">🔄 다시 테스트하기</button>
        </div>
    </div>
</div>

<script>
    let currentQ = 0;
    let score = 0;

    const questions = [
        {
            q: "길을 걷다 낯선 사람과 눈이 마주쳤을 때, 당신의 행동은?",
            options: [
                { text: "부끄러워서 바로 시선을 피한다", point: 0 },
                { text: "가벼운 미소로 화답한다", point: 2 },
                { text: "상대가 피할 때까지 빤히 쳐다본다", point: 3 },
                { text: "자신 있게 윙크를 날린다", point: 1 }
            ]
        },
        {
            q: "가장 파워풀하다고 생각하는 나의 매력 포인트는?",
            options: [
                { text: "깊고 그윽한 눈빛", point: 3 },
                { text: "자신감 넘치는 목소리", point: 2 },
                { text: "탄탄하고 건강한 몸매", point: 1 },
                { text: "상대를 배려하는 다정함", point: 0 }
            ]
        },
        {
            q: "좋아하는 이성 앞에서 나의 태도는?",
            options: [
                { text: "은근슬쩍 스킨십을 유도한다", point: 3 },
                { text: "칭찬 공세로 기분을 좋게 만든다", point: 1 },
                { text: "나의 성공과 능력을 어필한다", point: 2 },
                { text: "조용히 챙겨주는 츤데레 매력", point: 0 }
            ]
        },
        {
            q: "당신이 생각하는 가장 섹시한 순간은?",
            options: [
                { text: "열정적으로 일에 몰두할 때", point: 2 },
                { text: "운동을 마치고 땀 흘릴 때", point: 1 },
                { text: "샤워 후 거울 속 나를 볼 때", point: 3 },
                { text: "맛있는 음식을 복스럽게 먹을 때", point: 0 }
            ]
        },
        {
            q: "사랑을 나눌 때 가장 중요하게 생각하는 것은?",
            options: [
                { text: "서로의 강렬한 육체적 교감", point: 3 },
                { text: "끊이지 않는 달콤한 대화", point: 1 },
                { text: "서로를 향한 절대적인 신뢰", point: 0 },
                { text: "함께하는 시간 속의 소소한 즐거움", point: 2 }
            ]
        }
    ];

    const results = [
        { min: 0, max: 3, name: "청순가련\n순수 결정체 등급", img: "👼", desc: "당신은 아직 에로스의 마법보다는 순수한 사랑을 꿈꾸는 영혼이군요! 당신의 맑은 매력에 치유받고 싶어 하는 사람이 아주 많을 거예요." },
        { min: 4, max: 7, name: "은은한 유혹\n잠재적 매력러 등급", img: "🌙", desc: "자신도 모르는 사이에 뿜어져 나오는 매력이 상당하네요! 조금만 더 자신감을 갖는다면 누구든 당신의 매력에 빠뜨릴 수 있을 거예요." },
        { min: 8, max: 11, name: "눈빛 살인마\n치명적 유혹자 등급", img: "💋", desc: "축하합니다! 당신은 이 시대의 진정한 팜므파탈/옴므파탈입니다. 당신의 눈빛 한 방이면 누구나 무장해제될 수밖에 없군요." },
        { min: 12, max: 15, name: "에로스의 현신\n절대 매력신 등급", img: "🔥", desc: "당신 앞에서는 그 누구도 버틸 수 없습니다! 존재 자체가 치명적인 매력 덩어리군요. 너무 위험한 수준의 매력을 가졌으니 조심하세요!" }
    ];

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function startTest() {
        shuffle(questions);
        questions.forEach(q => shuffle(q.options));
        document.getElementById('start-area').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        let percent = (currentQ / questions.length) * 100;
        document.getElementById('progress').style.width = percent + '%';
        document.getElementById('q-number').innerText = `Question ${currentQ + 1} / ${questions.length}`;
        let currentData = questions[currentQ];
        document.getElementById('question-text').innerText = currentData.q;
        let container = document.getElementById('options-container');
        container.innerHTML = "";
        currentData.options.forEach(opt => {
            let btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt.text;
            btn.onclick = () => nextQuestion(opt.point);
            container.appendChild(btn);
        });
    }

    function nextQuestion(point) {
        score += point;
        currentQ++;
        if (currentQ < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        let resultData = results.find(r => score >= r.min && score <= r.max);
        if(!resultData) resultData = results[0];
        document.getElementById('res-image').innerText = resultData.img;
        document.getElementById('res-name').innerHTML = resultData.name.replace('\n', '<br>');
        document.getElementById('res-desc').innerHTML = resultData.desc;
    }
</script>
</body>
</html>
