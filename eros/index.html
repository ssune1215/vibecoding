<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>음란마귀 테스트 | 내 안의 숨겨진 에로스 지수는? 😏</title>
    
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="음란마귀 테스트 | 나의 에로 등급은?" />
    <meta property="og:description" content="19금 금단의 영역... 당신의 본능을 정밀하게 측정해드립니다." />
    <meta property="og:url" content="./" />
    <meta property="og:image" content="../assets/share-thumb.jpg" />

    <link rel="stylesheet" href="../assets/vibe-theme.css">
    <style>
        :root {
            --main-color: #9f1239; /* 로즈/크림슨 */
            --bg-light: #fff1f2;
            --border-color: #fecdd3;
            --btn-hover-shadow: rgba(159, 18, 57, 0.2);
        }
    </style>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="../assets/kakao-share.js" defer></script>
</head>
<body>

<div class="card">
    <div id="start-area">
        <div class="result-image">😏👺</div>
        <h1 class="title">내 안의 19금 본능<br>음란마귀 테스트</h1>
        <p class="description">평소 아주 얌전하고 보수적인 당신...<br>하지만 무의식 속 깊은 곳엔 무엇이 있을까요?</p>
        <button class="btn-start" onclick="startTest()">본능 확인하기 🔥</button>
    </div>

    <div id="quiz-area" style="display: none;">
        <div class="progress-bar"><div class="progress" id="progress"></div></div>
        <div id="q-number" class="tiny" style="margin-bottom: 10px; font-weight:700;">Question 1 / 5</div>
        <div class="title" id="question-text" style="font-size: 19px; line-height: 1.5;">심도 있는 분석 중...</div>
        <div id="options-container"></div>
    </div>

    <div id="result-area" style="display: none;">
        <div class="tiny" style="font-weight: 700; color: #9f1239;">🙊 은밀한 분석 결과</div>
        <div id="res-image" class="result-image">🔞</div>
        <div id="res-name" class="result-title">결과 이름</div>
        
        <div class="result-box">
            <span class="result-box-title">🔞 19금 마귀 보고서</span>
            <div id="res-desc" class="result-desc">당신의 은밀한 속마음이 공개됩니다.</div>
        </div>

        <div class="action-btns">
            <button class="btn-kakao">
                <img src="https://developers.kakao.com/assets/img/about/logos/kakaotalksharing/kakaotalk_sharing_btn_medium.png" width="20">
                조용히 내 결과 공유하기
            </button>
            <a href="https://blog.naver.com/forgiven_77/224198478277" target="_blank" class="btn-blog">
                👀 더 화끈한 테스트 보기
            </a>
            <button class="btn-retry" onclick="location.reload()">🔄 다시 테스트하기</button>
        </div>
    </div>
</div>

<script>
    let currentQ = 0;
    let score = 0;

    const questions = [
        {
            q: "친구들과 평범하게 대화를 나누던 중, 누군가 아주 살짝 야릇한 농담을 던졌습니다. 이때 당신의 첫 반응은 무엇인가요?",
            options: [
                { text: "부끄러운 척하지만, 이미 머릿속에는 그다음 시나리오가 19금으로 펼쳐지고 있다.", point: 3 },
                { text: "어머, 무슨 그런 말을 해! 하며 당황하는 척 자리를 피하려 노력한다.", point: 1 },
                { text: "더 자극적인 농담으로 맞받아쳐서 분위기를 한껏 달궈놓는다.", point: 3 },
                { text: "무슨 뜻인지 정말 몰라서 멀뚱멀뚱 친구들의 얼굴만 쳐다본다.", point: 0 }
            ]
        },
        {
            q: "분위기 좋은 와인 바에서 낯선 이성이 당신에게 아주 위험하고 섹시한 눈빛을 보냅니다. 당신의 속마음은?",
            options: [
                { text: "미래의 자녀 이름까지 생각한다? 아니, 오늘 밤의 뜨거운 전개를 상상한다.", point: 3 },
                { text: "당황해서 시선을 피하고, 심장 박동수가 급격히 빨라지는 걸 느낀다.", point: 2 },
                { text: "당당하게 맞불을 놓으며 그/녀가 다가오게끔 유도하는 치명적인 눈빛을 보낸다.", point: 3 },
                { text: "내 얼굴에 뭐가 묻었나? 하며 거울을 꺼내 본다.", point: 0 }
            ]
        },
        {
            q: "금지된 사랑이나 위험한 관계에 대한 영화를 볼 때, 당신이 가장 몰입하게 되는 포인트는 어디인가요?",
            options: [
                { text: "주인공들의 아슬아슬한 스킨십과 숨소리가 느껴지는 긴장감 넘치는 장면.", point: 3 },
                { text: "이루어질 수 없는 사랑에 아파하는 두 사람의 비극적인 감정 표현.", point: 1 },
                { text: "남몰래 밀애를 즐기는 그들의 대범함과 스릴 넘치는 상황 그 자체.", point: 2 },
                { text: "영화의 배경 음악과 연출 방식이 얼마나 예술적인지를 평가한다.", point: 0 }
            ]
        },
        {
            q: "당신이 가장 선호하는 데이트 장소를 딱 하나만 고른다면 어디인가요?",
            options: [
                { text: "우리 둘만 있는 아주 아늑하고 프라이빗한 자취방이나 호텔 룸.", point: 3 },
                { text: "사람들이 북적이는 어두운 조명의 펍이나 클럽의 한구석.", point: 2 },
                { text: "햇살이 내리쬐는 탁 트인 공원이나 바다 전망의 카페.", point: 1 },
                { text: "조용한 박물관이나 도서관처럼 지적인 대화를 나눌 수 있는 곳.", point: 0 }
            ]
        },
        {
            q: "사랑하는 연인과 단둘이 해외여행을 갔습니다. 호텔 방에 들어서자마자 당신이 가장 먼저 하고 싶은 일은?",
            options: [
                { text: "일단 짐을 내팽개치고 침대에 누워 연인과 뜨겁게 밀착한다.", point: 3 },
                { text: "짐을 깔끔하게 정리하고 테라스에 나가 맥주 한 잔을 마시며 분위기를 잡는다.", point: 1 },
                { text: "욕조에 따뜻한 물을 받고 로맨틱한 목욕 준비를 하며 기대를 높인다.", point: 2 },
                { text: "호텔 주변에 맛집이 어디 있는지 구글 맵을 켜서 검색한다.", point: 0 }
            ]
        }
    ];

    const results = [
        { min: 0, max: 3, name: "청정한 1급수 영혼\n순백의 천사 등급", img: "👼🤍", desc: "당신은 음란마귀가 발붙일 틈이 없는 아주 깨끗한 영혼의 소유자군요! 야한 농담을 들어도 이해를 못 하거나, 순수하게 당황하는 모습이 매력적입니다. 하지만 너무 순수해서 세상의 거친 파도를 버텨낼 수 있을지 걱정이네요!" },
        { min: 4, max: 8, name: "음란마귀 꿈나무\n수줍은 호기심 대장", img: "🫣✨", desc: "누구보다 호기심은 많지만 표현을 못 하는 귀여운 타입! 야한 상상을 하다가도 금세 얼굴이 붉어지는 수줍은 성격이군요. 조만간 잠재되어 있던 마귀 본능이 깨어날지도 모르니 마음의 준비를 하세요!" },
        { min: 9, max: 12, name: "세련된 에로스\n치명적인 매력 중독자", img: "🍷🔥", desc: "연애의 즐거움과 뜨거움을 제대로 아는 진정한 어른! 선을 넘지 않으면서도 상대방을 안달 나게 만드는 고도의 기술을 지녔군요. 당신의 카리스마 넘치는 유혹에는 그 누구도 버틸 수 없을 것입니다." },
        { min: 13, max: 15, name: "마왕의 재림\n에로스의 현신 등급", img: "👺🖤", desc: "축하(?)합니다! 당신의 몸속에는 이미 거대한 음란마귀가 자리 잡고 있군요. 일상의 모든 것이 당신의 머릿속을 거치면 19금 영화가 되어버립니다. 존재 자체가 위험하고 치명적인 당신은 밤의 지배자이자 유혹의 화신입니다!" }
    ];

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function startTest() {
        shuffle(questions);
        questions.forEach(q => shuffle(q.options));
        document.getElementById('start-area').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        let percent = (currentQ / questions.length) * 100;
        document.getElementById('progress').style.width = percent + '%';
        document.getElementById('q-number').innerText = `Question ${currentQ + 1} / ${questions.length}`;
        let currentData = questions[currentQ];
        document.getElementById('question-text').innerText = currentData.q;
        let container = document.getElementById('options-container');
        container.innerHTML = "";
        currentData.options.forEach(opt => {
            let btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt.text;
            btn.onclick = () => nextQuestion(opt.point);
            container.appendChild(btn);
        });
    }

    function nextQuestion(point) {
        score += point;
        currentQ++;
        if (currentQ < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        let resultData = results.find(r => score >= r.min && score <= r.max);
        if(!resultData) resultData = results[0];
        document.getElementById('res-image').innerText = resultData.img;
        document.getElementById('res-name').innerHTML = resultData.name.replace('\n', '<br>');
        document.getElementById('res-desc').innerHTML = resultData.desc;
    }
</script>
</body>
</html>
