<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연애 첫인상 테스트 | 나의 첫인상 바이브 스캔</title>
    
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="나의 연애 첫인상은 어떨까? | 연애 첫인상 테스트" />
    <meta property="og:description" content="남들에게 보여지는 나의 첫인상 매력 포인트를 스캔해드립니다. 당신의 첫인상 바이브는?" />
    <meta property="og:url" content="./" />
    <meta property="og:image" content="../assets/share-thumb.jpg" />

    <link rel="stylesheet" href="../assets/vibe-theme.css">
    <style>
        :root {
            --main-color: #8b5cf6; /* 바이올렛 */
            --bg-light: #f5f3ff;
            --border-color: #ede9fe;
            --btn-hover-shadow: rgba(139, 92, 246, 0.3);
        }
    </style>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="../assets/kakao-share.js" defer></script>
</head>
<body>

<div class="card">
    <div id="start-area">
        <div class="result-image">✨👁️</div>
        <h1 class="title">나의 연애<br>첫인상 스캐너</h1>
        <p class="description">남들에게 보여지는 나의 첫인상 매력 포인트!<br>당신의 첫인상 바이브를 스캔해드립니다.</p>
        <button class="btn-start" onclick="startTest()">첫인상 스캔 시작 🚀</button>
    </div>

    <div id="quiz-area" style="display: none;">
        <div class="progress-bar"><div class="progress" id="progress"></div></div>
        <div id="q-number" class="tiny" style="margin-bottom: 10px; font-weight:700;">Question 1 / 5</div>
        <div class="title" id="question-text" style="font-size: 20px;">질문 불러오는 중...</div>
        <div id="options-container"></div>
    </div>

    <div id="result-area" style="display: none;">
        <div class="tiny" style="font-weight: 700;">나의 첫인상 스캔 결과</div>
        <div id="res-image" class="result-image">✨</div>
        <div id="res-name" class="result-title">결과 이름</div>
        
        <div class="result-box">
            <span class="result-box-title">🔍 매력 분석관의 진단</span>
            <div id="res-desc" class="result-desc">결과 설명이 여기에 나옵니다.</div>
        </div>

        <div class="action-btns">
            <button class="btn-kakao">
                <img src="https://developers.kakao.com/assets/img/about/logos/kakaotalksharing/kakaotalk_sharing_btn_medium.png" width="20">
                내 첫인상 공유하기
            </button>
            <a href="https://blog.naver.com/forgiven_77/224195220807" target="_blank" class="btn-blog">
                👀 다른 재미있는 테스트 구경가기
            </a>
            <button class="btn-retry" onclick="location.reload()">🔄 다시 테스트하기</button>
        </div>
    </div>
</div>

<script>
    let currentQ = 0;
    let score = { A: 0, B: 0, C: 0, D: 0 };

    const questions = [
        {
            q: "새로운 모임에 나갔을 때 나의 첫 행동은?",
            options: [
                { text: "먼저 웃으며 인사를 건넨다", type: 'A' },
                { text: "구석에서 조용히 사람들을 관찰한다", type: 'B' },
                { text: "준비해온 농담으로 분위기를 띄운다", type: 'C' },
                { text: "지각해서 정신없이 들어온다", type: 'D' }
            ]
        },
        {
            q: "소개팅에서 상대방이 나를 처음 봤을 때 반응은?",
            options: [
                { text: "오! 사진보다 훨씬 나으시네요 (호감)", type: 'A' },
                { text: "인상이 참 선하시네요 (신뢰)", type: 'B' },
                { text: "되게 재미있으실 것 같아요 (기대)", type: 'C' },
                { text: "되게 도도해 보이시네요 (긴장)", type: 'D' }
            ]
        },
        {
            q: "내가 평소에 가장 많이 듣는 칭찬은?",
            options: [
                { text: "스타일이 참 좋으시네요", type: 'A' },
                { text: "같이 있으면 편안해요", type: 'B' },
                { text: "성격이 정말 유쾌하시네요", type: 'C' },
                { text: "신비로운 매력이 있어요", type: 'D' }
            ]
        },
        {
            q: "데이트할 때 나의 패션 스타일은?",
            options: [
                { text: "깔끔하고 세련된 정석 스타일", type: 'A' },
                { text: "부스스하지만 감각적인 힙스터 스타일", type: 'D' },
                { text: "밝고 귀여운 느낌의 파스텔 스타일", type: 'B' },
                { text: "편안하면서도 위트 있는 스타일", type: 'C' }
            ]
        },
        {
            q: "첫눈에 반한다는 것에 대한 나의 생각은?",
            options: [
                { text: "충분히 가능하고 낭만적이다", type: 'A' },
                { text: "외모만 보고 판단하는 건 위험하다", type: 'B' },
                { text: "나도 모르게 금세 빠져버릴 때가 있다", type: 'C' },
                { text: "살면서 한 번도 겪어본 적 없다", type: 'D' }
            ]
        }
    ];

    const results = {
        A: { name: "시선 강탈!\n세련된 도시적 카리스마형", img: "💎", desc: "당신은 어딜 가나 눈에 띄는 화려한 매력을 가졌군요! 세련된 분위기와 당당한 태도가 상대방의 시선을 단번에 사로잡는 스타일입니다." },
        B: { name: "은은한 매력\n신뢰를 주는 힐러형", img: "🌿", desc: "따뜻하고 선한 인상으로 상대방을 무장해제 시키는 힘이 있습니다. 같이 있으면 마음이 편안해지는 당신의 매력은 시간이 갈수록 깊어질 거예요." },
        C: { name: "분위기 메이커\n톡톡 튀는 비타민형", img: "🍋", desc: "유쾌한 에너지와 재치 있는 입담으로 첫 만남의 긴장감을 바로 녹여버리는군요! 당신과 함께라면 누구나 즐거운 시간을 보낼 수 있을 거예요." },
        D: { name: "신비로운 베일\n치명적인 고양이형", img: "🐱", desc: "알면 알수록 궁금해지는 묘한 매력의 소유자! 도도하면서도 시크한 분위기가 상대방의 도전 정신(?)을 자극하는 아주 매력적인 타입입니다." }
    };

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function startTest() {
        shuffle(questions);
        questions.forEach(q => shuffle(q.options));
        document.getElementById('start-area').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        let percent = (currentQ / questions.length) * 100;
        document.getElementById('progress').style.width = percent + '%';
        document.getElementById('q-number').innerText = `Question ${currentQ + 1} / ${questions.length}`;
        let currentData = questions[currentQ];
        document.getElementById('question-text').innerText = currentData.q;
        let container = document.getElementById('options-container');
        container.innerHTML = "";
        currentData.options.forEach(opt => {
            let btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt.text;
            btn.onclick = () => nextQuestion(opt.type);
            container.appendChild(btn);
        });
    }

    function nextQuestion(type) {
        score[type]++;
        currentQ++;
        if (currentQ < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        let maxVal = -1;
        let finalType = 'A';
        for (let k in score) {
            if (score[k] > maxVal) { maxVal = score[k]; finalType = k; }
        }
        let resultData = results[finalType];
        document.getElementById('res-image').innerText = resultData.img;
        document.getElementById('res-name').innerHTML = resultData.name.replace('\n', '<br>');
        document.getElementById('res-desc').innerHTML = resultData.desc;
    }
</script>
</body>
</html>
