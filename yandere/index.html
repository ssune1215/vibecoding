    }

      background: rgba(255,77,141,0.12);
      border: 1px solid rgba(255,77,141,0.18);
      font-weight: 700;
      letter-spacing: -0.2px;
    }

    .badge .dot{
      width: 8px; height: 8px;
      border-radius: 999px;
      background: var(--hotPink);
      box-shadow: 0 0 0 6px rgba(255,77,141,0.12);

    .tiny{
      font-size: 12px;
      color: var(--muted);
    }

    .title{
      font-size: 22px;
      font-weight: 800;
      margin: 6px 0 8px;
      letter-spacing: -0.4px;
    }

    .startMent{
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 14px;
      white-space: pre-line;
    }

    .progress{
      height: 10px;
      background: rgba(0,0,0,0.06);
      border-radius: 999px;
      overflow:hidden;
      margin-top: 14px;
      border: 1px solid rgba(255,77,141,0.16);
    }
    .bar{
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--hotPink), var(--hotPink2));
      border-radius: 999px;
      transition: width 220ms ease;
    }

    .mid{
      padding: 14px 18px 18px;
    }

    .qBox{
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(255,77,141,0.18);
      border-radius: var(--r2xl);
      padding: 14px 14px 12px;
      box-shadow: var(--shadowIn);
    }
    .qTitle{
      margin: 0;
      font-weight: 800;
      font-size: 16px;
      letter-spacing: -0.2px;
      line-height: 1.5;
    }

    .ans{
      display:flex;
      flex-direction:column;
      gap: 10px;
      margin-top: 12px;
    }

    .btn{
      appearance:none;
      border: 1px solid var(--btnStroke);
      background: var(--btn);
      border-radius: 16px;
      padding: 12px 12px;
      font-weight: 700;
      text-align:left;
      color: var(--text);
      cursor:pointer;
      box-shadow: 0 12px 20px rgba(0,0,0,0.08);
      transform: translateY(0);
      transition: transform 90ms ease, box-shadow 90ms ease, background 180ms ease;
    }
    .btn:hover{
      background: rgba(255,255,255,0.86);
    }
    .btn:active{
      transform: translateY(2px);

    }

    .heroTitle{
      margin: 0;
      font-size: 20px;
      font-weight: 900;

    .keywords{

      margin-top: 10px;

    .desc{

      line-height: 1.6;
      font-size: 14px;
      white-space: pre-line;
    }

    .tip{

      border: 1px dashed rgba(255,77,141,0.28);
      background: rgba(255,77,141,0.08);
    }
    .tipTitle{
      margin:0 0 6px;
      font-weight: 900;
      font-size: 13px;
      letter-spacing:-0.2px;
    }
    .tipBody{
      margin:0;
      font-size: 13px;
      line-height: 1.55;
      color: rgba(42,34,48,0.80);
    }

    .cta{
      display:flex;
      flex-direction:column;
      gap: 10px;
      margin-top: 14px;
    }

    .ctaBtn{
      appearance:none;
      border: 0;
      border-radius: 16px;

    .footerNote{
      margin-top: 10px;
      font-size: 12px;
      color: rgba(42,34,48,0.68);
      text-align:center;
    }

    .hide{ display:none !important; }

</head>

<body>
  <div class="wrap">

  <script>
    /**
     * ✅ 중요: 카카오 공유가 되려면 아래 값이 반드시 맞아야 합니다.
     * - KAKAO_APP_KEY: 카카오 디벨로퍼 "JavaScript 키"
     * - SITE_URL: 실제 배포 주소(Cloudflare/GitHub Pages)
     */
    const KAKAO_APP_KEY = "b30b6d088f5b3551adc2890111d071fc";
    const SITE_URL = window.location.origin + window.location.pathname.replace(/\/yandere\/?$/, ""); // 대략적인 기본값

    // 다른 테스트 보기 버튼 링크(요청 고정)

    // 질문 8개 / 4지선다 고정
    const QUESTIONS = [
      {

        ]
      },
      {

          { t: "가끔 생각나면 확인한다.", s: 1 },
          { t: "자주 보게 된다. 습관처럼.", s: 2 },
          { t: "올라오면 바로 보고 의미를 해석한다.", s: 3 }
        ]
      },
      {
        q: "상대가 이성 지인과 친해 보이면?",
        a: [
          { t: "그럴 수 있지. 넘어간다.", s: 0 },
          { t: "조금은 신경 쓰이지만 티는 안 낸다.", s: 1 },
          { t: "누구인지, 관계가 뭔지 알고 싶어진다.", s: 2 },

          { t: "아쉽지만 괜찮다.", s: 1 },
          { t: "왜 취소됐는지 자세히 알고 싶다.", s: 2 },
          { t: "서운함이 크게 남고 오래 간다.", s: 3 }
        ]
      },
      {
        q: "상대가 ‘혼자 있고 싶어’라고 말하면?",
        a: [
          { t: "알겠어. 쉬고 연락 줘.", s: 0 },
          { t: "조금 걱정되지만 시간을 준다.", s: 1 },
          { t: "나 때문인가? 이유를 확인하고 싶다.", s: 2 },
          { t: "거리감이 불안으로 바뀐다.", s: 3 }
        ]
      },
      {
        q: "연애 중 ‘확인’하고 싶은 건 무엇인가요?",
        a: [
          { t: "서로의 신뢰가 제일 중요하다.", s: 0 },
          { t: "마음이 변하지 않았는지 가끔 확인.", s: 1 },
          { t: "내가 1순위인지 확실히 알고 싶다.", s: 2 },
          { t: "모든 게 명확해야 마음이 놓인다.", s: 3 }
        ]
      },
      {
        q: "다툰 뒤 상대가 바로 풀지 않으면?",
        a: [
          { t: "시간이 필요하겠지. 기다린다.", s: 0 },
          { t: "조금 답답하지만 참아본다.", s: 1 },
          { t: "지금 해결해야 한다고 느낀다.", s: 2 },
          { t: "불안해서 계속 생각나고 집중이 안 된다.", s: 3 }
        ]
      },
      {
        q: "상대가 늦게 답장하면 내가 하는 행동은?",
        a: [
          { t: "내 할 일 하면서 기다린다.", s: 0 },
          { t: "한 번 더 보내볼까 고민한다.", s: 1 },
          { t: "읽었는지/접속했는지 확인한다.", s: 2 },
          { t: "연속으로 보내고 반응을 확인한다.", s: 3 }
        ]
      }
    ];

    const RESULTS = [
      {
        min: 0, max: 6,
        level: "LEVEL 1  🫧",
        title: "담백 안정형",
        keywords: ["여유", "신뢰", "자기리듬"],
        desc3: "기본적으로 상대를 믿고 관계를 편하게 가져가는 타입입니다.

다만 무심해 보일 수 있으니 ‘표현’만 살짝 더해주면 완성형입니다.",
        tip: "마음이 편한 만큼, 좋은 순간을 말로 남겨주세요. 작은 확신은 관계를 더 단단하게 만듭니다."
      },
      {
        min: 7, max: 12,
        level: "LEVEL 2  🎀",
        title: "관심 확인형",
        keywords: ["신경씀", "확인", "조절가능"],
        desc3: "상대가 소중해서 자연스럽게 반응을 확인하는 편입니다.
불안이 크진 않지만, 상황에 따라 생각이 많아질 때가 있어요.
‘확인’의 빈도만 조절하면 아주 건강하게 유지됩니다.",
        tip: "불안이 올라올 땐 ‘사실’과 ‘상상’을 분리해보세요. 대화는 짧고 정확하게 하는 게 제일 좋아요."
      },
      {
        min: 13, max: 18,
        level: "LEVEL 3  🔥",
        title: "불안 탐색형",
        keywords: ["해석", "집중", "확실함필요"],
        desc3: "상대의 반응이 줄어들면 이유를 찾고 싶은 마음이 강해집니다.
관계에 몰입하는 장점이 있지만, 해석이 과해지면 스스로가 힘들어져요.
‘확실함’을 얻는 방식만 바꾸면 훨씬 편해집니다.",
        tip: "모호함이 불안을 키워요. ‘지금 어떤 상태인지’만 짧게 확인하고, 그 뒤엔 본인 루틴으로 돌아오세요."
      },
      {
        min: 19, max: 24,
        level: "LEVEL 4  🔪",
        title: "집착 경계형",
        keywords: ["불안", "통제욕", "관계과몰입"],
        desc3: "연애가 불안의 중심이 되는 순간이 종종 있습니다.
확인과 통제가 늘어나면 상대도, 본인도 지치기 쉬워요.
핵심은 ‘사랑의 크기’가 아니라 ‘불안을 다루는 방식’입니다.",
        tip: "확인 행동을 하기 전 10분만 멈춰보세요. 그 10분에 ‘내가 지금 무서운 건 무엇인지’ 적으면 감정이 내려옵니다."
      }
    ];

    const $ = (id) => document.getElementById(id);

    const screenStart = $("screenStart");
    const screenQuiz = $("screenQuiz");
    const screenResult = $("screenResult");

    const bar = $("bar");
    const bar2 = $("bar2");
    const qText = $("qText");
    const ans = $("ans");

    const btnStart = $("btnStart");
    const btnRetry = $("btnRetry");
    const btnOther = $("btnOther");
    const btnKakao = $("btnKakao");

    let idx = -1;
    let score = 0;

    function setScreen(which){
      screenStart.classList.add("hide");
      screenQuiz.classList.add("hide");
      screenResult.classList.add("hide");
      which.classList.remove("hide");
    }

    function setProgress(){
      const p = Math.max(0, (idx) / QUESTIONS.length);
      const w = Math.round(p * 100);
      bar.style.width = "0%"; // 시작화면은 0 고정
      bar2.style.width = w + "%";
    }

    function renderQuestion(){
      setProgress();
      const item = QUESTIONS[idx];
      qText.textContent = item.q;
      ans.innerHTML = "";
      item.a.forEach((opt, i) => {
        const b = document.createElement("button");
        b.className = "btn";
        b.type = "button";
        b.textContent = opt.t; // A/B/C/D 표시 제거
        b.addEventListener("click", () => {
          score += opt.s;
          next();
        });
        ans.appendChild(b);
      });
    }

    function next(){
      idx += 1;
      if (idx >= QUESTIONS.length){
        showResult();
        return;
      }
      renderQuestion();
    }

    function pickResult(){
      return RESULTS.find(r => score >= r.min && score <= r.max) || RESULTS[1];
    }

    function fireConfetti(){
      try{
        confetti({ particleCount: 120, spread: 70, origin: { y: 0.6 } });
        setTimeout(() => confetti({ particleCount: 80, spread: 60, origin: { y: 0.2 } }), 140);
      }catch(e){}
    }

    function initKakao(){
      if (!window.Kakao) return false;
      try{
        if (!Kakao.isInitialized()){
          if (!KAKAO_APP_KEY || KAKAO_APP_KEY.includes("여기에_")) return false;
          Kakao.init(KAKAO_APP_KEY);
        }
        return true;
      }catch(e){
        return false;
      }
    }

    function setupKakaoShare(result){
      const ok = initKakao();
      if (!ok){
        // 키 미설정이면 버튼 동작 안내(개발자 친화적으로 조용히)
        btnKakao.addEventListener("click", () => {
          alert("카카오 공유를 사용하려면 KAKAO_APP_KEY(자바스크립트 키)를 설정해 주세요.");
        }, { once: true });
        return;
      }

      // 현재 페이지 URL(배포 환경 기준)
      const shareUrl = window.location.href;

      // 숨김 버튼 방식(createDefaultButton)
      Kakao.Share.createDefaultButton({
        container: "#kakao-link-btn",
        objectType: "feed",
        content: {
          title: "🔪 연애 집착도 테스트",
          description: `${result.title} · ${result.keywords.join(" / ")}`,
          imageUrl: new URL("../assets/share-thumb.jpg", shareUrl).toString(),
          link: {
            mobileWebUrl: shareUrl,
            webUrl: shareUrl
          }
        },
        buttons: [
          {
            title: "테스트 하러가기",
            link: { mobileWebUrl: shareUrl, webUrl: shareUrl }
          }
        ]
      });

      // 보이는 버튼 클릭 → 숨김 버튼 클릭 트리거
      btnKakao.onclick = () => {
        const hidden = document.querySelector("#kakao-link-btn");
        hidden && hidden.click();
      };
    }

    function showResult(){
      setScreen(screenResult);
      const r = pickResult();

      $("rLevel").textContent = r.level;
      $("rTitle").textContent = r.title;

      const kw = $("rKeywords");
      kw.innerHTML = "";
      r.keywords.forEach(k => {
        const s = document.createElement("span");
        s.className = "chip";
        s.textContent = "#" + k;
        kw.appendChild(s);
      });

      $("rDesc").textContent = r.desc3;
      $("rTip").textContent = r.tip;

      fireConfetti();
      setupKakaoShare(r);
    }

    function resetAll(){
      idx = -1;
      score = 0;
      bar.style.width = "0%";
      bar2.style.width = "0%";
      setScreen(screenStart);
    }

    btnStart.addEventListener("click", () => {
      setScreen(screenQuiz);
      idx = -1;
      score = 0;
      next();
    });

    btnOther.addEventListener("click", () => {
      window.open(OTHER_TEST_URL, "_blank", "noopener,noreferrer");
    });

    btnRetry.addEventListener("click", resetAll);

    // 초기 화면
    resetAll();
  </script>
</body>
</html>
