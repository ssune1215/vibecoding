<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 안의 빌런 테스트 | 나의 숨겨진 본능은? 👿</title>
    
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="내 안의 빌런 테스트 | 나의 빌런 유형은?" />
    <meta property="og:description" content="위기의 순간, 당신의 본능은 선일까 악일까? 재미로 보는 빌런 지수 측정" />
    <meta property="og:url" content="./" />
    <meta property="og:image" content="../assets/share-thumb.jpg" />

    <link rel="stylesheet" href="../assets/vibe-theme.css">
    <style>
        :root {
            --main-color: #1e1b4b; /* 아주 어두운 인디고 */
            --bg-light: #f1f5f9;
            --border-color: #cbd5e1;
            --btn-hover-shadow: rgba(30, 27, 75, 0.2);
        }
    </style>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="../assets/kakao-share.js" defer></script>
</head>
<body>

<div class="card">
    <div id="start-area">
        <div class="result-image">👿🎭</div>
        <h1 class="title">내 안의 숨겨진<br>빌런 본능 테스트</h1>
        <p class="description">당신이 만약 영화 속 빌런이라면?<br>상황극을 통해 알아보는 나의 반전 본능!</p>
        <button class="btn-start" onclick="startTest()">본능 깨우기 🚀</button>
    </div>

    <div id="quiz-area" style="display: none;">
        <div class="progress-bar"><div class="progress" id="progress"></div></div>
        <div id="q-number" class="tiny" style="margin-bottom: 10px; font-weight:700;">Question 1 / 5</div>
        <div class="title" id="question-text" style="font-size: 19px; line-height: 1.4;">상황 로딩 중...</div>
        <div id="options-container"></div>
    </div>

    <div id="result-area" style="display: none;">
        <div class="tiny" style="font-weight: 700;">당신을 상징하는 빌런 프로필</div>
        <div id="res-image" class="result-image">💀</div>
        <div id="res-name" class="result-title">결과 이름</div>
        
        <div class="result-box">
            <span class="result-box-title">📊 빌런 지수 분석</span>
            <div id="res-desc" class="result-desc">결과 분석 내용이 여기에 표시됩니다.</div>
        </div>

        <div class="action-btns">
            <button class="btn-kakao">
                <img src="https://developers.kakao.com/assets/img/about/logos/kakaotalksharing/kakaotalk_sharing_btn_medium.png" width="20">
                내 결과 카톡 공유하기
            </button>
            <a href="https://blog.naver.com/forgiven_77/224198478277" target="_blank" class="btn-blog">
                👀 다른 테스트 구경가기
            </a>
            <button class="btn-retry" onclick="location.reload()">🔄 다시 하기</button>
        </div>
    </div>
</div>

<script>
    let currentQ = 0;
    let score = { A: 0, B: 0, C: 0, D: 0 };

    const questions = [
        {
            q: "당신은 세상을 지배하려는 빌런입니다. 마침내 모든 계획이 완성되었을 때, 당신이 가장 먼저 할 일은?",
            options: [
                { text: "아무도 모르게 조용히 그림자 속에서 세상을 조종한다.", type: 'A' },
                { text: "화려한 데뷔와 함께 전 세계에 내 존재를 알리며 공포를 심어준다.", type: 'B' },
                { text: "나를 배신했던 자들을 하나씩 찾아가 우아하게 복수한다.", type: 'C' },
                { text: "지배는 관심 없다. 그저 세상이 혼돈에 빠지는 것을 즐긴다.", type: 'D' }
            ]
        },
        {
            q: "당신을 쫓던 영웅이 마침내 당신에게 항복했습니다. 이때 당신의 선택은?",
            options: [
                { text: "내 편으로 만들어 가장 강력한 오른팔로 활용한다.", type: 'A' },
                { text: "내 위대함을 인정할 때까지 대중 앞에서 굴욕을 준다.", type: 'B' },
                { text: "가장 고통스러운 방식으로 그동안의 죗값을 치르게 한다.", type: 'C' },
                { text: "영웅이 없는 세상은 지루하다. 다시 도망갈 기회를 준다.", type: 'D' }
            ]
        },
        {
            q: "당신이 가장 선호하는 본거지(아지트)는 어떤 모습인가요?",
            options: [
                { text: "도시 한복판의 초현대식 초고층 빌딩 최상층.", type: 'A' },
                { text: "눈보라가 몰아치는 깎아지른 절벽 위 거대한 성.", type: 'B' },
                { text: "아무도 찾을 수 없는 컴컴한 지하 깊숙한 밀실.", type: 'C' },
                { text: "매일 위치가 바뀌는 정체불명의 화려한 유람선.", type: 'D' }
            ]
        },
        {
            q: "중요한 계획이 부하의 실수로 어긋났습니다. 당신은 어떻게 하시겠습니까?",
            options: [
                { text: "냉철하게 실패 원인을 분석하고 다음 계획을 지시한다.", type: 'A' },
                { text: "모든 부하들이 보는 앞에서 본보기로 엄벌을 내린다.", type: 'B' },
                { text: "실패한 부하를 용서하는 척하며 나중에 더 큰 대가를 치르게 한다.", type: 'C' },
                { text: "오히려 이 상황이 더 재미있다며 크게 웃고 즐긴다.", type: 'D' }
            ]
        },
        {
            q: "사람들이 당신을 기리는 '빌런 명언'을 남긴다면 어떤 내용일까요?",
            options: [
                { text: "질서는 오직 강력한 힘에 의해서만 유지된다.", type: 'A' },
                { text: "모두가 나를 우러러보게 될 것이다. 영원히.", type: 'B' },
                { text: "눈에는 눈, 이에는 이. 배신은 죽음뿐이다.", type: 'C' },
                { text: "인생은 어차피 혼돈이야. 그냥 즐겨!", type: 'D' }
            ]
        }
    ];

    const results = {
        A: { name: "그림자 속의 지배자\n다크 마스터마인드", img: "🕵️‍♂️🌑", desc: "당신은 냉철한 두뇌로 완벽한 계획을 세우는 전략가형 빌런입니다. 화려한 칭송보다는 실질적인 권력을 쥐고 세상을 움직이는 것을 선호하죠. 당신의 한 마디에 세상이 흔들립니다!" },
        B: { name: "강력한 절대 군주\n오버로드 로드", img: "👑🔥", desc: "당신은 압도적인 카리스마로 모두를 복종시키는 지배자형 빌런입니다! 누구도 거부할 수 없는 강력한 존재감을 뽐내며, 당신의 이름을 듣는 것만으로도 사람들은 전율하게 될 것입니다." },
        C: { name: "우아한 복수의 화신\n아이스 크루얼", img: "❄️🍷", desc: "당신은 단 한 번의 배신도 잊지 않는 치밀하고 우아한 빌런입니다. 차가운 미소 뒤에 숨겨진 서늘한 복수심은 상대를 가장 고통스럽게 만들죠. 당신과 적이 되는 것은 세상에서 가장 위험한 일입니다." },
        D: { name: "예측 불가능한 광기\n카오스 조커", img: "🤡🃏", desc: "당신은 권력도 명예도 관심 없습니다. 그저 세상이 뒤집히는 짜릿한 긴장감을 즐기는 혼돈 그 자체군요! 누구도 당신의 다음 행동을 예측할 수 없기에 세상에서 가장 두려운 존재입니다." }
    };

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function startTest() {
        shuffle(questions);
        questions.forEach(q => shuffle(q.options));
        document.getElementById('start-area').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        let percent = (currentQ / questions.length) * 100;
        document.getElementById('progress').style.width = percent + '%';
        document.getElementById('q-number').innerText = `Question ${currentQ + 1} / ${questions.length}`;
        let currentData = questions[currentQ];
        document.getElementById('question-text').innerText = currentData.q;
        let container = document.getElementById('options-container');
        container.innerHTML = "";
        currentData.options.forEach(opt => {
            let btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt.text;
            btn.onclick = () => nextQuestion(opt.type);
            container.appendChild(btn);
        });
    }

    function nextQuestion(type) {
        score[type]++;
        currentQ++;
        if (currentQ < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        
        let finalType = Object.keys(score).reduce((a, b) => score[a] >= score[b] ? a : b);
        let resultData = results[finalType];

        document.getElementById('res-image').innerText = resultData.img;
        document.getElementById('res-name').innerHTML = resultData.name.replace('\n', '<br>');
        document.getElementById('res-desc').innerHTML = resultData.desc;
    }
</script>
</body>
</html>
