<!doctype html>
<html lang="ko">
<head>
  <meta property="og:url" content="./">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Vibecoding 테스트 모음">
  <meta name="twitter:description" content="결과를 확인하고 바로 공유해보세요.">
  <meta name="twitter:image" content="og.png">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Vibecoding 테스트 모음</title>

  <!-- OG (공유 썸네일: 공통) -->
  <meta property="og:title" content="Vibecoding 테스트 모음" />
  <meta property="og:description" content="원하는 테스트를 골라주세요. 각 링크는 블로그에 그대로 붙여도 됩니다." />
  <meta property="og:image" content="./assets/share-thumb.jpg" />
  <style>
    /* 세련된 바이브코딩 공통 테마 스펙 적용 */
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

    :root {
      --main-color: #ff8fa3; 
      --bg-light: #fff0f3; 
      --card-bg: #ffffff; 
      --text-dark: #334155;
      --border-color: #ffe4e6;
    }
    * { box-sizing: border-box; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--text-dark);
      background: var(--bg-light);
      padding: 20px;
    }
    .wrap { width: 100%; max-width: 480px; }
    .card {
      background: var(--card-bg);
      border-radius: 28px;
      box-shadow: 0 15px 35px rgba(255, 143, 163, 0.15);
      padding: 35px 25px;
      position: relative;
      overflow: hidden;
      border: 1px solid var(--border-color);
      text-align: center;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 999px;
      background: var(--bg-light);
      border: 1px solid var(--border-color);
      color: var(--main-color);
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 15px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 24px;
      letter-spacing: -0.5px;
      font-weight: 800;
      color: #1e293b;
    }
    .sub {
      margin: 0 0 25px;
      color: #64748b;
      font-size: 14px;
      line-height: 1.6;
      word-break: keep-all;
    }
    .box {
      text-align: left;
    }
    .group { margin: 10px 0 25px; }
    .group-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 800;
      color: var(--main-color);
      font-size: 15px;
      margin: 0 0 12px 5px;
    }
    .list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 0;
      margin: 0;
      list-style: none;
    }
    .item a {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: #475569;
      background: #ffffff;
      border: 1px solid var(--border-color);
      border-radius: 18px;
      padding: 14px 16px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
      transition: all 0.2s ease;
      font-weight: 700;
      font-size: 16px;
    }
    .item a:hover {
      background: var(--main-color);
      color: #ffffff;
      border-color: var(--main-color);
      transform: translateY(-2px);
      box-shadow: 0 8px 15px rgba(255, 143, 163, 0.25);
    }
    .item a:hover .meta { color: #ffffff; opacity: 0.9; }
    .item a:hover .emoji { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.3); }
    .item a:active { transform: translateY(1px); }
    
    .emoji {
      width: 40px; height: 40px;
      display: grid; place-items: center;
      border-radius: 12px;
      background: var(--bg-light);
      flex: 0 0 auto;
      font-size: 20px;
      transition: all 0.2s ease;
    }
    .meta {
      margin-left: auto;
      color: #94a3b8;
      font-size: 13px;
      font-weight: 700;
      transition: all 0.2s ease;
    }
    .note {
      margin-top: 25px;
      color: #94a3b8;
      font-size: 12px;
      line-height: 1.6;
    }
    .error {
      margin-top: 15px;
      background: #fee2e2;
      border: 1px solid #fca5a5;
      border-radius: 14px;
      padding: 12px;
      color: #b91c1c;
      font-size: 13px;
      display: none;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <div class="pill">💗 Vibecoding 테스트 모음</div>
      <h1>원하는 테스트를 골라주세요</h1>
      <p class="sub">각 링크는 블로그에 그대로 붙여도 됩니다.</p>

      <div class="box" id="listBox">
        <!-- 목록이 여기 생성됩니다 -->
      </div>

      <div class="note">* 모든 테스트는 같은 썸네일(<code>/assets/share-thumb.jpg</code>)을 사용합니다.</div>
      <div class="error" id="errBox"></div>
    </div>
  </div>

<script>
  // group 라벨/순서
  const GROUPS = [
    { key: "love", title: "💘 Romance (연애)", order: 1 },
    { key: "psy",  title: "🧠 Psychology (심리)",  order: 2 },
  ];

  const DEFAULT_GROUP = "psy";

  function safeText(s){ return (s ?? "").toString(); }

  function groupTitle(key){
    const g = GROUPS.find(x => x.key === key);
    return g ? g.title : "🗂 Others";
  }

  function groupOrder(key){
    const g = GROUPS.find(x => x.key === key);
    return g ? g.order : 99;
  }

  async function loadTests(){
    const res = await fetch("./tests.json", { cache: "no-store" });
    if (!res.ok) throw new Error("tests.json을 불러오지 못했습니다. (HTTP " + res.status + ")");
    const data = await res.json();
    if (!Array.isArray(data)) throw new Error("tests.json 형식이 배열이 아닙니다.");
    return data;
  }

  function render(tests){
    // group 기준 묶기
    const map = new Map();
    for (const t of tests){
      const title = safeText(t.title).trim();
      const path  = safeText(t.path).trim();
      const group = safeText(t.group).trim() || DEFAULT_GROUP;

      if (!title || !path) continue;
      if (!map.has(group)) map.set(group, []);
      map.get(group).push({ title, path, group });
    }

    // group 정렬
    const groups = Array.from(map.entries())
      .sort((a,b) => groupOrder(a[0]) - groupOrder(b[0]));

    const box = document.getElementById("listBox");
    box.innerHTML = "";

    for (const [groupKey, items] of groups){
      // item 정렬(가나다)
      items.sort((a,b) => a.title.localeCompare(b.title, "ko"));

      const section = document.createElement("div");
      section.className = "group";

      const gt = document.createElement("div");
      gt.className = "group-title";
      gt.textContent = groupTitle(groupKey);
      section.appendChild(gt);

      const ul = document.createElement("ul");
      ul.className = "list";

      for (const it of items){
        const li = document.createElement("li");
        li.className = "item";

        // 제목에서 이모지 한 글자(앞) 추출(없으면 기본)
        const m = it.title.match(/^(\p{Extended_Pictographic}|\p{Emoji_Presentation})\s*/u);
        const emo = m ? m[1] : "💗";
        const cleanTitle = it.title.replace(/^(\p{Extended_Pictographic}|\p{Emoji_Presentation})\s*/u, "").trim();

        const a = document.createElement("a");
        a.href = it.path;          // 예: "./yandere/"
        a.rel = "noopener noreferrer";

        const e = document.createElement("span");
        e.className = "emoji";
        e.textContent = emo;

        const t = document.createElement("span");
        t.textContent = cleanTitle ? cleanTitle : it.title;

        const meta = document.createElement("span");
        meta.className = "meta";
        meta.textContent = "바로가기";

        a.appendChild(e);
        a.appendChild(t);
        a.appendChild(meta);

        li.appendChild(a);
        ul.appendChild(li);
      }

      section.appendChild(ul);
      box.appendChild(section);
    }

    // 아무것도 없으면 안내
    if (!groups.length){
      box.innerHTML = `<div class="error" style="display:block">tests.json에 표시할 테스트가 없습니다. (title/path 확인)</div>`;
    }
  }

  (async () => {
    const errBox = document.getElementById("errBox");
    try{
      const tests = await loadTests();
      render(tests);
    }catch(e){
      errBox.style.display = "block";
      errBox.textContent = "목록을 불러오지 못했습니다. " + (e?.message || e);
    }
  })();
</script>
</body>
</html>
