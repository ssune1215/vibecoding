<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영화 속 커플 테스트 | 나의 연애는 어떤 영화일까? 🎬</title>
    
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="영화 속 커플 테스트 | 나의 로맨틱 Vibe는?" />
    <meta property="og:description" content="영화 속 명장면처럼 펼쳐지는 나의 연애 스타일! 어떤 커플을 닮았을까요?" />
    <meta property="og:url" content="./" />
    <meta property="og:image" content="../assets/share-thumb.jpg" />

    <link rel="stylesheet" href="../assets/vibe-theme.css">
    <style>
        :root {
            --main-color: #be123c; /* 로즈/로맨틱 레드 */
            --bg-light: #fff1f2;
            --border-color: #fb7185;
            --btn-hover-shadow: rgba(190, 18, 60, 0.2);
        }
    </style>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="../assets/kakao-share.js" defer></script>
</head>
<body>

<div class="card">
    <div id="start-area">
        <div class="result-image">🎬❤️</div>
        <h1 class="title">나의 연애 테마<br>영화 속 커플 테스트</h1>
        <p class="description">당신만이 가진 고유한 로맨틱 분위기!<br>총 8가지 영화 속 커플 중 누구와 닮았을까요?</p>
        <button class="btn-start" onclick="startTest()">내 영화 찾기 🚀</button>
    </div>

    <div id="quiz-area" style="display: none;">
        <div class="progress-bar"><div class="progress" id="progress"></div></div>
        <div id="q-number" class="tiny" style="margin-bottom: 10px; font-weight:700;">Question 1 / 5</div>
        <div class="title" id="question-text" style="font-size: 19px; line-height: 1.4;">시나리오 분석 중...</div>
        <div id="options-container"></div>
    </div>

    <div id="result-area" style="display: none;">
        <div class="tiny" style="font-weight: 700;">당신을 상징하는 명장면</div>
        <div id="res-image" class="result-image">🌹</div>
        <div id="res-name" class="result-title">결과 이름</div>
        
        <div class="result-box">
            <span class="result-box-title">🎬 무비 커플 리포트</span>
            <div id="res-desc" class="result-desc">결과 분석 내용이 여기에 표시됩니다.</div>
        </div>

        <div class="action-btns">
            <button class="btn-kakao">
                <img src="https://developers.kakao.com/assets/img/about/logos/kakaotalksharing/kakaotalk_sharing_btn_medium.png" width="20">
                내 결과 카톡 공유하기
            </button>
            <a href="https://blog.naver.com/forgiven_77/224198478277" target="_blank" class="btn-blog">
                👀 다른 테스트 구경 가기
            </a>
            <button class="btn-retry" onclick="location.reload()">🔄 다시 하기</button>
        </div>
    </div>
</div>

<script>
    let currentQ = 0;
    let score = 0;

    const questions = [
        {
            q: "꿈꾸던 첫 데이트를 하게 된 당신, 가장 완벽한 코스는?",
            options: [
                { text: "해질녘 강변을 산책하며 나누는 깊은 대화", point: 1 },
                { text: "화려한 야경이 보이는 루프탑에서 즐기는 낭만", point: 2 },
                { text: "빗속을 뚫고 달려가 꽉 껴안는 뜨거운 재회", point: 3 },
                { text: "평범하지만 맛있는 떡볶이를 같이 먹는 일상", point: 4 }
            ]
        },
        {
            q: "연인과 말다툼이 생겼을 때, 당신이 화해하는 방식은?",
            options: [
                { text: "시간 여행을 하듯 어제의 나를 반성하며 사과", point: 1 },
                { text: "각자의 꿈과 공간을 잠시 유지하며 감정 정리", point: 2 },
                { text: "죽을 때까지 놓지 않겠다는 듯 부딪히며 진심 확인", point: 3 },
                { text: "이 관계가 어떤 의미인지 차분하게 곰곰이 생각", point: 4 }
            ]
        },
        {
            q: "상대방에게 반하게 되는 당신만의 결정적 포인트는?",
            options: [
                { text: "말하지 않아도 느껴지는 편안함과 다정함", point: 1 },
                { text: "열정적으로 자신의 꿈을 향해 일하는 모습", point: 2 },
                { text: "세상 모두가 등 돌려도 나 하나만 믿어주는 확신", point: 3 },
                { text: "대화가 막힘없이 이어질 때 느끼는 짜릿함", point: 4 }
            ]
        },
        {
            q: "당신이 정의하는 가장 완벽하고 이상적인 사랑은?",
            options: [
                { text: "매일 평범한 일상을 특별하게 채우며 늙어가는 것", point: 1 },
                { text: "비록 멀어져도 서로의 성장에 좋은 발판이 되는 것", point: 2 },
                { text: "죽음도 갈라놓지 못할 영원한 사랑을 남기는 것", point: 3 },
                { text: "아픈 기억까지 모두 끌어안고 다시 시작하는 것", point: 4 }
            ]
        },
        {
            q: "연인에게 서운함이 생겼을 때 당신의 본능적인 행동은?",
            options: [
                { text: "귀여운 장난으로 분위기를 풀며 슬쩍 이야기한다", point: 1 },
                { text: "혼자만의 시간을 가지며 여유 있게 기다린다", point: 2 },
                { text: "그 자리에서 바로 서운함을 말하고 감정을 공유한다", point: 3 },
                { text: "영화 대사처럼 간접적으로 내 마음을 은근히 비춘다", point: 4 }
            ]
        }
    ];

    const results = [
        { min: 5, max: 6, name: "시간을 건너 사랑하는\n[어바웃 타임] 팀 & 메리", img: "⏳🌿", desc: "평범함의 위대함을 아는 당신! 일상의 소소한 행복을 소중히 여기며, 상대방을 편안하게 감싸주는 다정한 매력의 소유자입니다." },
        { min: 7, max: 8, name: "꿈을 향해 노래하는\n[비긴 어게인] 댄 & 그레타", img: "🎸🎵", desc: "사랑만큼이나 영혼의 교감을 중요시하는군요! 상처를 치유하고 서로의 성장을 돕는 성숙하고 지적인 연애 스타일입니다." },
        { min: 9, max: 10, name: "낭만과 현실 사이\n[라라랜드] 세바스찬 & 미아", img: "💃🎷", desc: "열정 가득한 로맨티스트! 비록 지금은 멀어져도 서로의 인생에 가장 아름다운 한 페이지로 남고 싶어 하는 감성적인 당신입니다." },
        { min: 11, max: 12, name: "아픈 기억까지 사랑하는\n[이터널 선샤인] 조엘 & 클레멘타인", img: "❄️💙", desc: "지우려 해도 지워지지 않는 깊은 인연을 믿으시나요? 티격태격해도 결코 떼어낼 수 없는 강렬한 운명적 사랑을 추구합니다." },
        { min: 13, max: 14, name: "현실을 뛰어넘은 지독한 사랑\n[노트북] 노아 & 앨리", img: "📔🛶", desc: "한 번 꽂히면 끝까지 가는 지독한 순애보! 장애물을 뚫고 영원한 사랑을 증명해 내는 당신의 열정은 영화보다 더 뜨겁습니다." },
        { min: 15, max: 16, name: "서로가 세상의 전부인 고귀한 사랑\n[트와일라잇] 에드워드 & 벨라", img: "🧛‍♂️🧛‍♀️", desc: "세상 모두가 반대해도 오직 연인 하나만 보는 헌신적인 사랑! 상대를 위해서라면 무엇이든 할 수 있는 강렬한 보호 본능이 넘치네요." },
        { min: 17, max: 18, name: "죽음조차 갈라놓지 못한 전설적 사랑\n[타이타닉] 잭 & 로즈", img: "🚢🛳️", desc: "짧지만 누구보다 강렬한 불꽃 같은 사랑! 모든 것을 바쳐 연인을 지키는 당신의 희생정신은 숭고한 감동을 자아냅니다." },
        { min: 19, max: 20, name: "사랑의 의미를 깨닫게 하는 성장\n[500일의 썸머] 톰 & 썸머", img: "☁️🏙️", desc: "사랑의 끝에서 나를 발견하는 성숙한 영혼! 만남과 이별의 과정을 통해 인생을 배우고 더 멋진 사람이 되어가는 현실적인 당신입니다." }
    ];

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function startTest() {
        shuffle(questions);
        questions.forEach(q => shuffle(q.options));
        document.getElementById('start-area').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        let percent = (currentQ / questions.length) * 100;
        document.getElementById('progress').style.width = percent + '%';
        document.getElementById('q-number').innerText = `Question ${currentQ + 1} / ${questions.length}`;
        let currentData = questions[currentQ];
        document.getElementById('question-text').innerText = currentData.q;
        let container = document.getElementById('options-container');
        container.innerHTML = "";
        currentData.options.forEach(opt => {
            let btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt.text;
            btn.onclick = () => nextQuestion(opt.point);
            container.appendChild(btn);
        });
    }

    function nextQuestion(point) {
        score += point;
        currentQ++;
        if (currentQ < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        
        let resultData = results.find(r => score >= r.min && score <= r.max);
        if(!resultData) resultData = results[results.length - 1];

        document.getElementById('res-image').innerText = resultData.img;
        document.getElementById('res-name').innerHTML = resultData.name.replace('\n', '<br>');
        document.getElementById('res-desc').innerHTML = resultData.desc;
    }
</script>
</body>
</html>
