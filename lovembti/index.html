<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연애 MBTI 테스트 | 나의 연애 캐릭터는? 💘</title>
    
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="연애 MBTI 테스트 | 나는 어떤 연인일까?" />
    <meta property="og:description" content="16가지 MBTI 유형으로 분석하는 나의 숨겨진 연애 스타일!" />
    <meta property="og:url" content="./" />
    <meta property="og:image" content="../assets/share-thumb.jpg" />

    <link rel="stylesheet" href="../assets/vibe-theme.css">
    <style>
        :root {
            --main-color: #ec4899; /* 핑크 */
            --bg-light: #fdf2f8;
            --border-color: #fce7f3;
            --btn-hover-shadow: rgba(236, 72, 153, 0.2);
        }
        /* 윈도우/모바일 폰트(이모티콘) 깨짐 방지 폰트 스택 추가 */
        body, .result-image, .option-btn, .result-title, .title, .btn-start {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", sans-serif !important;
        }
    </style>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="../assets/kakao-share.js" defer></script>
</head>
<body>

<div class="card">
    <div id="start-area">
        <div class="result-image">💖✨</div>
        <h1 class="title">나의 연애 캐릭터<br>MBTI 테스트</h1>
        <p class="description">5가지 질문으로 알아보는<br>나의 진짜 연애 스타일과 MBTI 유형!</p>
        <button class="btn-start" onclick="startTest()">내 캐릭터 찾기 🚀</button>
    </div>

    <div id="quiz-area" style="display: none;">
        <div class="progress-bar"><div class="progress" id="progress"></div></div>
        <div id="q-number" class="tiny" style="margin-bottom: 10px; font-weight:700;">Question 1 / 5</div>
        <div class="title" id="question-text" style="font-size: 19px; line-height: 1.4;">성향 분석 중...</div>
        <div id="options-container"></div>
    </div>

    <div id="result-area" style="display: none;">
        <div class="tiny" style="font-weight: 700; color: #ba1c67;">✨ 분석 완료! 당신의 연애 MBTI는...</div>
        <div id="res-mbti" style="font-size: 64px; font-weight: 900; color: #be185d; text-align: center; margin: 15px 0 0px 0; letter-spacing: 5px; text-shadow: 2px 2px 0px #fce7f3;">TYPE</div>
        <div id="res-name" class="result-title" style="margin-top: 5px; color: #ec4899; font-size: 24px;">결과 이름</div>
        <div id="res-image" class="result-image" style="font-size: 65px; margin-top: 15px;">❤️</div>
        
        <div class="result-box">
            <span class="result-box-title">💌 연애 성찰 리포트</span>
            <div id="res-desc" class="result-desc">결과 분석 내용이 여기에 표시됩니다.</div>
        </div>

        <div class="action-btns">
            <button class="btn-kakao">
                <img src="https://developers.kakao.com/assets/img/about/logos/kakaotalksharing/kakaotalk_sharing_btn_medium.png" width="20">
                결과 카톡 공유하기
            </button>
            <a href="https://blog.naver.com/forgiven_77/224198478277" target="_blank" class="btn-blog">
                👀 다른 테스트 구경가기
            </a>
            <button class="btn-retry" onclick="location.reload()">🔄 다시 하기</button>
        </div>
    </div>
</div>

<script>
    let currentQ = 0;
    let scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };

    const questions = [
        {
            q: "주말 데이트, 당신이 더 선호하는 분위기는?",
            options: [
                { text: "사람들 북적이는 핫플에서 활기차게 즐기기", type: ['E'] },
                { text: "우리 둘만 있는 조용한 곳에서 깊은 대화 나누기", type: ['I'] },
                { text: "맛있는 음식과 쇼핑! 눈과 입이 즐거운 데이트", type: ['E', 'S'] },
                { text: "집에서 편안하게 영화 보며 뒹굴거리는 힐링 타임", type: ['I', 'P'] }
            ]
        },
        {
            q: "연인이 갑자기 '나 오늘 기분이 안 좋아'라고 말한다면?",
            options: [
                { text: "무슨 일인데? 누가 그랬어? 구체적으로 원인을 묻는다.", type: ['T', 'S'] },
                { text: "아이고 속상해라... 바로 안아주며 마음을 달래준다.", type: ['F'] },
                { text: "기분 전환 시켜줄까? 맛있는 거 먹으러 가자고 한다.", type: ['E', 'N'] },
                { text: "조용히 곁에 있어 주며 이야기가 나올 때까지 기다린다.", type: ['I', 'F'] }
            ]
        },
        {
            q: "함께 해외여행을 가기로 했습니다. 당신의 준비 스타일은?",
            options: [
                { text: "분 단위로 맛집과 동선을 체크하는 철저한 계획파", type: ['J', 'S'] },
                { text: "가고 싶은 큰 장소만 정해두고 발길 닿는 대로 가는 자유파", type: ['P', 'N'] },
                { text: "연인의 의견에 100% 맞추며 준비를 돕는 서포터즈파", type: ['F', 'J'] },
                { text: "가기 전까지 정보만 수집하다가 닥쳐서 준비하는 실전파", type: ['P'] }
            ]
        },
        {
            q: "영화 속 연인들이 이별하는 장면을 볼 때 당신의 생각은?",
            options: [
                { text: "왜 저런 이유로 헤어지지? 현실적으로 이해가 안 된다.", type: ['T'] },
                { text: "너무 슬프다... 내 일처럼 감정이입 되어 눈물이 난다.", type: ['F', 'N'] },
                { text: "저런 상황이면 나는 어떻게 대처했을지 분석해 본다.", type: ['T', 'J'] },
                { text: "헤어질 만했네. 다음 주인공은 어떤 사랑을 할까 궁금하다.", type: ['E', 'P'] }
            ]
        },
        {
            q: "연인과 싸운 뒤, 화해하고 싶은 당신의 방식은?",
            options: [
                { text: "잘못한 건 인정! 논리적으로 대화해서 오해를 푼다.", type: ['T', 'J'] },
                { text: "진심 어린 사과와 애교 섞인 메세지로 마음을 녹인다.", type: ['F', 'E'] },
                { text: "시간을 좀 갖고 생각한 뒤 편지를 써서 전달한다.", type: ['I', 'N'] },
                { text: "함께 좋아하는 활동을 하며 자연스럽게 풀릴 때를 기다린다.", type: ['P', 'S'] }
            ]
        }
    ];

    const results = {
        ISTJ: { name: "철저한 연애 매니저", img: "💼✅", desc: "약속은 생명! 연애도 계획적으로 관리하는 든든한 등대 같은 당신. 믿음직함의 대명사군요." },
        ISFJ: { name: "다정한 로맨틱 가디언", img: "🧤💖", desc: "연인의 사소한 것까지 다 기억하는 세심함 끝판왕! 헌신적인 사랑으로 상대방을 행복하게 만드네요." },
        INFJ: { name: "통찰력 있는 소울메이트", img: "🔮🕯️", desc: "말하지 않아도 눈빛만으로 연인의 마음을 읽어내는 능력이 있군요. 깊고 진실한 사랑을 추구하는 타입입니다." },
        INTJ: { name: "전략적인 연애 고수", img: "♟️🧠", desc: "사랑도 분석하고 성장하려는 당신! 차가워 보일지 몰라도 내 사람에게는 누구보다 충성스러운 순애보입니다." },
        ISTP: { name: "자유로운 무심 로맨티스트", img: "🛵🛠️", desc: "말보다는 행동으로! 구속은 싫지만 적당한 거리에서 연인을 묵묵히 챙겨주는 츤데레의 정석입니다." },
        ISFP: { name: "예술적인 사랑꾼", img: "🎨🎨", desc: "감수성이 풍부하고 따뜻한 영혼의 소유자군요. 연인과 함께하는 소소한 일상을 한 편의 영화처럼 만들어냅니다." },
        INFP: { name: "몽환적인 낭만주의자", img: "🌙🦄", desc: "운명적인 사랑을 꿈꾸는 순수한 영혼입니다. 연인을 위해 시와 음악을 선물할 수 있는 낭만 가득한 파트너군요." },
        INTP: { name: "지적인 호기심 연인", img: "🔬📖", desc: "연애도 탐구 대상! 지적인 대화가 통하는 연인과 함께할 때 가장 행복을 느끼는 독특한 매력의 소유자입니다." },
        ESTP: { name: "짜릿한 도파민 연인", img: "⚡🔥", desc: "오늘만 산다! 지루할 틈 없는 데이트로 연인을 늘 즐겁게 만드는 에너제틱한 불도저 스타일이군요." },
        ESFP: { name: "슈퍼스타 사랑꾼", img: "🕺🥂", desc: "어딜 가나 시선 집중! 연인과 함께 즐기는 파티 같은 삶을 꿈꾸는 낙천적이고 다정한 파트너입니다." },
        ENFP: { name: "해피 바이러스 연인", img: "🎈🍭", desc: "상상력 대폭발! 매일매일 새로운 이벤트와 웃음으로 연인의 일상을 축제로 바꾸는 마법사 같은 존재입니다." },
        ENTP: { name: "유쾌한 연애 논쟁가", img: "📢🎤", desc: "지루한 연애는 거부한다! 재치 있는 농담과 지적 자극으로 연인의 마음을 흔들어놓는 매력쟁이군요." },
        ESTJ: { name: "결단력 있는 연애 리더", img: "📢🏛️", desc: "연인의 앞날까지 책임지는 든든한 지도자 스타일! 추진력 넘치는 리드와 체계적인 사랑으로 믿음직함을 줍니다." },
        ESFJ: { name: "함께하면 즐거운 조력자", img: "🥧🏠", desc: "연인과 주변 사람까지 두루 챙기는 따뜻한 마당발! 화목하고 안정적인 관계를 만들어가는 일등 공신입니다." },
        ENFJ: { name: "열정적인 로맨틱 멘토", img: "🕯️📢", desc: "연인의 성장을 돕고 아낌없이 사랑을 퍼주는 햇살 같은 당신! 누구보다 따뜻한 영향력을 행사하는 사랑꾼입니다." },
        ENTJ: { name: "카리스마 연애CEO", img: "🦁🌆", desc: "목표를 향해 함께 달리는 파워풀한 연인! 강렬한 추진력으로 연애도 인생도 최고로 이끌어가는 능력자입니다." }
    };

    function startTest() {
        document.getElementById('start-area').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        let percent = (currentQ / questions.length) * 100;
        document.getElementById('progress').style.width = percent + '%';
        document.getElementById('q-number').innerText = `Question ${currentQ + 1} / ${questions.length}`;
        let currentData = questions[currentQ];
        document.getElementById('question-text').innerText = currentData.q;
        let container = document.getElementById('options-container');
        container.innerHTML = "";
        currentData.options.forEach(opt => {
            let btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt.text;
            btn.onclick = () => nextQuestion(opt.type);
            container.appendChild(btn);
        });
    }

    function nextQuestion(types) {
        types.forEach(t => scores[t]++);
        currentQ++;
        if (currentQ < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        
        let mbti = "";
        mbti += (scores.E >= scores.I) ? "E" : "I";
        mbti += (scores.S >= scores.N) ? "S" : "N";
        mbti += (scores.T >= scores.F) ? "T" : "F";
        mbti += (scores.J >= scores.P) ? "J" : "P";

        let resultData = results[mbti] || results['ISFJ'];

        document.getElementById('res-mbti').innerText = mbti;
        document.getElementById('res-image').innerText = resultData.img;
        document.getElementById('res-name').innerHTML = resultData.name.replace('\n', '<br>');
        document.getElementById('res-desc').innerHTML = resultData.desc;
    }
</script>
</body>
</html>
