<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>찰떡궁합 이상형 MBTI 찾기 | 나의 운명적 짝꿍은? 💘</title>
    
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="나와 100% 찰떡궁합인 연인 MBTI 찾기 💘" />
    <meta property="og:description" content="16가지 MBTI 유형 중 내 취향을 제대로 저격하는 완벽한 이상형은 누구일까?" />
    <meta property="og:url" content="./" />
    <meta property="og:image" content="../assets/share-thumb.jpg" />

    <link rel="stylesheet" href="../assets/vibe-theme.css">
    <style>
        :root {
            --main-color: #ec4899; /* 핑크 */
            --bg-light: #fdf2f8;
            --border-color: #fce7f3;
            --btn-hover-shadow: rgba(236, 72, 153, 0.2);
        }
        /* 윈도우/모바일 폰트(이모티콘) 깨짐 방지 폰트 스택 추가 */
        body, .result-image, .option-btn, .result-title, .title, .btn-start {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", sans-serif !important;
        }
    </style>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="../assets/kakao-share.js" defer></script>
</head>
<body>

<div class="card">
    <div id="start-area">
        <div class="result-image">💖✨</div>
        <h1 class="title">나의 찰떡궁합<br>이상형 MBTI 찾기</h1>
        <p class="description">5가지 데이트 취향 질문으로 알아보는<br>나와 100% 매칭되는 완벽한 짝꿍의 MBTI!</p>
        <button class="btn-start" onclick="startTest()">내 이상형 찾기 🚀</button>
    </div>

    <div id="quiz-area" style="display: none;">
        <div class="progress-bar"><div class="progress" id="progress"></div></div>
        <div id="q-number" class="tiny" style="margin-bottom: 10px; font-weight:700;">Question 1 / 5</div>
        <div class="title" id="question-text" style="font-size: 19px; line-height: 1.4;">성향 분석 중...</div>
        <div id="options-container"></div>
    </div>

    <div id="result-area" style="display: none;">
        <div class="tiny" style="font-weight: 700; color: #ba1c67;">✨ 분석 완료! 당신의 운명적 찰떡궁합은...</div>
        <div id="res-mbti" style="font-size: 64px; font-weight: 900; color: #be185d; text-align: center; margin: 15px 0 0px 0; letter-spacing: 5px; text-shadow: 2px 2px 0px #fce7f3;">TYPE</div>
        <div id="res-name" class="result-title" style="margin-top: 5px; color: #ec4899; font-size: 24px;">결과 이름</div>
        <div id="res-image" class="result-image" style="font-size: 65px; margin-top: 15px;">❤️</div>
        
        <div class="result-box">
            <span class="result-box-title">💌 이상형 분석 리포트</span>
            <div id="res-desc" class="result-desc">결과 분석 내용이 여기에 표시됩니다.</div>
        </div>

        <div class="action-btns">
            <button class="btn-kakao">
                <img src="https://developers.kakao.com/assets/img/about/logos/kakaotalksharing/kakaotalk_sharing_btn_medium.png" width="20">
                내 이상형 카톡 공유하기
            </button>
            <a href="https://blog.naver.com/forgiven_77/224198478277" target="_blank" class="btn-blog">
                👀 다른 테스트 구경 가기
            </a>
            <button class="btn-retry" onclick="location.reload()">🔄 다시 찾기</button>
        </div>
    </div>
</div>

<script>
    let currentQ = 0;
    let scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };

    const questions = [
        {
            q: "주말 데이트, 내가 더 선호하는 연인의 데이트 리드 방식은?",
            options: [
                { text: "\"여기 요즘 핫하대! 나가서 놀자!\" 활동적으로 분위기를 리드하는 연인", type: ['E'] },
                { text: "\"조용한 카페 가서 우리끼리 실컷 얘기하자.\" 나에게 온전히 집중해 주는 연인", type: ['I'] },
                { text: "\"맛집 리스트 다 뽑아왔어!\" 철저하게 눈과 입을 만족시켜주는 꼼꼼한 느낌", type: ['E', 'S'] },
                { text: "\"비도 오는데 우리 집에서 넷플릭스 뒹굴까?\" 편안하고 나른한 힐링 코스", type: ['I', 'P'] }
            ]
        },
        {
            q: "내가 속상한 일이 생겨서 털어놓았을 때, 더 감동적인 연인의 반응은?",
            options: [
                { text: "\"그래서 어떻게 해결됐어?\" 이성적이고 가장 현실적인 도움이 되어주는 반응", type: ['T', 'S'] },
                { text: "\"많이 힘들었겠다, 이리 와.\" 묻고 따지지도 않고 진심 다해 꼭 안아주는 포근한 위로", type: ['F'] },
                { text: "\"그런 우울한 생각하지 말고 드라이브 나갈까?\" 당장 기분을 즐겁게 바꿔주는 행동파", type: ['E', 'N'] },
                { text: "말없이 내 곁을 내내 지키며, 묵묵히 기분 풀릴 때까지 눈을 맞추며 들어주는 부드러움", type: ['I', 'F'] }
            ]
        },
        {
            q: "함께 첫 해외여행을 떠날 때, 내가 더 의지하고 싶어지는 연인의 스타일은?",
            options: [
                { text: "\"비행기 시간, 맞집 예약, 동선 다 준비했어! 나만 따라와!\" 완벽하고 철저한 J형", type: ['J', 'S'] },
                { text: "\"일단 도착해서 끌리는 곳 재미있어 보이는 곳으로 가자!\" 여유롭고 프리한 P형", type: ['P', 'N'] },
                { text: "\"자기가 가고 싶은 곳 위주로 맞출게! 편하게 말해.\" 배려심 넘치게 맞춰주는 포용력", type: ['F', 'J'] },
                { text: "\"그냥 일단 당장 비행기표부터 예매하고 무작정 가 보자!\" 추진력 하나는 엄청난 실전파", type: ['P'] }
            ]
        },
        {
            q: "평소 티키타카 대화를 나눌 때, 나와 눈빛이 반짝 통하는 연인상은?",
            options: [
                { text: "현실적이고 객관적인 통계를 들며 똑 부러지는 팩트를 짚어주는 똑똑한 대화", type: ['T', 'S'] },
                { text: "\"만약에 우리가 그 주인공이라면 어떻게 할 거야?\" 감수성 넘치고 귀여운 과몰입충 대화", type: ['F', 'N'] },
                { text: "\"내 생각은 이래. 넌 어떻게 생각해?\" 논리적이고 깊이 있는 대화를 리드하는 모습", type: ['T', 'J'] },
                { text: "복잡한 생각 없이 밈(Meme)과 드립 치면서 빵빵 터지는 직관적이고 엄청 재밌는 대화", type: ['E', 'P'] }
            ]
        },
        {
            q: "가벼운 언쟁을 한 뒤, 화해하고 싶을 때 연인이 보여줬으면 하는 이상적인 모습은?",
            options: [
                { text: "\"이건 내 잘못이 맞아. 앞으론 이렇게 고칠게.\" 논리적으로 인정하는 쿨하고 군더더기 없는 모습", type: ['T', 'J'] },
                { text: "\"내가 미안해~ 속상했어? 얼굴 보자.\" 애교 섞인 텐션과 부드러운 스킨십으로 바로 녹여버리는 모습", type: ['F', 'E'] },
                { text: "서로 생각할 시간을 가진 뒤, 아주 솔직한 진심을 꾹꾹 담은 장문의 편지나 톡을 건네는 따뜻함", type: ['I', 'N'] },
                { text: "\"우리 뭐 맛있는 거 먹고 그냥 풀자!\" 꽁해 있지 않고 자연스럽고 아무 일 없었다는 듯 훌훌 터는 쿨함", type: ['P', 'S'] }
            ]
        }
    ];

    const results = {
        ISTJ: { name: "철저하고 든든한 매니저 연인", img: "💼✅", desc: "당신에게 어울리는 찰떡궁합은 약속과 책임을 중요시하는 ISTJ입니다! 계획적이고 단단한 멘탈로 엇나감 없이 당신을 든든하게 가장 가까이서 지켜주는 믿음직한 파트너입니다." },
        ISFJ: { name: "다정다감한 로맨틱 가디언", img: "🧤💖", desc: "사소한 것 하나 스쳐 지나가지 않고 다 기억하고 챙겨주는 ISFJ! 한없이 다정하고 헌신적인 사랑으로 당신의 마음을 100% 편안하게, 안전하게 만들어 줄 것입니다." },
        INFJ: { name: "통찰력 있는 고요한 소울메이트", img: "🔮🕯️", desc: "눈빛만 봐도 당신의 속마음을 다 알아채는 INFJ! 가벼운 관계보다는 영혼이 통하는 깊고 진실한 대화를 나눌 수 있는, 당신의 모든 것을 이해하는 성숙하고 깊은 짝꿍입니다." },
        INTJ: { name: "치명적인 지성파 엘리트 전략가", img: "♟️🧠", desc: "차가워 보이지만 내 사람에겐 확실한 순애보, 매력덩어리 INTJ! 무심한 듯 챙겨주는 츤데레 매력과 누구보다 뛰어난 지적인 논리 대화로 당신에게 엄청난 자극을 줍니다." },
        ISTP: { name: "자유롭고 쿨한 무심 로맨티스트", img: "🛵🛠️", desc: "구속은 극혐, 하지만 내 사람에겐 따뜻한! 독립적이고 쿨한 ISTP와 궁합이 맞네요. 평소엔 정말 무심해 보이지만 행동으로 묵묵히 먼저 챙겨주는 반전 매력이 있습니다." },
        ISFP: { name: "부드럽고 여유로운 낭만 예술가", img: "🎨🎨", desc: "따뜻하고 여유로운 성격 가득한 매력의 ISFP! 감정이나 행동을 조금도 강요하지 않고 당신 자체를 100% 포용해 주며, 소소하고 편안한 연애를 선호하는 최고의 힐러 짝꿍입니다." },
        INFP: { name: "동화 속 사랑을 꿈꾸는 낭만주의자", img: "🌙🦄", desc: "감수성이 풍부하고 사랑 앞에서는 직진 진심인 INFP! 당신에게 한 편의 동화 같은 로맨스와 세심한 감동을 매일매일 서프라이즈로 선물해 줄 로맨티스트입니다." },
        INTP: { name: "지적 호기심이 넘치는 엉뚱 매력", img: "🔬📖", desc: "뻔한 데이트보다는 독특한 포인트와 대화가 폭발하는 INTP! 알면 알수록 묘한 까칠함 속에 숨겨진 엉뚱한 귀여움이 가득하여 절대 당신이 질릴 틈이 없는 연인입니다." },
        ESTP: { name: "짜릿한 도파민 폭발 직진 불도저", img: "⚡🔥", desc: "세상의 중심, 지루할 틈 단 1초도 없는 ESTP! 당신을 쉴 새 없이 좋은 곳 재미있는 곳으로 데리고 다니며 신나는 경험과 짜릿한 도파민 에너지를 끊임없이 뿜어냅니다." },
        ESFP: { name: "어딜 가나 시선 집중, 파티 연인", img: "🕺🥂", desc: "언제나 인싸, 낙천적이고 매력 빵빵 터지는 ESFP! 넘쳐흐르는 애교와 엄청나고 활기찬 주변 리액션으로 당신의 지루한 일상을 가장 재밌는 축제로 생생하게 만듭니다." },
        ENFP: { name: "상상력 넘치는 골든 리트리버", img: "🎈🍭", desc: "항상 새로운 걸 너무 좋아하고 밝음 그 자체인 ENFP! 오직 당신을 빵 터뜨리고 웃기기 위해 매일 애교와 이벤트를 기획할 만큼 사랑 넘치는 햇살 댕댕이 짝꿍입니다." },
        ENTP: { name: "유쾌한 재치 발랄 뇌섹남/녀", img: "📢🎤", desc: "재치 넘치는 논쟁과 승부를 즐기는, 뇌가 섹시한 ENTP! 뻔한 데이트는 완전 질색, 늘 색다른 아이디어와 개그 코드로 당신을 골치 아프고(?) 미치건 즐겁게 해 줍니다." },
        ESTJ: { name: "체계적인 추진력 대마왕 리더", img: "📢🏛️", desc: "당신의 앞길까지 깔끔하게 설계하고 책임져 주는 든든한 대장 ESTJ! 어떤 문제든 단박에 척척 해결하며 흔들림 없는 현실적인 사랑과 엄청난 책임감을 다하는 강철 연인입니다." },
        ESFJ: { name: "모두가 부러워하는 타고난 조력자", img: "🥧🏠", desc: "엄청나게 세심하고 배려심 폭발하는 사랑 넘치는 ESFJ! 내 연인뿐만 아니라 내 주변 사람들의 생일까지 너무 잘 챙겨서 내 평판마저 올려줄, 모두가 칭찬할 따뜻한 짝꿍입니다." },
        ENFJ: { name: "아낌없이 부어주는 햇살 멘토", img: "🕯️📢", desc: "마치 여름날 태양처럼 열정이 가득한 오지라퍼 ENFJ! 당신이 언제나 긍정적으로 발전할 수 있게 아낌없는 칭찬 폭격과 로맨틱한 동기부여를 계속해서 펌프질해 줍니다." },
        ENTJ: { name: "카리스마 폭발 능력지상주의 CEO", img: "🦁🌆", desc: "강렬하고 야망 넘미치는 열혈 불도저 ENTJ! 나약한 투정보다는, 연애도 인생도 모두 당신과 함께 최고의 반열에 오르고자 같이 발맞춰 달리는 추진력 폭발 최강 파워풀 파트너입니다." }
    };

    function startTest() {
        document.getElementById('start-area').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        let percent = (currentQ / questions.length) * 100;
        document.getElementById('progress').style.width = percent + '%';
        document.getElementById('q-number').innerText = `Question ${currentQ + 1} / ${questions.length}`;
        let currentData = questions[currentQ];
        document.getElementById('question-text').innerText = currentData.q;
        let container = document.getElementById('options-container');
        container.innerHTML = "";
        currentData.options.forEach(opt => {
            let btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt.text;
            btn.onclick = () => nextQuestion(opt.type);
            container.appendChild(btn);
        });
    }

    function nextQuestion(types) {
        types.forEach(t => scores[t]++);
        currentQ++;
        if (currentQ < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        
        let mbti = "";
        mbti += (scores.E >= scores.I) ? "E" : "I";
        mbti += (scores.S >= scores.N) ? "S" : "N";
        mbti += (scores.T >= scores.F) ? "T" : "F";
        mbti += (scores.J >= scores.P) ? "J" : "P";

        let resultData = results[mbti] || results['ISFJ'];

        document.getElementById('res-mbti').innerText = mbti;
        document.getElementById('res-image').innerText = resultData.img;
        document.getElementById('res-name').innerHTML = resultData.name.replace('\n', '<br>');
        document.getElementById('res-desc').innerHTML = resultData.desc;
    }
</script>
</body>
</html>
