<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연애 MBTI 테스트 | 로맨틱한 나의 성향 찾기 💘</title>
    
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="연애 MBTI 테스트 | 나의 연애 유형은?" />
    <meta property="og:description" content="첫 데이트부터 기념일까지! 상황으로 알아보는 나의 연애 MBTI" />
    <meta property="og:url" content="./" />
    <meta property="og:image" content="../assets/share-thumb.jpg" />

    <link rel="stylesheet" href="../assets/vibe-theme.css">
    <style>
        :root {
            --main-color: #ec4899; /* 핫핑크 */
            --bg-light: #fdf2f8;
            --border-color: #fbcfe8;
            --btn-hover-shadow: rgba(236, 72, 153, 0.2);
        }
    </style>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="../assets/kakao-share.js" defer></script>
</head>
<body>

<div class="card">
    <div id="start-area">
        <div class="result-image">👩‍❤️‍👨✨</div>
        <h1 class="title">로맨틱 연애 MBTI<br>심리 테스트</h1>
        <p class="description">당신의 연애 세포는 어떤 성향일까요?<br>상황극을 통해 알아보는 나의 진짜 유형!</p>
        <button class="btn-start" onclick="startTest()">유형 확인하기 🚀</button>
    </div>

    <div id="quiz-area" style="display: none;">
        <div class="progress-bar"><div class="progress" id="progress"></div></div>
        <div id="q-number" class="tiny" style="margin-bottom: 10px; font-weight:700;">Question 1 / 5</div>
        <div class="title" id="question-text" style="font-size: 19px; line-height: 1.5;">상황 로딩 중...</div>
        <div id="options-container"></div>
    </div>

    <div id="result-area" style="display: none;">
        <div class="tiny" style="font-weight: 700;">당신의 최종 연애 유형은?</div>
        <div id="res-image" class="result-image">💖</div>
        <div id="res-name" class="result-title">결과 이름</div>
        
        <div class="result-box">
            <span class="result-box-title">💌 스페셜 연애 리포트</span>
            <div id="res-desc" class="result-desc">결과 분석 내용이 여기에 표시됩니다.</div>
        </div>

        <div class="action-btns">
            <button class="btn-kakao">
                <img src="https://developers.kakao.com/assets/img/about/logos/kakaotalksharing/kakaotalk_sharing_btn_medium.png" width="20">
                내 유형 결과 공유하기
            </button>
            <a href="https://blog.naver.com/forgiven_77/224198478277" target="_blank" class="btn-blog">
                👀 다른 테스트 구경가기
            </a>
            <button class="btn-retry" onclick="location.reload()">🔄 다시 테스트하기</button>
        </div>
    </div>
</div>

<script>
    let currentQ = 0;
    let score = { E: 0, I: 0, F: 0, T: 0 };

    const questions = [
        {
            q: "드디어 기다리고 기다리던 첫 데이트 날! 약속 장소에 5분 일찍 도착한 당신, 멀리서 걸어오는 상대방을 발견했을 때 가장 먼저 드는 생각은?",
            options: [
                { text: "와, 멀리서 봐도 아우라가 장난 아냐! 밝게 손 흔들며 크게 인사해야지!", type: 'E' },
                { text: "심장이 터질 것 같아... 눈이 마주치면 무슨 첫마디를 건네야 어색하지 않을까?", type: 'I' }
            ]
        },
        {
            q: "연인과 함께 길을 걷다가 평소 가보고 싶었던 아주 힙한 카페가 만석인 것을 발견했습니다. 이때 당신의 대처는?",
            options: [
                { text: "옆에 대기자가 많아도 일단 대기 명단에 이름을 적고, 기다리는 동안 근처 구경을 하자고 제안한다.", type: 'E' },
                { text: "사람이 너무 많아 기가 빨린다... 그냥 조용하고 한적한 근처 다른 카페로 가자고 슬쩍 말해본다.", type: 'I' }
            ]
        },
        {
            q: "연인이 갑자기 속상한 일이 있다며 눈물을 글썽이며 전화를 했습니다. 상황을 들어보니 연인이 실수한 부분도 있는 것 같은데, 당신은 어떻게 말해줄까요?",
            options: [
                { text: "많이 속상했지? 누구보다 네 마음이 제일 중요해. 일단 진정하고 맛있는 거 먹으러 갈까?", type: 'F' },
                { text: "그런 일이 있었구나... 근데 그 부분은 네가 이렇게 대처했으면 더 나았을 것 같은데?", type: 'T' }
            ]
        },
        {
            q: "기념일을 앞두고 연인에게 줄 선물을 고르는 당신! 당신의 쇼핑 스타일은 어느 쪽에 가까운가요?",
            options: [
                { text: "평소 연인이 필요하다고 했던 것들을 리스트업해서 실용적이고 확실한 선물을 고른다.", type: 'T' },
                { text: "선물을 받고 감동할 연인의 얼굴을 상상하며, 편지와 함께 감성적인 선물을 준비한다.", type: 'F' }
            ]
        },
        {
            q: "둘만의 오붓한 여행 계획을 세우는 중! 당신이 더 선호하는 여행 스타일은 무엇인가요?",
            options: [
                { text: "맛집, 카페, 동선까지 완벽하게 짜여진 엑셀 계획표를 공유하며 연인을 리드한다.", type: 'T' },
                { text: "큰 틀만 정해두고 그날의 기분과 분위기에 맞춰 즉흥적으로 움직이는 낭만을 즐긴다.", type: 'F' }
            ]
        }
    ];

    const results = {
        EF: { 
            name: "사랑의 에너자이저\n무한 애정 댕댕이형", 
            img: "🐶💖", 
            desc: "당신은 연인에게 아낌없이 표현하고 온 세상의 밝은 에너지를 다 끌어모아 주는 진정한 사랑꾼입니다! 당신과 함께라면 지루할 틈이 없고, 상대방은 당신의 넘치는 활력에 매일매일이 축제 같을 거예요. 주변에서 가장 부러워하는 '워너비 파트너' 1순위!" 
        },
        ET: { 
            name: "카리스마 데이트 설계자\n열정적인 로맨스 CEO", 
            img: "🦁🔥", 
            desc: "분위기 좋은 맛집부터 완벽한 미래 계획까지! 주도적으로 연애를 이끌어가는 듬직하고 멋진 리더십의 소유자입니다. 당신의 확신 있는 모습에 상대방은 큰 매력과 안정감을 동시에 느낍니다. 세상을 다 가진 것 같은 든든함을 선물하는 타입!" 
        },
        IF: { 
            name: "마음을 읽는 소울메이트\n포근한 수호천사", 
            img: "👼☁️", 
            desc: "상대방의 작은 숨소리 하나도 섬세하게 알아채고 배려해주는 세상에 하나뿐인 힐러 스타일입니다. 당신의 따뜻한 위로와 깊은 공감은 연인에게 그 어떤 것보다 큰 안식처가 됩니다. 존재만으로도 힐링이 되는 귀한 사람!" 
        },
        IT: { 
            name: "츤데레의 정석\n지적인 시크릿 가디언", 
            img: "🐱💎", 
            desc: "겉으로는 조금 무심해 보일 수 있어도, 속으로는 누구보다 연인을 깊게 생각하고 뒤에서 묵묵히 챙겨주는 스타일입니다. 당신이 툭 던지는 진중한 배려에 상대방은 예상치 못한 감동의 쓰나미를 겪게 될 거예요. 알면 알수록 진국인 매력 덩어리!" 
        }
    };

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function startTest() {
        shuffle(questions);
        questions.forEach(q => shuffle(q.options));
        document.getElementById('start-area').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        let percent = (currentQ / questions.length) * 100;
        document.getElementById('progress').style.width = percent + '%';
        document.getElementById('q-number').innerText = `Question ${currentQ + 1} / ${questions.length}`;
        let currentData = questions[currentQ];
        document.getElementById('question-text').innerText = currentData.q;
        let container = document.getElementById('options-container');
        container.innerHTML = "";
        currentData.options.forEach(opt => {
            let btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt.text;
            btn.onclick = () => nextQuestion(opt.type);
            container.appendChild(btn);
        });
    }

    function nextQuestion(type) {
        score[type]++;
        currentQ++;
        if (currentQ < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        let prefix = score.E >= score.I ? 'E' : 'I';
        let suffix = score.F >= score.T ? 'F' : 'T';
        let finalType = prefix + suffix;
        let resultData = results[finalType] || results['EF'];
        document.getElementById('res-image').innerText = resultData.img;
        document.getElementById('res-name').innerHTML = resultData.name.replace('\n', '<br>');
        document.getElementById('res-desc').innerHTML = resultData.desc;
    }
</script>
</body>
</html>
