<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연애 MBTI 테스트 | 나만의 연애 바이브 스캐너</title>
    
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="나와 딱 맞는 연애 MBTI는? | 연애 MBTI 테스트" />
    <meta property="og:description" content="당신의 연애 바이브를 분석하여 숨겨진 연애 성향을 찾아드립니다. 당신의 MBTI는?" />
    <meta property="og:url" content="./" />
    <meta property="og:image" content="../assets/share-thumb.jpg" />

    <link rel="stylesheet" href="../assets/vibe-theme.css">
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="../assets/kakao-share.js" defer></script>
</head>
<body>

<div class="card">
    <div id="start-area">
        <div class="result-image">💖</div>
        <h1 class="title">나와 딱 맞는<br>연애 MBTI 스캐너</h1>
        <p class="description">당신의 연애 바이브를 분석하여<br>숨겨진 연애 성향을 찾아드립니다.</p>
        <button class="btn-start" onclick="startTest()">연애 성향 스캔 시작 🔍</button>
    </div>

    <div id="quiz-area" style="display: none;">
        <div class="progress-bar"><div class="progress" id="progress"></div></div>
        <div id="q-number" class="tiny" style="margin-bottom: 10px; font-weight:700;">Question 1 / 5</div>
        <div class="title" id="question-text" style="font-size: 20px;">질문 불러오는 중...</div>
        <div id="options-container"></div>
    </div>

    <div id="result-area" style="display: none;">
        <div class="tiny" style="font-weight: 700;">나의 연애 MBTI 결과</div>
        <div id="res-image" class="result-image">✨</div>
        <div id="res-name" class="result-title">결과 이름</div>
        
        <div class="result-box">
            <span class="result-box-title">🔍 연애 전문가 분석</span>
            <div id="res-desc" class="result-desc">결과 설명이 여기에 나옵니다.</div>
        </div>

        <div class="action-btns">
            <button class="btn-kakao">
                <img src="https://developers.kakao.com/assets/img/about/logos/kakaotalksharing/kakaotalk_sharing_btn_medium.png" width="20">
                내 연애 성향 공유하기
            </button>
            <a href="https://blog.naver.com/forgiven_77/224195220807" target="_blank" class="btn-blog">
                👀 다른 재미있는 테스트 구경가기
            </a>
            <button class="btn-retry" onclick="location.reload()">🔄 다시 테스트하기</button>
        </div>
    </div>
</div>

<script>
    let currentQ = 0;
    let score = { E: 0, I: 0, F: 0, T: 0 };

    const questions = [
        {
            q: "주말에 연인과 데이트를 한다면?",
            options: [
                { text: "사람 많은 핫플레이스 탐방", type: 'E' },
                { text: "조용한 집에서 넷플릭스 보기", type: 'I' },
                { text: "연인이 가고 싶어 하는 곳", type: 'F' },
                { text: "내가 미리 계획해둔 효율적 코스", type: 'T' }
            ]
        },
        {
            q: "연인이 갑자기 '나 오늘 좀 우울해'라고 한다면?",
            options: [
                { text: "무슨 일이야? 속상했겠다 (공감)", type: 'F' },
                { text: "왜 우울해? 무슨 일 생겼어? (이해)", type: 'T' },
                { text: "맛있는 거 먹으러 나갈까? (기분전환)", type: 'E' },
                { text: "내가 가서 꼭 안아줄게 (위로)", type: 'I' }
            ]
        },
        {
            q: "기념일을 앞둔 당신의 태도는?",
            options: [
                { text: "한 달 전부터 완벽한 데이트 코스 짜기", type: 'T' },
                { text: "연인의 정성이 담긴 선물이면 충분해", type: 'F' },
                { text: "친구들 불러서 파티하면 안 돼?", type: 'E' },
                { text: "둘만의 오붓한 시간이 가장 소중해", type: 'I' }
            ]
        },
        {
            q: "다툼이 생겼을 때 나의 스타일은?",
            options: [
                { text: "그 자리에서 바로 풀고 대화해야 함", type: 'E' },
                { text: "혼자 생각할 시간이 조금 필요함", type: 'I' },
                { text: "상대방의 감정이 상하지 않게 조심함", type: 'F' },
                { text: "잘잘못을 따져서 확실히 짚고 넘어감", type: 'T' }
            ]
        },
        {
            q: "내가 생각하는 가장 이상적인 연애는?",
            options: [
                { text: "서로의 일상을 열정적으로 공유하는 연애", type: 'E' },
                { text: "가랑비에 옷 젖듯 편안한 연애", type: 'I' },
                { text: "사랑 표현을 아끼지 않는 감성적인 연애", type: 'F' },
                { text: "서로의 성장을 돕는 이성적인 연애", type: 'T' }
            ]
        }
    ];

    const results = {
        EF: { name: "사랑이 넘치는\n사랑꾼 댕댕이형", img: "🐶", desc: "당신은 연인에게 아낌없이 표현하고 에너지를 주는 스타일이군요! 당신과 함께라면 지루할 틈이 없을 거예요. 주변 사람들도 부러워하는 훌륭한 파트너입니다." },
        ET: { name: "리드하는 매력\n열정적인 CEO형", img: "🦁", desc: "데이트 코스부터 미래 계획까지! 주도적으로 연애를 이끌어가는 카리스마 넘치는 스타일입니다. 믿음직스러운 모습이 상대방에게 큰 매력으로 다가갈 거예요." },
        IF: { name: "말하지 않아도 알아요\n포근한 수호천사형", img: "👼", desc: "상대방의 작은 변화도 섬세하게 알아채고 배려해주는 포근한 스타일입니다. 당신의 따뜻한 위로와 공감은 연인에게 가장 큰 안식처가 될 거예요." },
        IT: { name: "차분하고 깊은 사랑\n츤데레 전략가형", img: "🐱", desc: "겉으로는 무심해 보일 수 있어도 속으로는 누구보다 깊게 생각하고 챙겨주는 스타일입니다. 당신의 진중한 모습에 상대방은 큰 안정감을 느낄 거예요." }
    };

    function startTest() {
        document.getElementById('start-area').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        let percent = (currentQ / questions.length) * 100;
        document.getElementById('progress').style.width = percent + '%';
        let currentData = questions[currentQ];
        document.getElementById('question-text').innerText = currentData.q;
        let container = document.getElementById('options-container');
        container.innerHTML = "";
        currentData.options.forEach(opt => {
            let btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt.text;
            btn.onclick = () => nextQuestion(opt.type);
            container.appendChild(btn);
        });
    }

    function nextQuestion(type) {
        score[type]++;
        currentQ++;
        if (currentQ < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        let prefix = score.E >= score.I ? 'E' : 'I';
        let suffix = score.F >= score.T ? 'F' : 'T';
        let finalType = prefix + suffix;
        let resultData = results[finalType] || results['EF'];
        document.getElementById('res-image').innerText = resultData.img;
        document.getElementById('res-name').innerHTML = resultData.name.replace('\n', '<br>');
        document.getElementById('res-desc').innerHTML = resultData.desc;
    }
</script>
</body>
</html>
