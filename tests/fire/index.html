  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

      "잘 맞는 상대와 만나면 최고의 케미를 만들 수 있어요."
    ].join(" "),
    tip:"불안이 올라올 때는 ‘확인 질문’ 대신 ‘내 상태 공유’로 바꿔보세요. 공격성이 줄고 친밀감은 더 올라갑니다."
  },
  {
    id:"R8",
    name:"🌈 핫팩 100도형",
    range:[93, 100],
    chips:["애정폭발", "헌신", "올인"],
    desc:[
      "당신의 연애는 기본적으로 ‘뜨겁고 진하다’에 가깝습니다.",
      "표현, 배려, 몰입이 모두 강합니다.",
      "단 하나만 조절하면 ‘완벽한 연애 온도’가 됩니다."
    ].join(" "),
    tip:"상대가 받을 준비가 되었는지 ‘속도’만 체크해보세요. 속도만 맞으면 장점이 전부 빛납니다."
  },
];

function pickResult(temp){
  const t = clamp(temp, 0, 100);
  return RESULTS.find(r => t >= r.range[0] && t <= r.range[1]) || RESULTS[RESULTS.length-1];
}

/** =============================
 *  상태
 * ============================= */
let order = [];
let idx = 0;
let score = 50; // 기본 온도 베이스(중간값)에서 시작 후 선택지로 증감

/** =============================
 *  DOM
 * ============================= */
const screenStart = document.getElementById("screenStart");
const screenQuiz  = document.getElementById("screenQuiz");
const screenResult= document.getElementById("screenResult");
const bar = document.getElementById("bar");
const qText = document.getElementById("qText");
const answers = document.getElementById("answers");

const rName = document.getElementById("rName");
const rMeter = document.getElementById("rMeter");
const rDesc = document.getElementById("rDesc");
const rTip = document.getElementById("rTip");
const rChips = document.getElementById("rChips");

/** =============================
 *  화면 전환
 * ============================= */
function showStart(){
  screenStart.classList.remove("hide");
  screenQuiz.classList.add("hide");
  screenResult.classList.add("hide");
}
function showQuiz(){
  screenStart.classList.add("hide");
  screenQuiz.classList.remove("hide");
  screenResult.classList.add("hide");
}
function showResult(){
  screenStart.classList.add("hide");
  screenQuiz.classList.add("hide");
  screenResult.classList.remove("hide");
}

/** =============================
 *  퀴즈 진행
 * ============================= */
function startTest(){
  // 질문 순서 랜덤
  order = shuffle(QUESTIONS.map((_,i)=>i));
  idx = 0;
  score = 50;

  showQuiz();
  renderQuestion();
}

function renderQuestion(){
  const total = QUESTIONS.length;
  const progress = (idx / total) * 100;
  bar.style.width = `${progress}%`;

  const q = QUESTIONS[order[idx]];
  qText.textContent = q.q;

  // 선택지 순서도 랜덤
  const opts = shuffle(q.a);

  answers.innerHTML = "";
  opts.forEach(opt=>{
    const b = document.createElement("button");
    b.className = "btn";
    b.type = "button";
    b.textContent = opt.t;
    b.addEventListener("click", ()=>{
      score += opt.v;
      idx += 1;

      if(idx >= total){
        bar.style.width = "100%";
        finishTest();
      }else{
        renderQuestion();
      }
    });
    answers.appendChild(b);
  });
}

function finishTest(){
  const temp = clamp(Math.round(score), 0, 100);
  const res = pickResult(temp);

  rName.textContent = res.name;
  rMeter.textContent = `연애 온도 ${temp}°`;
  rDesc.textContent = res.desc;
  rTip.textContent = res.tip;

  rChips.innerHTML = "";
  res.chips.forEach(c=>{
    const s = document.createElement("span");
    s.className = "chip";
    s.textContent = `#${c}`;
    rChips.appendChild(s);
  });

  showResult();
  fireConfetti();

  setupKakaoShare({
    title: "나의 연애 온도 테스트",
    description: `${res.name} / 연애 온도 ${temp}°`,
    imageUrl: new URL(DEFAULT_THUMB, PAGE_URL).toString(),
    linkUrl: PAGE_URL
  });
}

/** =============================
 *  카카오 공유
 *  - 버튼 클릭 시 hidden 버튼 방식 사용
 * ============================= */
function setupKakaoShare({title, description, imageUrl, linkUrl}){
  // createDefaultButton는 동일 id에 여러번 달면 중복될 수 있어서, 매번 새로 바인딩합니다.
  const hidden = document.getElementById("kakaoHidden");
  hidden.replaceWith(hidden.cloneNode(true));
  const newHidden = document.getElementById("kakaoHidden");

  if(!window.Kakao) return;

  try{
    Kakao.Share.createDefaultButton({
      container: '#kakaoHidden',
      objectType: 'feed',
      content: {
        title,
        description,
        imageUrl,
        link: {
          mobileWebUrl: linkUrl,
          webUrl: linkUrl,
        },
      },
      buttons: [
        {
          title: '테스트 하러가기',
          link: {
            mobileWebUrl: linkUrl,
            webUrl: linkUrl,
          },
        }
      ],
    });
  }catch(e){
    // 도메인 미등록/환경 문제 등일 수 있음
  }

  document.getElementById("btnKakao").onclick = ()=>{
    // hidden 버튼 클릭 유도
    newHidden.click();
  };
}

/** =============================
 *  결과 버튼 2개
 * ============================= */
document.getElementById("btnOther").addEventListener("click", ()=>{
  window.open(OTHER_TEST_URL, "_blank");
});
document.getElementById("btnRetry").addEventListener("click", ()=>{
  showStart();
});

/** =============================
 *  시작 버튼
 * ============================= */
document.getElementById("btnStart").addEventListener("click", startTest);

/** =============================
 *  confetti (가벼운 자체 구현)
 * ============================= */
function fireConfetti(){
  const c = document.getElementById("fx");
  const ctx = c.getContext("2d");
  const W = c.width = window.innerWidth;
  const H = c.height = window.innerHeight;

  const pieces = [];
  const N = 140;

  for(let i=0;i<N;i++){
    pieces.push({
      x: Math.random()*W,
      y: -20 - Math.random()*H*0.2,
      r: 3 + Math.random()*4,
      vx: -2 + Math.random()*4,
      vy: 2 + Math.random()*5,
      rot: Math.random()*Math.PI,
      vr: -0.15 + Math.random()*0.3,
      life: 0,
      max: 120 + Math.random()*40
    });
  }

  let frame = 0;
  function tick(){
    frame++;
    ctx.clearRect(0,0,W,H);

    pieces.forEach(p=>{
      p.x += p.vx;
      p.y += p.vy;
      p.rot += p.vr;
      p.vy += 0.03; // gravity
      p.life++;

      // 색 지정은 안 해도 되지만, confetti 느낌 위해 최소한만 사용 (템플릿 분위기 유지)
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.globalAlpha = Math.max(0, 1 - p.life/p.max);
      ctx.fillStyle = "rgba(255,255,255,0.9)";
      ctx.fillRect(-p.r, -p.r, p.r*2.2, p.r*1.2);
      ctx.restore();
    });

    const alive = pieces.some(p=>p.life < p.max && p.y < H+40);
    if(alive && frame < 220){
      requestAnimationFrame(tick);
    }else{
      ctx.clearRect(0,0,W,H);
    }
  }
  tick();
}
window.addEventListener("resize", ()=>{
  const c = document.getElementById("fx");
  c.width = window.innerWidth;
  c.height = window.innerHeight;
});

/** =============================
 *  초기 화면
 * ============================= */
showStart();
</script>
