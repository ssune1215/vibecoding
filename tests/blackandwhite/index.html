`겉으로는 논리적이고 담담하지만, 속으로는 사람을 쉽게 들이지 않습니다.
말보다 행동을 보고, 신뢰가 확인될 때까지 거리를 유지합니다.
다만 “내 사람”이 되면, 말 없이도 크게 챙겨주는 편입니다.`
      },
      "D>B": {
        title: "🖤 겉은 무심함 / 속은 예민함",
        badges: ["#무심한척", "#예민함", "#혼자회복"],
        text:
`겉으로는 괜찮아 보여도, 속으로는 말의 뉘앙스를 오래 곱씹습니다.
그래서 표현을 줄이게 되고, 혼자 회복하는 시간이 필요해요.
정리되면 다시 괜찮아지지만, 그 과정은 조용히 진행됩니다.`
      },
      "D>A": {
        title: "🌙 겉은 쿨함 / 속은 진심이 많음",
        badges: ["#쿨한척", "#진심과다", "#깊게감"],
        text:
`겉으로는 담담하지만, 마음이 가면 생각보다 깊게 갑니다.
들키기 싫어서 표현을 줄이는데, 그만큼 속은 더 진해질 수 있어요.
마음을 여는 순간, 관계의 밀도가 확 달라지는 타입입니다.`
      },
    };

    let idx = 0;
    let history = [];
    let score = { A:0, B:0, C:0, D:0 };

    const startView = document.getElementById("startView");
    const testView = document.getElementById("testView");
    const resultView = document.getElementById("resultView");

    const questionText = document.getElementById("questionText");
    const answersEl = document.getElementById("answers");
    const progressFill = document.getElementById("progressFill");

    const startBtn = document.getElementById("startBtn");
    const backBtn = document.getElementById("backBtn");
    const restartBtn = document.getElementById("restartBtn");

    const badgeRow = document.getElementById("badgeRow");
    const resultMain = document.getElementById("resultMain");
    const resultText = document.getElementById("resultText");

    const kakaoShareBtn = document.getElementById("kakaoShareBtn");
    const otherTestBtn = document.getElementById("otherTestBtn");

    function show(view){
      startView.classList.add("hidden");
      testView.classList.add("hidden");
      resultView.classList.add("hidden");
      view.classList.remove("hidden");
    }

    function renderQuestion(){
      const total = questions.length;
      const q = questions[idx];

      progressFill.style.width = `${(idx / total) * 100}%`;
      questionText.textContent = q.q;

      answersEl.innerHTML = "";
      q.a.forEach((opt) => {
        const btn = document.createElement("button");
        btn.className = "optionBtn";
        btn.textContent = opt.text;
        btn.addEventListener("click", () => choose(opt.type));
        answersEl.appendChild(btn);
      });

      backBtn.disabled = (idx === 0);
      backBtn.style.filter = backBtn.disabled ? "grayscale(1) opacity(.55)" : "none";
      backBtn.style.cursor = backBtn.disabled ? "not-allowed" : "pointer";
    }

    function choose(type){
      history[idx] = type;
      recalcScore();

      if(idx < questions.length - 1){
        idx += 1;
        renderQuestion();
      }else{
        progressFill.style.width = `100%`;
        showResult();
      }
    }

    function recalcScore(){
      score = { A:0, B:0, C:0, D:0 };
      history.forEach(t => { if(t) score[t] += 1; });
    }

    function topTwoTypes(){
      const entries = Object.entries(score).sort((a,b)=> b[1]-a[1]);
      const topScore = entries[0][1];
      const tiedTop = entries.filter(e => e[1] === topScore).map(e=>e[0]);

      let first = entries[0][0];
      if(tiedTop.length > 1){
        for(let i = history.length-1; i>=0; i--){
          if(history[i] && tiedTop.includes(history[i])) { first = history[i]; break; }
        }
      }

      const withoutFirst = Object.entries(score)
        .filter(([t]) => t !== first)
        .sort((a,b)=> b[1]-a[1]);

      const secondScore = withoutFirst[0][1];
      const tiedSecond = withoutFirst.filter(e => e[1] === secondScore).map(e=>e[0]);

      let second = withoutFirst[0][0];
      if(tiedSecond.length > 1){
        for(let i = history.length-1; i>=0; i--){
          if(history[i] && tiedSecond.includes(history[i])) { second = history[i]; break; }
        }
      }

      return [first, second];
    }

    function resolveResultKey(){
      const [first, second] = topTwoTypes();
      const key = `${first}>${second}`;
      if(results[key]) return key;

      if(first === "A") return results["A>B"] ? "A>B" : "A>D";
      if(first === "B") return results["B>A"] ? "B>A" : "B>C";
      if(first === "C") return results["C>B"] ? "C>B" : "C>D";
      return results["D>B"] ? "D>B" : "D>A";
    }

    function showResult(){
      const key = resolveResultKey();
      const r = results[key];

      // 배지 렌더
      badgeRow.innerHTML = "";
      (r.badges || []).forEach(t=>{
        const b = document.createElement("span");
        b.className = "badge";
        b.textContent = t;
        badgeRow.appendChild(b);
      });

      resultMain.textContent = r.title;
      resultText.textContent = r.text;

      show(resultView);
      fireConfetti(26);
      prepareKakaoShare(r.title);
    }

    function resetAll(){
      idx = 0;
      history = [];
      score = { A:0, B:0, C:0, D:0 };
      progressFill.style.width = "0%";
      show(startView);
    }

    // Confetti
    const confettiEl = document.getElementById("confetti");
    function fireConfetti(count){
      confettiEl.innerHTML = "";
      const colors = ["#ffffff","#d9d9d9","#bdbdbd","#f5f5f5","#FEE500","#2F80ED","#EB5757"];
      for(let i=0;i<count;i++){
        const s = document.createElement("span");
        s.style.left = (Math.random() * 100) + "vw";
        s.style.width = (8 + Math.random() * 8) + "px";
        s.style.height = (12 + Math.random() * 10) + "px";
        s.style.background = colors[Math.floor(Math.random()*colors.length)];
        s.style.animationDelay = (Math.random() * 0.2) + "s";
        s.style.animationDuration = (0.9 + Math.random() * 0.7) + "s";
        confettiEl.appendChild(s);
      }
      setTimeout(()=>{ confettiEl.innerHTML = ""; }, 1600);
    }

    // Kakao share (hidden createDefaultButton)
    function initKakao(){
      try{
        if(window.Kakao && !window.Kakao.isInitialized()){
          window.Kakao.init(KAKAO_JS_KEY);
        }
        return !!(window.Kakao && window.Kakao.isInitialized());
      }catch(e){
        return false;
      }
    }
    const kakaoReady = initKakao();

    function prepareKakaoShare(resultTitle){
      const shareUrl = SITE_URL;
      const hiddenBtn = document.getElementById("kakaoHiddenBtn");

      if(kakaoReady && window.Kakao){
        hiddenBtn.innerHTML = "";
        window.Kakao.Share.createDefaultButton({
          container: "#kakaoHiddenBtn",
          objectType: "feed",
          content: {
            title: "나는 겉과 속이 얼마나 다를까?",
            description: "내 결과: " + resultTitle,
            imageUrl: OG_IMAGE_URL,
            link: { mobileWebUrl: shareUrl, webUrl: shareUrl }
          },
          buttons: [
            { title: "나도 해보기", link: { mobileWebUrl: shareUrl, webUrl: shareUrl } }
          ]
        });
        kakaoShareBtn.onclick = () => hiddenBtn.click();
      }else{
        kakaoShareBtn.onclick = () => {
          copyToClipboard(shareUrl);
          alert("카카오 공유 설정이 완전하지 않아 링크를 복사했습니다. 카톡에 붙여넣어 공유해 주세요.");
        };
      }
    }

    function copyToClipboard(text){
      if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(text).catch(()=>fallbackCopy(text));
      }else{
        fallbackCopy(text);
      }
    }
    function fallbackCopy(text){
      const ta = document.createElement("textarea");
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
    }

    startBtn.addEventListener("click", () => {
      idx = 0;
      history = [];
      score = { A:0, B:0, C:0, D:0 };
      show(testView);
      renderQuestion();
    });

    backBtn.addEventListener("click", () => {
      if(idx === 0) return;
      idx -= 1;
      renderQuestion();
    });

    restartBtn.addEventListener("click", resetAll);

    otherTestBtn.addEventListener("click", () => {
      window.open(OTHER_TEST_URL, "_blank", "noopener,noreferrer");
    });
  </script>
<script src="https://developers.kakao.com/sdk/js/kakao.js"></script><script src="../../js/kakao-share.js"></script></body>
