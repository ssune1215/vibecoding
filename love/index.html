<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연애 지수 테스트 | 나의 러브 지수 스캐너</title>
    
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="나의 연애 점수는? | 연애 지수 테스트" />
    <meta property="og:description" content="당신의 연애 세포는 살아있나요? 숨겨진 로맨틱 지수를 스캔해드립니다." />
    <meta property="og:url" content="./" />
    <meta property="og:image" content="../assets/share-thumb.jpg" />

    <link rel="stylesheet" href="../assets/vibe-theme.css">
    <style>
        :root {
            --main-color: #f43f5e; /* 레드 */
            --bg-light: #fff1f2;
            --border-color: #ffe4e6;
            --btn-hover-shadow: rgba(244, 63, 94, 0.3);
        }
    </style>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="../assets/kakao-share.js" defer></script>
</head>
<body>

<div class="card">
    <div id="start-area">
        <div class="result-image">❤️</div>
        <h1 class="title">나의 연애 점수는?<br>러브 지수 스캐너</h1>
        <p class="description">당신의 연애 세포는 살아있나요?<br>숨겨진 로맨틱 지수를 스캔해드립니다.</p>
        <button class="btn-start" onclick="startTest()">연애 지수 측정 시작 🔍</button>
    </div>

    <div id="quiz-area" style="display: none;">
        <div class="progress-bar"><div class="progress" id="progress"></div></div>
        <div id="q-number" class="tiny" style="margin-bottom: 10px; font-weight:700;">Question 1 / 5</div>
        <div class="title" id="question-text" style="font-size: 20px;">질문 불러오는 중...</div>
        <div id="options-container"></div>
    </div>

    <div id="result-area" style="display: none;">
        <div class="tiny" style="font-weight: 700;">나의 연애 지수 스캔 결과</div>
        <div id="res-image" class="result-image">✨</div>
        <div id="res-name" class="result-title">결과 이름</div>
        
        <div class="result-box">
            <span class="result-box-title">🔍 큐피드의 분석 보고서</span>
            <div id="res-desc" class="result-desc">결과 설명이 여기에 나옵니다.</div>
        </div>

        <div class="action-btns">
            <button class="btn-kakao">
                <img src="https://developers.kakao.com/assets/img/about/logos/kakaotalksharing/kakaotalk_sharing_btn_medium.png" width="20">
                내 연애지수 자랑하기
            </button>
            <a href="https://blog.naver.com/forgiven_77/224195220807" target="_blank" class="btn-blog">
                👀 다른 재미있는 테스트 구경가기
            </a>
            <button class="btn-retry" onclick="location.reload()">🔄 다시 테스트하기</button>
        </div>
    </div>
</div>

<script>
    let currentQ = 0;
    let score = 0;

    const questions = [
        {
            q: "길을 가다 예쁜 꽃집을 봤을 때 떠오르는 생각은?",
            options: [
                { text: "꽃 사주고 싶은 사람이 생각난다", point: 3 },
                { text: "나중에 기념일에 사야겠다", point: 2 },
                { text: "꽃은 너무 비싸고 금방 시들어", point: 0 },
                { text: "그냥 예쁘네 하고 지나간다", point: 1 }
            ]
        },
        {
            q: "연인이 갑자기 '사랑해'라고 말한다면?",
            options: [
                { text: "나도 너무너무 사랑해! (무한공세)", point: 3 },
                { text: "갑자기 왜 그래? (당황하지만 좋음)", point: 1 },
                { text: "조용히 웃으며 손을 꽉 잡아준다", point: 2 },
                { text: "말뿐인 건 아니지? (의심의 눈초리)", point: 0 }
            ]
        },
        {
            q: "드라마 속 로맨틱한 장면을 볼 때 나의 반응은?",
            options: [
                { text: "나도 저런 연애를 꿈꾼다 (과몰입)", point: 3 },
                { text: "실제로 저게 가능해? (현실 자각)", point: 0 },
                { text: "대리 만족하며 미소 짓는다", point: 2 },
                { text: "오그라들어서 채널을 돌린다", point: 1 }
            ]
        },
        {
            q: "기념일에 내가 더 선호하는 것은?",
            options: [
                { text: "직접 쓴 편지와 정성 가득한 선물", point: 3 },
                { text: "비싸고 화려한 명품 선물", point: 1 },
                { text: "분위기 좋은 레스토랑에서의 저녁", point: 2 },
                { text: "그냥 현금이 최고 아냐?", point: 0 }
            ]
        },
        {
            q: "내가 생각하는 진정한 사랑이란?",
            options: [
                { text: "서로의 있는 그대로를 사랑하는 것", point: 3 },
                { text: "끊임없이 노력하고 맞추어 가는 것", point: 2 },
                { text: "적당한 거리 유지가 필수인 것", point: 1 },
                { text: "솔직히 잘 모르겠다", point: 0 }
            ]
        }
    ];

    const results = [
        { min: 0, max: 3, name: "냉동실 연애세포\n차도남 / 차도녀형", img: "❄️", desc: "당신의 연애 세포는 혹한기 훈련 중인가요? 이성적인 판단이 너무 앞서서 로맨틱한 분위기를 깨뜨릴 때가 있네요. 가끔은 머리보다 마음이 가는 대로 행동해보세요!" },
        { min: 4, max: 7, name: "잠자는 숲속의\n연애 초보형", img: "😴", desc: "연애에 관심은 있지만 아직은 낯설고 수줍은 당신! 이론은 빠삭한데 실전에서 조금 약할 수 있어요. 조금만 더 용기를 낸다면 멋진 로맨스가 시작될 거예요." },
        { min: 8, max: 11, name: "밀당의 고수\n현실 로맨티스트형", img: "😏", desc: "연애를 즐길 줄 아는 당신! 적당한 설렘과 현실적인 감각을 모두 갖췄네요. 센스가 넘쳐서 연인에게 늘 인기 만점일 스타일입니다." },
        { min: 12, max: 15, name: "사랑에 올인!\n직진 로맨티스트형", img: "💘", desc: "축하합니다! 당신은 이 시대의 진정한 로맨티스트입니다. 사랑 없이는 못 사는 열정적인 마음의 소유자군요. 당신의 진심은 누구보다 밝게 빛나고 있습니다." }
    ];

    function startTest() {
        document.getElementById('start-area').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        let percent = (currentQ / questions.length) * 100;
        document.getElementById('progress').style.width = percent + '%';
        document.getElementById('q-number').innerText = `Question ${currentQ + 1} / ${questions.length}`;
        let currentData = questions[currentQ];
        document.getElementById('question-text').innerText = currentData.q;
        let container = document.getElementById('options-container');
        container.innerHTML = "";
        currentData.options.forEach(opt => {
            let btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt.text;
            btn.onclick = () => nextQuestion(opt.point);
            container.appendChild(btn);
        });
    }

    function nextQuestion(point) {
        score += point;
        currentQ++;
        if (currentQ < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        let resultData = results.find(r => score >= r.min && score <= r.max);
        if(!resultData) resultData = results[0];
        document.getElementById('res-image').innerText = resultData.img;
        document.getElementById('res-name').innerHTML = resultData.name.replace('\n', '<br>');
        document.getElementById('res-desc').innerHTML = resultData.desc;
    }
</script>
</body>
</html>
