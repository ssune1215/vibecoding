<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연애 능력 테스트 | 나의 숨겨진 연애 본능은? 💘</title>
    
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="연애 능력 테스트 | 나의 로맨틱 지수는?" />
    <meta property="og:description" content="잠들어 있는 나의 연애 세포를 깨워보세요! 재미로 보는 연애 성향 테스트" />
    <meta property="og:url" content="./" />
    <meta property="og:image" content="../assets/share-thumb.jpg" />

    <link rel="stylesheet" href="../assets/vibe-theme.css">
    <style>
        :root {
            --main-color: #f43f5e; /* 러블리 레드 */
            --bg-light: #fff1f2;
            --border-color: #fecdd3;
            --btn-hover-shadow: rgba(244, 63, 94, 0.2);
        }
    </style>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="../assets/kakao-share.js" defer></script>
</head>
<body>

<div class="card">
    <div id="start-area">
        <div class="result-image">💘✨</div>
        <h1 class="title">나의 연애 본능<br>능력 테스트</h1>
        <p class="description">평소 나의 무의식적인 선택으로 알아보는<br>진짜 연애 성향과 로맨틱 지수!</p>
        <button class="btn-start" onclick="startTest()">테스트 시작하기 🚀</button>
    </div>

    <div id="quiz-area" style="display: none;">
        <div class="progress-bar"><div class="progress" id="progress"></div></div>
        <div id="q-number" class="tiny" style="margin-bottom: 10px; font-weight:700;">Question 1 / 5</div>
        <div class="title" id="question-text" style="font-size: 19px; line-height: 1.5;">질문 로딩 중...</div>
        <div id="options-container"></div>
    </div>

    <div id="result-area" style="display: none;">
        <div class="tiny" style="font-weight: 700;">당신의 연애 성향 분석표</div>
        <div id="res-image" class="result-image">❤️</div>
        <div id="res-name" class="result-title">결과 이름</div>
        
        <div class="result-box">
            <span class="result-box-title">💌 로맨틱 분석 리포트</span>
            <div id="res-desc" class="result-desc">결과 설명이 여기에 나옵니다.</div>
        </div>

        <div class="action-btns">
            <button class="btn-kakao">
                <img src="https://developers.kakao.com/assets/img/about/logos/kakaotalksharing/kakaotalk_sharing_btn_medium.png" width="20">
                내 결과 카톡으로 자랑하기
            </button>
            <a href="https://blog.naver.com/forgiven_77/224198478277" target="_blank" class="btn-blog">
                👀 다른 테스트 구경가기
            </a>
            <button class="btn-retry" onclick="location.reload()">🔄 다시 테스트하기</button>
        </div>
    </div>
</div>

<script>
    let currentQ = 0;
    let score = 0;

    const questions = [
        {
            q: "꿈속에서 한 번도 가본 적 없는 신비로운 비밀의 정원을 발견했습니다. 그곳에서 당신이 가장 먼저 하고 싶은 일은 무엇인가요?",
            options: [
                { text: "아무도 없는 정원 한복판에서 제일 화려한 꽃 한 송이를 꺾어 향기를 즐긴다.", point: 3 },
                { text: "가장 편안해 보이는 거대한 나무 아래 앉아 숲의 평화로운 분위기를 만끽한다.", point: 2 },
                { text: "정원 구석구석을 사진으로 남겨 나중에 사랑하는 사람에게 보여줄 준비를 한다.", point: 1 },
                { text: "이 정원이 누구의 소유인지, 혹은 어떤 식물들이 있는지 냉철하게 분석해본다.", point: 0 }
            ]
        },
        {
            q: "사랑하는 연인과 함께 조용한 밤바다를 걷고 있습니다. 부서지는 파도 소리만 들리는 어두운 밤, 당신이 건네고 싶은 말은?",
            options: [
                { text: `"이 순간이 정말 영원했으면 좋겠어... 우리 지금 너무 행복하다."`, point: 3 },
                { text: "조용히 연인의 손을 더 꽉 맞잡으며 따뜻한 체온을 나누는 것에 집중한다.", point: 2 },
                { text: "바닷바람이 생각보다 차가운 것 같아. 감기 걸리기 전에 이제 따뜻한 실내로 들어갈까?", point: 1 },
                { text: "파도가 왜 밤에 더 거세지는지 과학적인 원리를 설명해주며 대화를 이어간다.", point: 0 }
            ]
        },
        {
            q: "기념일을 맞아 연인이 당신을 위해 화려한 서프라이즈 이벤트를 준비했습니다! 하지만 당신은 오늘 너무 피곤해서 그냥 쉬고 싶었습니다. 이때 당신의 반응은?",
            options: [
                { text: "피곤함은 한순간에 증발! 너무 감동해서 아이처럼 기뻐하며 파티를 온몸으로 즐긴다.", point: 3 },
                { text: "준비해준 정성이 너무 고마워서 피곤한 기색을 싹 숨기고 끝까지 웃으며 함께한다.", point: 2 },
                { text: "진심으로 고맙다고 말한 뒤, 너무 피곤하니 오늘은 짧게 축하하고 같이 쉬자고 권유한다.", point: 1 },
                { text: "서프라이즈는 고맙지만, 다음부터는 내 컨디션을 미리 물어봐 달라고 이성적으로 당부한다.", point: 0 }
            ]
        },
        {
            q: "오랜만에 연인과 함께 영화를 보러 왔습니다. 영화가 끝나고 엔딩 크레딧이 올라올 때, 당신의 현재 모습과 가장 가까운 것은 어떤가요?",
            options: [
                { text: "영화의 여운이 너무 길어서 눈물이 멈추지 않아 한참 동안 자리에 앉아 있는다.", point: 3 },
                { text: "연인과 방금 본 영화의 인상 깊었던 장면에 대해 조잘조잘 이야기를 나눈다.", point: 2 },
                { text: "영화 스토리의 개연성이나 연출의 아쉬운 점에 대해 논리적으로 비평하며 나온다.", point: 1 },
                { text: "쿠키 영상이 있는지 확인하고, 없으면 다음 일정을 위해 신속하게 자리를 뜬다.", point: 0 }
            ]
        },
        {
            q: "당신이 생각하는 가장 완벽하고 진정한 사랑의 정의란 무엇인가요?",
            options: [
                { text: "서로의 부족한 부분까지 온전히 품어주고 아껴주는 무조건적인 헌신.", point: 3 },
                { text: "현실의 벽을 함께 넘으며 서로의 성장을 돕는 든든한 동반자의 관계.", point: 2 },
                { text: "적당한 거리와 선을 유지하며 서로의 사생활을 존중해주는 쿨한 신뢰.", point: 1 },
                { text: "사랑은 감정일 뿐. 오직 조건과 환경이 맞아야 유지되는 계약적인 관계.", point: 0 }
            ]
        }
    ];

    const results = [
        { min: 0, max: 4, name: "냉동실에 갇힌 연애세포\n강철 심장의 리얼리스트", img: "❄️🛡️", desc: "당신의 연애 세포는 현재 혹한기 훈련 중인가요? 이성적인 판단이 너무 앞서서 로맨틱한 분위기를 한순간에 현실로 돌려버리는 재주가 있군요. 가끔은 머리보다 마음의 소리에 귀를 기울여보세요. 세상은 논리보다 감동으로 움직일 때가 더 많답니다!" },
        { min: 5, max: 8, name: "잠자는 숲속의 예민보스\n성장이 필요한 연애 초보", img: "😴🌱", desc: "연애에 관심은 많지만 아직은 표현이 서툴고 낯선 당신! 머릿속으로는 수만 가지 시나리오를 쓰지만 현실에선 수줍음이 앞서네요. 조금만 더 솔직해지고 용기를 낸다면, 당신의 진가를 알아주는 멋진 로맨스가 곧 시작될 거예요." },
        { min: 9, max: 12, name: "밀당의 지배자\n세련된 현실 로맨티스트", img: "😏🍷", desc: "연애의 설렘과 현실의 무게를 모두 적절히 조율할 줄 아는 진정한 고수군요! 센스 넘치는 완급 조절로 연인에게 늘 매력적인 파트너로 기억될 타입입니다. 적당한 신비감과 따스함을 겸비한 당신은 연애 시장의 베스트셀러!" },
        { min: 13, max: 15, name: "사랑에 목숨 건 열정\n무지개빛 직진 로맨티스트", img: "💘🌈", desc: "축하합니다! 당신은 이 시대에 흔치 않은 순수한 열정의 소유자입니다. 사랑 없이는 단 하루도 살 수 없는 뜨거운 심장을 가졌군요. 당신의 진심은 누구보다 밝게 빛나며, 당신과 사랑에 빠지는 사람은 세상에서 가장 행복한 주인공이 될 것입니다!" }
    ];

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function startTest() {
        shuffle(questions);
        questions.forEach(q => shuffle(q.options));
        document.getElementById('start-area').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        let percent = (currentQ / questions.length) * 100;
        document.getElementById('progress').style.width = percent + '%';
        document.getElementById('q-number').innerText = `Question ${currentQ + 1} / ${questions.length}`;
        let currentData = questions[currentQ];
        document.getElementById('question-text').innerText = currentData.q;
        let container = document.getElementById('options-container');
        container.innerHTML = "";
        currentData.options.forEach(opt => {
            let btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt.text;
            btn.onclick = () => nextQuestion(opt.point);
            container.appendChild(btn);
        });
    }

    function nextQuestion(point) {
        score += point;
        currentQ++;
        if (currentQ < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        let resultData = results.find(r => score >= r.min && score <= r.max);
        if(!resultData) resultData = results[0];
        document.getElementById('res-image').innerText = resultData.img;
        document.getElementById('res-name').innerHTML = resultData.name.replace('\n', '<br>');
        document.getElementById('res-desc').innerHTML = resultData.desc;
    }
</script>
</body>
</html>
