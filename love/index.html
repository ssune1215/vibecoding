<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연애 능력 테스트 | 나의 숨겨진 연애 본능은? 💘</title>
    
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="연애 능력 테스트 | 나의 로맨틱 지수는?" />
    <meta property="og:description" content="잠들어 있는 나의 연애 세포를 깨워보세요! 재미로 보는 연애 성향 테스트" />
    <meta property="og:url" content="./" />
    <meta property="og:image" content="../assets/share-thumb.jpg" />

    <link rel="stylesheet" href="../assets/vibe-theme.css">
    <style>
        :root {
            --main-color: #f43f5e; /* 러블리 레드 */
            --bg-light: #fff1f2;
            --border-color: #fecdd3;
            --btn-hover-shadow: rgba(244, 63, 94, 0.2);
        }
    </style>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="../assets/kakao-share.js" defer></script>
</head>
<body>

<div class="card">
    <div id="start-area">
        <div class="result-image">💘✨</div>
        <h1 class="title">나의 연애 본능<br>능력 테스트</h1>
        <p class="description">무의식적인 선택으로 알아보는<br>진짜 연애 성향과 로맨틱 지수!</p>
        <button class="btn-start" onclick="startTest()">테스트 시작하기 🚀</button>
    </div>

    <div id="quiz-area" style="display: none;">
        <div class="progress-bar"><div class="progress" id="progress"></div></div>
        <div id="q-number" class="tiny" style="margin-bottom: 10px; font-weight:700;">Question 1 / 5</div>
        <div class="title" id="question-text" style="font-size: 19px; line-height: 1.4;">질문 로딩 중...</div>
        <div id="options-container"></div>
    </div>

    <div id="result-area" style="display: none;">
        <div class="tiny" style="font-weight: 700;">당신의 연애 성향 분석표</div>
        <div id="res-image" class="result-image">❤️</div>
        <div id="res-name" class="result-title">결과 이름</div>
        
        <div class="result-box">
            <span class="result-box-title">💌 로맨틱 분석 리포트</span>
            <div id="res-desc" class="result-desc">결과 설명이 여기에 나옵니다.</div>
        </div>

        <div class="action-btns">
            <button class="btn-kakao">
                <img src="https://developers.kakao.com/assets/img/about/logos/kakaotalksharing/kakaotalk_sharing_btn_medium.png" width="20">
                결과 카톡 공유하기
            </button>
            <a href="https://blog.naver.com/forgiven_77/224219719421" target="_blank" class="btn-blog">
                👀 다른 테스트 구경가기
            </a>
            <button class="btn-retry" onclick="location.reload()">🔄 다시 하기</button>
        </div>
    </div>
</div>

<script>
    let currentQ = 0;
    let score = 0;

    const questions = [
        {
            q: "신비로운 비밀의 정원을 발견했습니다. 그곳에서 당신이 가장 먼저 하고 싶은 일은?",
            options: [
                { text: "가장 화려한 꽃 한 송이를 꺾어 향기를 맡는다.", point: 3 },
                { text: "거대한 나무 아래 앉아 숲의 분위기를 즐긴다.", point: 2 },
                { text: "사진을 남겨서 나중에 연인에게 보여줄 준비를 한다.", point: 1 },
                { text: "이게 누구의 소유인지, 어떤 식물인지 분석해 본다.", point: 0 }
            ]
        },
        {
            q: "연인과 조용한 밤바다를 걷고 있는 중, 당신이 건네고 싶은 한마디는?",
            options: [
                { text: `"이 순간이 정말 영원했으면 좋겠어..."`, point: 3 },
                { text: "조용히 연인의 손을 더 꽉 맞잡으며 온기를 나눈다.", point: 2 },
                { text: "바람이 차가운데 감기 걸리기 전에 안으로 들어갈까?", point: 1 },
                { text: "파도가 왜 밤에 더 거세지는지 과학적인 원리를 말해준다.", point: 0 }
            ]
        },
        {
            q: "연인이 나를 위해 깜짝 이벤트를 준비했습니다! 하지만 당신은 너무 피곤합니다. 이때 반응은?",
            options: [
                { text: "피곤함이 싹 사라짐! 너무 감동해서 아이처럼 기뻐한다.", point: 3 },
                { text: "준비해 준 정성이 고마워서 피곤한 기색 없이 함께한다.", point: 2 },
                { text: "고맙다고 한 뒤, 오늘은 좀 피곤하니 같이 쉬자고 한다.", point: 1 },
                { text: "고맙지만 다음부턴 내 컨디션을 미리 물어봐 달라고 한다.", point: 0 }
            ]
        },
        {
            q: "영화가 끝나고 엔딩 크레딧이 올라올 때, 당신의 현재 모습은?",
            options: [
                { text: "여운이 너무 길어서 한참 동안 자리에 앉아 운다.", point: 3 },
                { text: "방금 본 영화의 인상 깊었던 장면에 대해 조잘조잘 말한다.", point: 2 },
                { text: "스토리나 연출의 아쉬운 점에 대해 비평하며 나온다.", point: 1 },
                { text: "쿠키 영상이 없으면 다음 일정을 위해 신속하게 뜬다.", point: 0 }
            ]
        },
        {
            q: "당신이 생각하는 가장 완벽하고 진정한 사랑의 정의는?",
            options: [
                { text: "서로의 부족함까지 아껴주는 무조건적인 헌신.", point: 3 },
                { text: "현실의 벽을 함께 넘으며 성장하는 든든한 동반자.", point: 2 },
                { text: "적당한 거리와 선을 유지하며 사생활을 존중하는 신뢰.", point: 1 },
                { text: "사랑은 감정일 뿐. 오직 조건이 맞아야 유지되는 관계.", point: 0 }
            ]
        }
    ];

    const results = [
        { min: 0, max: 4, name: "냉동실 에 갇힌 연애세포\n강철 심장의 리얼리스트", img: "❄️🛡️", desc: "이성적인 판단이 너무 앞서서 로맨틱한 분위기를 한순간에 깨뜨리는 재주가 있군요. 가끔은 머리보다 마음의 소리에 귀를 기울여보세요!" },
        { min: 5, max: 8, name: "잠자는 숲속의 예민보스\n성장이 필요한 연애 초보", img: "😴🌱", desc: "연애에 관심은 많지만 아직은 표현이 서툰 당신! 조금만 더 솔직해지고 용기를 낸다면 멋진 로맨스가 곧 시작될 거예요." },
        { min: 9, max: 12, name: "밀당의 지배자\n세련된 현실 로맨티스트", img: "😏🍷", desc: "설렘과 현실의 무게를 적절히 조율할 줄 아는 고수군요! 센스 넘치는 완급 조절로 연인에게 늘 인기 만점인 타입입니다." },
        { min: 13, max: 15, name: "사랑에 올인하는 열정\n무지개빛 직진 로맨티스트", img: "💘🌈", desc: "축하합니다! 사랑 없이는 못 사는 뜨거운 심장을 가졌군요. 당신의 진심은 누구보다 밝게 빛나며 상대방을 행복하게 만듭니다!" }
    ];

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function startTest() {
        shuffle(questions);
        questions.forEach(q => shuffle(q.options));
        document.getElementById('start-area').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        let percent = (currentQ / questions.length) * 100;
        document.getElementById('progress').style.width = percent + '%';
        document.getElementById('q-number').innerText = `Question ${currentQ + 1} / ${questions.length}`;
        let currentData = questions[currentQ];
        document.getElementById('question-text').innerText = currentData.q;
        let container = document.getElementById('options-container');
        container.innerHTML = "";
        currentData.options.forEach(opt => {
            let btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt.text;
            btn.onclick = () => nextQuestion(opt.point);
            container.appendChild(btn);
        });
    }

    function nextQuestion(point) {
        score += point;
        currentQ++;
        if (currentQ < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        let resultData = results.find(r => score >= r.min && score <= r.max);
        if(!resultData) resultData = results[0];
        document.getElementById('res-image').innerText = resultData.img;
        document.getElementById('res-name').innerHTML = resultData.name.replace('\n', '<br>');
        document.getElementById('res-desc').innerHTML = resultData.desc;
    }
</script>
</body>
</html>
