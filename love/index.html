/** =========================

    bullets: [
      "스킨십은 보수적(?), 하지만 한 번 스위치 켜지면 무서움",

    ],

    bullets: [
      "'오늘부터 1일 할래?' 돌직구 멘트 장인",

    ],
    shareTitle: "내 연애 세포는? 😎 선 타기 만렙 관찰자형",
    shareDesc: "밀당천재 납셨다! 네 속마음 나만 아는 거 아니지?\n지금 테스트 해봐!",
    sub: "어울리는 짝꿍: 숨김없이 솔직한 불도저형"

/** =========================
 *  DOM
 * ========================= */
const startSection = document.getElementById("startSection");
const quizSection = document.getElementById("quizSection");
const resultSection = document.getElementById("resultSection");

const startBtn = document.getElementById("startBtn");
const qTitle = document.getElementById("qTitle");
const choices = document.getElementById("choices");
const bar = document.getElementById("bar");

const resultType = document.getElementById("resultType");
const resultDesc = document.getElementById("resultDesc");
const resultBullets = document.getElementById("resultBullets");

const shareTitleEl = document.getElementById("shareTitle");
const shareDescEl = document.getElementById("shareDesc");

const kakaoBtn = document.getElementById("kakaoBtn");
const otherBtn = document.getElementById("otherBtn");
const restartBtn = document.getElementById("restartBtn");

/** =========================
 *  상태
 * ========================= */
let idx = 0;
let score = { OLIN:0, SONAMU:0, JIKJIN:0, GWAN:0 };

/** =========================
 *  유틸
 * ========================= */
function go(section){
  startSection.classList.add("hide");
  quizSection.classList.add("hide");
  resultSection.classList.add("hide");
  section.classList.remove("hide");
}

function setProgress(){
  const pct = Math.round((idx / quiz.length) * 100);
  bar.style.width = pct + "%";
}

function pickResult(){
  const entries = Object.entries(score);
  entries.sort((a,b)=>b[1]-a[1]);
  return entries[0][0];
}

function confettiPop(){
  if (!window.confetti) return;
  confetti({
    particleCount: 80,
    spread: 65,
    origin: { y: 0.72 }
  });
}

/** =========================
 *  카카오 공유 (단일 파일 내장)
 * ========================= */
function initKakao(){
  if (!window.Kakao) return false;
  if (!window.Kakao.isInitialized()) window.Kakao.init(KAKAO_JS_KEY);
  return true;
}

function shareKakaoFeed(title, desc, url){
  if (!initKakao()) {
    alert("카카오 SDK 로딩 실패");
    return;
  }
  const thumb = window.location.origin + SHARE_THUMB_PATH;

  window.Kakao.Share.sendDefault({
    objectType: "feed",
    content: {
      title,
      description: desc,
      imageUrl: thumb,
      link: { mobileWebUrl: url, webUrl: url }
    },
    buttons: [
      {
        title: KAKAO_BUTTON_TITLE, // ✅ "테스트 해보기"
        link: { mobileWebUrl: url, webUrl: url }
      },
      {
        title: "다른 테스트 구경하기",
        link: { mobileWebUrl: OTHER_TEST_LINK, webUrl: OTHER_TEST_LINK }
      }
    ]
  });
}

/** =========================
 *  렌더
 * ========================= */
function renderQuestion(){
  setProgress();
  const cur = quiz[idx];
  qTitle.textContent = cur.q;
  choices.innerHTML = "";

  cur.a.forEach((opt) => {
    const b = document.createElement("button");
    b.className = "choice";
    b.type = "button";
    b.textContent = opt.t;
    b.addEventListener("click", () => {
      Object.keys(opt.s).forEach(k => score[k] += opt.s[k]);
      idx++;
      if (idx >= quiz.length){
        showResult(pickResult(), true);
      } else {
        renderQuestion();
      }
    });
    choices.appendChild(b);
  });
}

function showResult(code, fromQuiz){
  const r = results[code];
  if (!r) return;

  // 화면 구성
  resultType.textContent = `${r.emoji} ${r.title}`;
  resultDesc.textContent = r.desc;

  resultBullets.innerHTML = "";
  r.bullets.forEach(li=>{
    const el = document.createElement("li");
    el.textContent = li;
    resultBullets.appendChild(el);
  });

  // 공유용 텍스트 세팅(카카오 카드에 그대로 들어감)
  shareTitleEl.textContent = `${r.shareTitle}`;
  shareDescEl.textContent = `${r.desc}\n${r.sub}`;

  // URL에 결과 코드 심기 -> 공유 링크로 들어오면 바로 결과
  const url = new URL(window.location.href);
  url.searchParams.set("r", code);
  history.replaceState({}, "", url.toString());

  if (fromQuiz) confettiPop();
  go(resultSection);
}

/** =========================
 *  이벤트
 * ========================= */
document.addEventListener("DOMContentLoaded", () => {
  // 시작 버튼 (무조건 동작)
  startBtn.addEventListener("click", () => {
    idx = 0;
    score = { OLIN:0, SONAMU:0, JIKJIN:0, GWAN:0 };
    bar.style.width = "0%";
    go(quizSection);
    renderQuestion();
  });

  // 카카오 공유 버튼
  kakaoBtn.addEventListener("click", () => {
    const title = shareTitleEl.textContent.trim() || document.title;
    const desc = shareDescEl.textContent.trim() || "지금 테스트 해보세요 🙂";
    // 공유 시에는 결과코드가 박힌 현재 URL 그대로
    const url = window.location.href;
    shareKakaoFeed(title, desc, url);
  });

  // 다른 테스트 해보기
  otherBtn.addEventListener("click", () => {
    window.open(OTHER_TEST_LINK, "_blank");
  });

  // 다시하기
  restartBtn.addEventListener("click", () => {
    // 결과 파라미터 제거
    const url = new URL(window.location.href);
    url.searchParams.delete("r");
    history.replaceState({}, "", url.toString());

    idx = 0;
    score = { OLIN:0, SONAMU:0, JIKJIN:0, GWAN:0 };
    bar.style.width = "0%";
    go(startSection);
  });

  // 공유 링크로 들어온 경우(?r=CODE)
  const url = new URL(window.location.href);
  const code = url.searchParams.get("r");
  if (code && results[code]) {
    showResult(code, false);
  }
});
</script>
</div>
</body>
