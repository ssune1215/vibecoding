<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인생 한 방! 심리 행운 룰렛</title>
    
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="인생 한 방! 심리 행운 룰렛" />
    <meta property="og:description" content="당신의 잠재된 행운 바이브를 스캔합니다. 오늘은 어떤 운명이 당신을 기다릴까요?" />
    <meta property="og:url" content="./" />
    <meta property="og:image" content="../assets/share-thumb.jpg" />

    <link rel="stylesheet" href="../assets/vibe-theme.css">
    <style>
        :root {
            --main-color: #10b981; /* 에메랄드 */
            --bg-light: #ecfdf5;
            --border-color: #d1fae5;
            --btn-hover-shadow: rgba(16, 185, 129, 0.3);
        }
    </style>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="../assets/kakao-share.js" defer></script>
</head>
<body>

<div class="card">
    <div id="start-area">
        <div class="result-image">🎡</div>
        <h1 class="title">인생 한 방!<br>심리 행운 룰렛</h1>
        <p class="description">당신의 잠재된 행운 바이브를 스캔합니다.<br>오늘은 어떤 운명이 당신을 기다릴까요?</p>
        <button class="btn-start" onclick="startTest()">룰렛 돌리기 시작 🔍</button>
    </div>

    <div id="quiz-area" style="display: none;">
        <div class="progress-bar"><div class="progress" id="progress"></div></div>
        <div id="q-number" class="tiny" style="margin-bottom: 10px; font-weight:700;">Question 1 / 5</div>
        <div class="title" id="question-text" style="font-size: 20px;">질문 불러오는 중...</div>
        <div id="options-container"></div>
    </div>

    <div id="result-area" style="display: none;">
        <div class="tiny" style="font-weight: 700;">오늘의 행운 스캔 결과</div>
        <div id="res-image" class="result-image">✨</div>
        <div id="res-name" class="result-title">결과 이름</div>
        
        <div class="result-box">
            <span class="result-box-title">🔍 운명학자 분석</span>
            <div id="res-desc" class="result-desc">결과 설명이 여기에 나옵니다.</div>
        </div>

        <div class="action-btns">
            <button class="btn-kakao">
                <img src="https://developers.kakao.com/assets/img/about/logos/kakaotalksharing/kakaotalk_sharing_btn_medium.png" width="20">
                내 행운 지수 공유하기
            </button>
            <a href="https://blog.naver.com/forgiven_77/224195220807" target="_blank" class="btn-blog">
                👀 다른 재미있는 테스트 구경가기
            </a>
            <button class="btn-retry" onclick="location.reload()">🔄 다시 테스트하기</button>
        </div>
    </div>
</div>

<script>
    let currentQ = 0;
    let score = { L: 0, M: 0, S: 0, XP: 0 };

    const questions = [
        {
            q: "길을 걷다 우연히 반짝이는 동전을 발견했다! 당신의 행동은?",
            options: [
                { text: "아싸! 행운의 전조라 믿고 줍는다", type: 'L' },
                { text: "귀찮으니 그냥 무시하고 갈 길 간다", type: 'M' },
                { text: "주변을 살피며 주인이 있는지 확인한다", type: 'S' },
                { text: "복권을 사야겠다며 바로 편의점으로 간다", type: 'XP' }
            ]
        },
        {
            q: "중요한 선택을 앞두고 있을 때, 당신이 믿는 것은?",
            options: [
                { text: "나의 강력한 직감과 운", type: 'L' },
                { text: "철저하게 분석된 데이터와 논리", type: 'M' },
                { text: "주변 신뢰하는 사람들의 조언", type: 'S' },
                { text: "에라 모르겠다! 하늘의 뜻에 맡긴다", type: 'XP' }
            ]
        },
        {
            q: "꿈속에서 당신이 본 동물은?",
            options: [
                { text: "하늘을 나는 화려한 황금 용", type: 'L' },
                { text: "평온하게 풀을 뜯는 사슴", type: 'M' },
                { text: "나를 지켜주는 커다란 곰", type: 'S' },
                { text: "정체를 알 수 없는 미지의 생명체", type: 'XP' }
            ]
        },
        {
            q: "당신이 선호하는 복권 당첨 후의 삶은?",
            options: [
                { text: "흥청망청! 화려한 세계 일주와 쇼핑", type: 'L' },
                { text: "건물주! 안정적인 노후 보장", type: 'M' },
                { text: "기부와 나눔! 조용한 선행", type: 'S' },
                { text: "비밀 유지! 하던 일 계속하기", type: 'XP' }
            ]
        },
        {
            q: "지금 당장 운명을 바꿀 수 있는 버튼이 있다면?",
            options: [
                { text: "주저 없이 누른다! 인생은 한 방", type: 'L' },
                { text: "내용을 꼼꼼히 읽어보고 판단한다", type: 'M' },
                { text: "무서우니 절대 누르지 않는다", type: 'S' },
                { text: "실수로라도 눌러버릴까 봐 멀리한다", type: 'XP' }
            ]
        }
    ];

    const results = {
        L: { name: "잭팟 가즈아!\n천운을 타고난 럭키가이", img: "🎰", desc: "당신은 오늘 당장 복권을 사도 좋을 만큼 강력한 운의 바이브를 가졌네요! 긍정적인 에너지가 행운을 끌어당기고 있습니다. 망설이지 말고 도전하세요!" },
        M: { name: "차분한 성공\n운명을 개척하는 자", img: "🎩", desc: "운도 실력이라는 말이 당신을 위한 말이군요. 철저한 자기관리와 분석으로 행운마저 당신의 편으로 만드는 힘이 있습니다. 안정적인 성공이 보장된 인상입니다." },
        S: { name: "포근한 수호신\n평온한 일상의 행복", img: "🛡️", desc: "커다란 대박보다는 소소하지만 확실한 행복이 주위에 가득하네요. 당신을 아껴주는 사람들 자체가 당신의 가장 큰 행운입니다. 마음의 평온이 곧 풍요로 이어질 거예요." },
        XP: { name: "미지의 변수\n럭키 다크호스", img: "🦄", desc: "당신의 운명은 그 누구도 예측할 수 없습니다! 남들이 보지 못하는 기회를 포착하는 독특한 시각을 가졌군요. 예상치 못한 곳에서 터지는 대박의 주인공이 될 확률이 높습니다." }
    };

    function startTest() {
        document.getElementById('start-area').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        let percent = (currentQ / questions.length) * 100;
        document.getElementById('progress').style.width = percent + '%';
        document.getElementById('q-number').innerText = "Question " + (currentQ + 1) + " / 5";
        let currentData = questions[currentQ];
        document.getElementById('question-text').innerText = currentData.q;
        let container = document.getElementById('options-container');
        container.innerHTML = "";
        currentData.options.forEach(opt => {
            let btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt.text;
            btn.onclick = () => nextQuestion(opt.type);
            container.appendChild(btn);
        });
    }

    function nextQuestion(type) {
        score[type]++;
        currentQ++;
        if (currentQ < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        let maxVal = -1;
        let finalType = 'L';
        for (let k in score) {
            if (score[k] > maxVal) { maxVal = score[k]; finalType = k; }
        }
        let resultData = results[finalType];
        document.getElementById('res-image').innerText = resultData.img;
        document.getElementById('res-name').innerHTML = resultData.name.replace('\n', '<br>');
        document.getElementById('res-desc').innerHTML = resultData.desc;
    }
</script>
</body>
</html>
