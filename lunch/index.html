  <!-- OG(스크랩/공유용) -->



<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #f1f5f9; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; color: #1e293b; }
        .display-card { background: white; width: 90%; max-width: 500px; padding: 50px 20px; border-radius: 30px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); text-align: center; border: 4px solid #3b82f6; }
        h1 { font-size: 1.1rem; color: #64748b; margin-bottom: 20px; }
        #menu-display { font-size: 3.5rem; font-weight: 800; color: #3b82f6; height: 120px; display: flex; align-items: center; justify-content: center; margin-bottom: 40px; word-break: keep-all; }
        
        .btn { border: none; padding: 20px 60px; font-size: 1.8rem; font-weight: 800; border-radius: 20px; cursor: pointer; transition: 0.2s; width: 100%; box-shadow: 0 10px 0 #1d4ed8; color: white; }
        .btn-start { background: #3b82f6; box-shadow: 0 10px 0 #1d4ed8; }
        .btn-stop { background: #f43f5e; box-shadow: 0 10px 0 #be123c; }
        
        .btn:active { transform: translateY(5px); box-shadow: none; }
        .btn:disabled { background: #94a3b8; box-shadow: none; transform: translateY(5px); cursor: not-allowed; }
        .sub-text { margin-top: 30px; font-size: 0.9rem; color: #94a3b8; }
    </style>
</head>
<body>

    <div class="display-card">
        <h1>운명의 점심 메뉴 스캐너</h1>
        <div id="menu-display">준비완료!</div>
        <button class="btn btn-start" id="mainBtn" onclick="toggleButton()">스캔 시작!</button>
        <p class="sub-text">결정장애 치료제 v3.1</p>
    </div>

    <script>
        const menus = ['제육볶음', '돈까스', '마라탕', '초밥', '햄버거', '쌀국수', '김치찌개', '짜장면', '샌드위치', '분식', '치킨', '샐러드', '삼겹살', '파스타', '국밥', '텐동', '타코', '냉면', '찜닭', '부대찌개', '비빔밥', '우동', '소바', '라멘', '규동', '스테이크', '피자', '훠궈', '양꼬치', '닭갈비', '순대국', '감자탕', '보쌈', '족발', '아구찜', '칼국수', '수제비', '샤브샤브', '월남쌈', '탄탄면', '김밥', '떡볶이', '직화구이', '육회비빔밥', '고등어조림', '간장게장', '순두부찌개', '카레', '오므라이스', '물회'];
        const display = document.getElementById('menu-display');
        const btn = document.getElementById('mainBtn');
        
        let state = "READY"; 
        let scanInterval;

        function toggleButton() {
            if (state === "READY") {
                startScanning();
            } else if (state === "SCANNING") {
                stopScanning();
            }
        }

        function startScanning() {
            state = "SCANNING";
            btn.innerText = "!!!스톱!!!"; // 요청하신 대로 수정
            btn.className = "btn btn-stop";
            
            scanInterval = setInterval(() => {
                const randomIndex = Math.floor(Math.random() * menus.length);
                display.innerText = menus[randomIndex];
                display.style.color = `hsl(${Math.random() * 360}, 70%, 50%)`;
            }, 60);
        }

        function stopScanning() {
            state = "STOPPING";
            clearInterval(scanInterval);
            btn.disabled = true;
            btn.innerText = "운명 결정 중...";

            const totalDuration = Math.floor(Math.random() * 1000) + 4000; 
            const startTime = Date.now();

            function slowDown() {
                const elapsed = Date.now() - startTime;
                const randomIndex = Math.floor(Math.random() * menus.length);
                display.innerText = menus[randomIndex];
                display.style.color = `hsl(${Math.random() * 360}, 70%, 50%)`;

                if (elapsed < totalDuration) {
                    const nextTick = 60 + Math.pow(elapsed / totalDuration, 4) * 500;
                    setTimeout(slowDown, nextTick);
                } else {
                    finish();
                }
            }
            slowDown();
        }

        function finish() {
            state = "READY";
            btn.disabled = false;
            btn.innerText = "다시 시작하기";
            btn.className = "btn btn-start";
            display.style.color = "#ef4444"; 
            
            confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 } });

            setTimeout(() => {
                alert("축하합니다! 오늘 점심은 [" + display.innerText + "] 입니다.\n맛있게 드세요!");
            }, 300);
        }
    </script>
</body>
</html>
