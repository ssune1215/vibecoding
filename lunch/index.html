<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘 뭐 먹지? 결정장애 스캐너</title>
    
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="오늘 뭐 먹지? 결정장애 스캐너" />
    <meta property="og:description" content="메뉴 고르는 데 30분 넘게 걸린다면? 당신의 입맛 바이브를 스캔해서 골라드립니다!" />
    <meta property="og:url" content="./" />
    <meta property="og:image" content="../assets/share-thumb.jpg" />

    <link rel="stylesheet" href="../assets/vibe-theme.css">
    <style>
        :root {
            --main-color: #3b82f6; /* 블루 */
            --bg-light: #eff6ff;
            --border-color: #dbeafe;
            --btn-hover-shadow: rgba(59, 130, 246, 0.3);
        }
    </style>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="../assets/kakao-share.js" defer></script>
</head>
<body>

<div class="card">
    <div id="start-area">
        <div class="result-image">🍱</div>
        <h1 class="title">오늘 점심 뭐 먹지?<br>결정장애 스캐너</h1>
        <p class="description">메뉴 고르는 데 30분 넘게 걸린다면?<br>당신의 입맛 바이브를 스캔해서 골라드립니다!</p>
        <button class="btn-start" onclick="startTest()">메뉴 추천 시작하기 🔍</button>
    </div>

    <div id="quiz-area" style="display: none;">
        <div class="progress-bar"><div class="progress" id="progress"></div></div>
        <div id="q-number" class="tiny" style="margin-bottom: 10px; font-weight:700;">Question 1 / 5</div>
        <div class="title" id="question-text" style="font-size: 20px;">질문 불러오는 중...</div>
        <div id="options-container"></div>
    </div>

    <div id="result-area" style="display: none;">
        <div class="tiny" style="font-weight: 700;">오늘의 추천 메뉴</div>
        <div id="res-image" class="result-image">🍜</div>
        <div id="res-name" class="result-title">결과 이름</div>
        
        <div class="result-box">
            <span class="result-box-title">🔍 AI 영양사 분석</span>
            <div id="res-desc" class="result-desc">결과 설명이 여기에 나옵니다.</div>
        </div>

        <div class="action-btns">
            <button class="btn-kakao">
                <img src="https://developers.kakao.com/assets/img/about/logos/kakaotalksharing/kakaotalk_sharing_btn_medium.png" width="20">
                내 추천 메뉴 친구에게 알려주기
            </button>
            <a href="https://blog.naver.com/forgiven_77/224195220807" target="_blank" class="btn-blog">
                👀 다른 재미있는 테스트 구경가기
            </a>
            <button class="btn-retry" onclick="location.reload()">🔄 다시 테스트하기</button>
        </div>
    </div>
</div>

<script>
    let currentQ = 0;
    let score = { K: 0, C: 0, J: 0, W: 0 };

    const questions = [
        {
            q: "지금 가장 먼저 떠오르는 맛은?",
            options: [
                { text: "칼칼하고 매콤한 한식", type: 'K' },
                { text: "부드럽고 느끼한 치즈/크림", type: 'W' },
                { text: "새콤달콤하고 기름진 맛", type: 'C' },
                { text: "깔끔하고 담백한 넘김", type: 'J' }
            ]
        },
        {
            q: "오늘의 식사 메이트(또는 기분)는?",
            options: [
                { text: "빨리 먹고 쉬고 싶은 혼밥", type: 'J' },
                { text: "스트레스 풀고 싶은 직장 동료들", type: 'K' },
                { text: "대화 나누며 여유로운 분위기", type: 'W' },
                { text: "시끌벅적 맛있게 먹는 친구들", type: 'C' }
            ]
        },
        {
            q: "밥 vs 면 vs 기타?",
            options: [
                { text: "한국인은 역시 밥심이지", type: 'K' },
                { text: "간단하게 후루룩 면 요리", type: 'J' },
                { text: "오늘은 좀 특별한 별미", type: 'C' },
                { text: "우아하게 칼질이나 빵", type: 'W' }
            ]
        },
        {
            q: "현재 당신의 배고픔 지수는?",
            options: [
                { text: "당장 뭐라도 씹어 먹고 싶다", type: 'C' },
                { text: "든든하게 채우고 싶다", type: 'K' },
                { text: "가볍고 산뜻하게 먹고 싶다", type: 'J' },
                { text: "맛있는 거 적당히 즐기고 싶다", type: 'W' }
            ]
        },
        {
            q: "식사 후 가장 마시고 싶은 음료는?",
            options: [
                { text: "얼죽아! 시원한 아이스 아메리카노", type: 'W' },
                { text: "따뜻하고 구수한 차 종류", type: 'K' },
                { text: "톡 쏘는 상쾌한 탄산음료", type: 'C' },
                { text: "부드러운 티 나 주스", type: 'J' }
            ]
        }
    ];

    const results = {
        K: { name: "역시 힘이 나는\n든든한 한식 한상", img: "🍚", desc: "오늘은 찌개나 덮밥 어떠세요? 김치찌개, 된장찌개, 혹은 불고기 덮밥처럼 속이 확 풀리는 뜨끈한 음식이 당신의 에너지를 채워줄 거예요!" },
        C: { name: "화려한 유혹\n중식 또는 퓨전", img: "🥢", desc: "짜장면, 짬뽕, 마라탕! 화끈한 불맛과 기름진 풍미가 스트레스를 날려줄 거예요. 오늘은 고민하지 말고 젓가락을 들으세요!" },
        J: { name: "깔끔하고 단정한\n일식 또는 면류", img: "🍱", desc: "초밥, 라멘, 돈카츠처럼 깔끔하게 한 그릇 비울 수 있는 음식을 추천합니다. 속에 부담 없고 기분까지 정갈해지는 식사가 될 거예요." },
        W: { name: "기분 전환 완료\n양식 또는 브런치", img: "🍝", desc: "파스타, 스테이크, 혹은 두툼한 수제 버거! 오늘은 좀 특별하게 즐겨보세요. 맛있는 소스와 화려한 비주얼이 당신의 점심시간을 빛내줄 겁니다." }
    };

    function startTest() {
        document.getElementById('start-area').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        let percent = (currentQ / questions.length) * 100;
        document.getElementById('progress').style.width = percent + '%';
        document.getElementById('q-number').innerText = `Question ${currentQ + 1} / ${questions.length}`;
        let currentData = questions[currentQ];
        document.getElementById('question-text').innerText = currentData.q;
        let container = document.getElementById('options-container');
        container.innerHTML = "";
        currentData.options.forEach(opt => {
            let btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt.text;
            btn.onclick = () => nextQuestion(opt.type);
            container.appendChild(btn);
        });
    }

    function nextQuestion(type) {
        score[type]++;
        currentQ++;
        if (currentQ < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        let maxVal = -1;
        let finalType = 'K';
        for (let k in score) {
            if (score[k] > maxVal) { maxVal = score[k]; finalType = k; }
        }
        let resultData = results[finalType];
        document.getElementById('res-image').innerText = resultData.img;
        document.getElementById('res-name').innerHTML = resultData.name.replace('\n', '<br>');
        document.getElementById('res-desc').innerHTML = resultData.desc;
    }
</script>
</body>
</html>
