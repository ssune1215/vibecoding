<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="../assets/vibe-theme.css">
    <style>
        :root {
            --main-color: #eab308; /* 옐로우 골드 */
            --bg-light: #fefce8;
            --card-bg: #ffffff;
            --text-dark: #334155;
            --border-color: #fef08a;
            --btn-hover-shadow: rgba(234, 179, 8, 0.3);
        }
        html, body { min-height: 100vh; margin: 0; }
        .container { text-align: center; background: var(--card-bg); padding: 35px 30px; border-radius: 28px; box-shadow: 0 15px 35px var(--btn-hover-shadow); width: 100%; max-width: 450px; border: 1px solid var(--border-color); }
        h1 { color: var(--main-color); font-size: 26px; font-weight: 800; margin-bottom: 10px; line-height: 1.3; word-break: keep-all; }
        p { color: #64748b; font-size: 15px; margin-bottom: 30px; word-break: keep-all; line-height: 1.6; }
        .display-card { background: var(--bg-light); border: 2px dashed #fde047; padding: 40px 20px; border-radius: 16px; margin-bottom: 25px; min-height: 120px; display: flex; align-items: center; justify-content: center; }
        #menu-display { font-size: 28px; font-weight: 800; color: #ca8a04; margin: 0; word-break: keep-all; }
        .btn-start { background-color: var(--main-color); color: white; border: none; padding: 20px; font-size: 19px; font-weight: 800; border-radius: 20px; cursor: pointer; transition: 0.2s; box-shadow: 0 6px 20px var(--btn-hover-shadow); width: 100%; }
        .btn-start:active { transform: translateY(4px); box-shadow: 0 2px 10px var(--btn-hover-shadow); }
        .btn-start:disabled { background-color: #cbd5e1; box-shadow: none; cursor: not-allowed; opacity: 0.7; }
        
        .btn-stop { background-color: #f43f5e; color: white; border: none; padding: 20px; font-size: 19px; font-weight: 800; border-radius: 20px; cursor: pointer; transition: 0.2s; box-shadow: 0 6px 20px rgba(244,63,94,0.3); width: 100%; }
        .btn-stop:active { transform: translateY(4px); box-shadow: 0 2px 10px rgba(244,63,94,0.3); }
        
        .sub-text { margin-top: 25px; font-size: 14px; color: #94a3b8; }
    </style>    
</head>
<body>
<div class=\"pageCenter\">

    <div class="container">
        <div id="start-area">
            <div style="font-size: 50px; margin-bottom: 10px;">🍔</div>
            <div class="main-title">오늘 뭐 먹지?<br>메뉴 스캐너</div>
            <div class="display-card">
                <div id="menu-display">준비완료!</div>
            </div>
            <button class="btn-start" id="mainBtn" onclick="toggleButton()">스캔 시작!</button>
            <p class="sub-text">결정장애 치료제 v3.1</p>
        </div>

        <div id="result-area" style="display: none;">
            <div style="font-size: 50px; margin-bottom: 10px;">✨</div>
            <div class="main-title">오늘의 메뉴</div>
            <div class="display-card" style="min-height: auto; padding: 20px;">
                <div id="final-menu" style="font-size: 28px; font-weight: 800; color: #ef4444;"></div>
            </div>
            
            <div style="margin-top: 20px; border-top: 1px dashed #e2e8f0; padding-top: 25px; display: flex; flex-direction: column; gap: 12px;">
                <button class="btn-start" style="background: #FEE500; color: #3A1D1D; font-size: 16px; padding: 16px; box-shadow: none;" onclick="shareKakao()">카톡으로 메뉴 알려주기</button>
                <a href="https://blog.naver.com/forgiven_77/224195220807" target="_blank" style="text-decoration: none; background: #3b82f6; color: white; padding: 16px; border-radius: 20px; font-weight:800; font-size:16px;">다른 심리테스트 하러가기</a>
                <button class="btn-start" style="background: #ef4444; font-size: 16px; padding: 16px; box-shadow: none;" onclick="location.reload()">다시 고르기</button>
            </div>
        </div>
    </div>

    <script>
        const menus = ['제육볶음', '돈까스', '마라탕', '초밥', '햄버거', '쌀국수', '김치찌개', '짜장면', '샌드위치', '분식', '치킨', '샐러드', '삼겹살', '파스타', '국밥', '텐동', '타코', '냉면', '찜닭', '부대찌개', '비빔밥', '우동', '소바', '라멘', '규동', '스테이크', '피자', '훠궈', '양꼬치', '닭갈비', '순대국', '감자탕', '보쌈', '족발', '아구찜', '칼국수', '수제비', '샤브샤브', '월남쌈', '탄탄면', '김밥', '떡볶이', '직화구이', '육회비빔밥', '고등어조림', '간장게장', '순두부찌개', '카레', '오므라이스', '물회'];
        const display = document.getElementById('menu-display');
        const btn = document.getElementById('mainBtn');
        
        let state = "READY"; 
        let scanInterval;

        function toggleButton() {
            if (state === "READY") {
                startScanning();
            } else if (state === "SCANNING") {
                stopScanning();
            }
        }

        function startScanning() {
            state = "SCANNING";
            btn.innerText = "!!!스톱!!!"; // 요청하신 대로 수정
            btn.className = "btn btn-stop";
            
            scanInterval = setInterval(() => {
                const randomIndex = Math.floor(Math.random() * menus.length);
                display.innerText = menus[randomIndex];
                display.style.color = `hsl(${Math.random() * 360}, 70%, 50%)`;
            }, 60);
        }

        function stopScanning() {
            state = "STOPPING";
            clearInterval(scanInterval);
            btn.disabled = true;
            btn.innerText = "운명 결정 중...";

            const totalDuration = Math.floor(Math.random() * 1000) + 4000; 
            const startTime = Date.now();

            function slowDown() {
                const elapsed = Date.now() - startTime;
                const randomIndex = Math.floor(Math.random() * menus.length);
                display.innerText = menus[randomIndex];
                display.style.color = `hsl(${Math.random() * 360}, 70%, 50%)`;

                if (elapsed < totalDuration) {
                    const nextTick = 60 + Math.pow(elapsed / totalDuration, 4) * 500;
                    setTimeout(slowDown, nextTick);
                } else {
                    finish();
                }
            }
            slowDown();
        }

        function finish() {
            state = "READY";
            const result = display.innerText;
            document.getElementById('start-area').style.display = 'none';
            document.getElementById('result-area').style.display = 'block';
            document.getElementById('final-menu').innerText = result;

            confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 } });
        }

        const KAKAO_KEY = "b30b6d088f5b3551adc2890111d071fc";
        function shareKakao() {
            if (!window.Kakao) return;
            if (!Kakao.isInitialized()) Kakao.init(KAKAO_KEY);
            const menu = document.getElementById('final-menu').innerText;
            Kakao.Share.sendDefault({
                objectType: 'feed',
                content: {
                    title: '오늘 점심 메뉴 결정!',
                    description: '스캐너가 골라준 메뉴는 [' + menu + '] 입니다. 같이 먹으러 가요!',
                    imageUrl: window.location.origin + '/assets/share-thumb.jpg',
                    link: { mobileWebUrl: window.location.href, webUrl: window.location.href },
                },
                buttons: [
                    { title: '나도 메뉴 고르기', link: { mobileWebUrl: window.location.href, webUrl: window.location.href } },
                    { title: '다른 테스트 구경하기', link: { mobileWebUrl: 'https://blog.naver.com/forgiven_77/224195220807', webUrl: 'https://blog.naver.com/forgiven_77/224195220807' } }
                ],
            });
        }
    </script>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"></script>
</div>
