<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연애 테스트 | 나의 상대 유형은?</title>
    
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="나의 연애 상대 유형은? 연애 테스트" />
    <meta property="og:description" content="헤어진 연인, 짝사랑, 새로운 만남... 당신의 연애 리듬을 통해 최고의 상대 유형을 알아봅니다!" />
    <meta property="og:url" content="./" />
    <meta property="og:image" content="../assets/share-thumb.jpg" />

    <link rel="stylesheet" href="../assets/vibe-theme.css">
    <style>
        :root {
            --main-color: #a855f7; /* 퍼플 */
            --bg-light: #faf5ff;
            --border-color: #f3e8ff;
            --btn-hover-shadow: rgba(168, 85, 247, 0.3);
        }
    </style>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="../assets/kakao-share.js" defer></script>
</head>
<body>

<div class="card">
    <div id="start-area">
        <div class="result-image">💘</div>
        <h1 class="title">나의 연애<br>상대 유형은?</h1>
        <p class="description">당신의 연애 리듬과 심리를 분석하여<br>찰떡궁합인 상대 유형을 골라드립니다!</p>
        <button class="btn-start" onclick="startTest()">테스트 시작하기 🚀</button>
    </div>

    <div id="quiz-area" style="display: none;">
        <div class="progress-bar"><div class="progress" id="progress"></div></div>
        <div id="q-number" class="tiny" style="margin-bottom: 10px; font-weight:700;">Question 1 / 5</div>
        <div class="title" id="question-text" style="font-size: 20px;">질문 불러오는 중...</div>
        <div id="options-container"></div>
    </div>

    <div id="result-area" style="display: none;">
        <div class="tiny" style="font-weight: 700;">나의 상대 유형 진단 결과</div>
        <div id="res-image" class="result-image">✨</div>
        <div id="res-name" class="result-title">결과 이름</div>
        
        <div class="result-box">
            <span class="result-box-title">🔍 심리 분석관의 리포트</span>
            <div id="res-desc" class="result-desc">결과 설명이 여기에 나옵니다.</div>
        </div>

        <div class="action-btns">
            <button class="btn-kakao">
                <img src="https://developers.kakao.com/assets/img/about/logos/kakaotalksharing/kakaotalk_sharing_btn_medium.png" width="20">
                내 결과 카톡으로 알리기
            </button>
            <a href="https://blog.naver.com/forgiven_77/224219719421" target="_blank" class="btn-blog">
                👀 다른 재미있는 테스트 구경가기
            </a>
            <button class="btn-retry" onclick="location.reload()">🔄 다시 테스트하기</button>
        </div>
    </div>
</div>

<script>
    let currentQ = 0;
    let score = { bear: 0, cool: 0, transfer: 0, pro: 0 };

    const questions = [
        { 
            q: "헤어진 연인의 SNS를 보게 되었을 때 나의 반응은?", 
            options: [
                { text: "부계정으로라도 몰래 본다", type: 'bear' },
                { text: "전혀 관심 없고 내 살 길 찾는다", type: 'transfer' },
                { text: "비웃어주고 내 잘나온 사진 올린다", type: 'cool' },
                { text: "옆에 있는 사람이 누구인지 추적한다", type: 'pro' }
            ]
        },
        { 
            q: "술기운에 짝사랑 상대에게 전화가 걸렸다면?", 
            options: [
                { text: "바로 끊고 다음날 이불킥 한다", type: 'bear' },
                { text: "일단 '보고 싶다'고 고백한다", type: 'pro' },
                { text: "기억 안 난다며 시치미 뗀다", type: 'cool' },
                { text: "전화 온 줄도 모르고 다른 모임 즐긴다", type: 'transfer' }
            ]
        },
        { 
            q: "고백하기 딱 좋은 타이밍! 나의 전략은?", 
            options: [
                { text: "진심 어린 장문의 편지를 쓴다", type: 'bear' },
                { text: "'우리 1일?' 하고 돌직구 날린다", type: 'transfer' },
                { text: "취한 척하며 은근슬쩍 플러팅 한다", type: 'cool' },
                { text: "차일까 봐 그냥 친구로 지낸다", type: 'pro' }
            ]
        },
        { 
            q: "환승 이별에 대한 나의 생각은?", 
            options: [
                { text: "절대 용납 못할 비매너 행동이다", type: 'bear' },
                { text: "마음 떠나면 갈아탈 수도 있다", type: 'transfer' },
                { text: "나도 상황 되면 환승하겠다", type: 'cool' },
                { text: "배신감에 지구 끝까지 쫓아간다", type: 'pro' }
            ]
        },
        { 
            q: "이별 후 가장 빠른 극복 방법은?", 
            options: [
                { text: "일주일간 펑펑 울며 슬퍼한다", type: 'bear' },
                { text: "바로 새로운 만남을 찾아 나선다", type: 'transfer' },
                { text: "일에 몰두하며 갓생을 산다", type: 'cool' },
                { text: "혹시 연락 올까 봐 폰만 본다", type: 'pro' }
            ]
        }
    ];

    const results = {
        bear: { name: "추억에 사는\n감성 곰탱이형", img: "🐻", desc: "미련이 뚝뚝! 과거에 얽매여 새로운 사랑을 놓치기 쉬운 타입입니다. 하지만 그만큼 한 사람에게 진심인 당신! 이제는 과거보다 현재에 집중해보세요." },
        cool: { name: "차갑고 도도한\n쿨병 말기 환자형", img: "😎", desc: "겉으로는 세상 쿨한 척하지만 속으로는 이불킥 하고 있을지도 몰라요. 솔직하게 감정을 표현하는 연습이 필요합니다. 솔직함이 더 매력적일 수 있거든요!" },
        transfer: { name: "회복력 만렙\n환승 마스터형", img: "🏎️", desc: "이별은 새로운 만남으로 잊는 법! 회복 탄력성이 어마어마한 실속파입니다. 주변의 시선보다는 자신의 행복을 최우선으로 하는 당당한 모습이 매력적이에요." },
        pro: { name: "망상 대잔치\n짝사랑 프로 선수형", img: "🎭", desc: "혼자 손자 이름까지 다 지어놓는 당신! 상상력만큼은 우주 최강입니다. 친구라는 이름 뒤에 숨지 말고 조금 더 용기를 내어 다가가보세요." }
    };

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function startTest() {
        shuffle(questions);
        questions.forEach(q => shuffle(q.options));
        document.getElementById('start-area').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        let percent = (currentQ / questions.length) * 100;
        document.getElementById('progress').style.width = percent + '%';
        document.getElementById('q-number').innerText = `Question ${currentQ + 1} / ${questions.length}`;
        let currentData = questions[currentQ];
        document.getElementById('question-text').innerText = currentData.q;
        let container = document.getElementById('options-container');
        container.innerHTML = "";
        currentData.options.forEach(opt => {
            let btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt.text;
            btn.onclick = () => nextQuestion(opt.type);
            container.appendChild(btn);
        });
    }

    function nextQuestion(type) {
        score[type]++;
        currentQ++;
        if (currentQ < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        let maxVal = -1;
        let finalType = 'bear';
        for (let k in score) {
            if (score[k] > maxVal) { maxVal = score[k]; finalType = k; }
        }
        let resultData = results[finalType];
        document.getElementById('res-image').innerText = resultData.img;
        document.getElementById('res-name').innerHTML = resultData.name.replace('\n', '<br>');
        document.getElementById('res-desc').innerHTML = resultData.desc;
    }
</script>
</body>
</html>
