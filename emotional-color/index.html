<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 감정 색깔 테스트 | 내 내면의 색은 무엇일까?</title>
    
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="나의 감정 색깔 테스트 | 나의 내면은 어떤 색일까요?" />
    <meta property="og:description" content="평소 나의 선택으로 알아보는 내 안의 진짜 컬러! 지금 바로 확인해보세요." />
    <meta property="og:url" content="./" />
    <meta property="og:image" content="../assets/share-thumb.jpg" />

    <link rel="stylesheet" href="../assets/vibe-theme.css">
    <style>
        :root {
            --main-color: #6366f1; /* 초기값: 인디고 */
            --bg-light: #f5f3ff;
            --border-color: #e0e7ff;
            --btn-hover-shadow: rgba(99, 102, 241, 0.2);
        }
    </style>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="../assets/kakao-share.js" defer></script>
</head>
<body>

<div class="card">
    <div id="start-area">
        <div class="result-image">🎨✨</div>
        <h1 class="title">나의 감정 색깔<br>심리 테스트</h1>
        <p class="description">가벼운 선택으로 알아보는<br>내 안의 숨겨진 컬러를 찾아드려요.</p>
        <button class="btn-start" onclick="startTest()">내 컬러 찾기 시작 🚀</button>
    </div>

    <div id="quiz-area" style="display: none;">
        <div class="progress-bar"><div class="progress" id="progress"></div></div>
        <div id="q-number" class="tiny" style="margin-bottom: 10px; font-weight:700;">Question 1 / 5</div>
        <div class="title" id="question-text" style="font-size: 19px; line-height: 1.4;">질문 로딩 중...</div>
        <div id="options-container"></div>
    </div>

    <div id="result-area" style="display: none;">
        <div class="tiny" style="font-weight: 700;">내 안의 진짜 컬러는?</div>
        <div id="res-image" class="result-image">🌈</div>
        <div id="res-name" class="result-title">결과 이름</div>
        
        <div class="result-box">
            <span class="result-box-title">🎨 감정 컬러 분석</span>
            <div id="res-desc" class="result-desc">결과 설명이 여기에 나옵니다.</div>
        </div>

        <div class="action-btns">
            <button class="btn-kakao">
                <img src="https://developers.kakao.com/assets/img/about/logos/kakaotalksharing/kakaotalk_sharing_btn_medium.png" width="20">
                결과 카톡 공유하기
            </button>
            <a href="https://blog.naver.com/forgiven_77/224198478277" target="_blank" class="btn-blog">
                👀 다른 테스트 해보기
            </a>
            <button class="btn-retry" onclick="location.reload()">🔄 다시 하기</button>
        </div>
    </div>
</div>

<script>
    let currentQ = 0;
    let score = { R: 0, B: 0, Y: 0, P: 0, G: 0 };

    const questions = [
        {
            q: "새로 생긴 예쁜 카페에 들어갔을 때, 당신이 가장 먼저 하는 행동은?",
            options: [
                { text: "분위기가 너무 좋아서 바로 사진을 찍는다.", type: 'Y' },
                { text: "메뉴판을 정독하며 가장 조용한 자리를 찾는다.", type: 'B' },
                { text: "잔잔한 음악이 흐르는 공간에서 멍하니 앉아 있는다.", type: 'G' },
                { text: "주문 줄이 긴지 체크하고 빠르게 메뉴를 고른다.", type: 'R' }
            ]
        },
        {
            q: "주말 계획이 비 소식으로 취소되었습니다. 이때 당신의 기분은?",
            options: [
                { text: "오히려 좋아! 집에서 넷플릭스 정주행각이다.", type: 'P' },
                { text: "아쉽지만 비 오는 날 가기 좋은 곳을 새로 찾는다.", type: 'Y' },
                { text: "창밖을 보며 좋아하는 음악을 듣고 감상에 젖는다.", type: 'G' },
                { text: "계획이 틀어져 아쉽지만 못다 한 일을 처리한다.", type: 'B' }
            ]
        },
        {
            q: "중요한 일을 앞두고 긴장될 때, 당신의 해결 방법은?",
            options: [
                { text: "크게 소리를 지르거나 활동적인 일로 에너지를 쓴다.", type: 'R' },
                { text: "만약을 대비해 플랜 B까지 꼼꼼하게 점검한다.", type: 'B' },
                { text: `"잘 될 거야!"라고 생각하며 긍정적인 상상을 한다.`, type: 'Y' },
                { text: "아주 광활한 우주를 상상하며 현재를 잊으려 한다.", type: 'P' }
            ]
        },
        {
            q: "친구가 갑자기 고민을 털어놓으며 눈물을 흘린다면?",
            options: [
                { text: "말없이 곁에서 따뜻하게 안아주며 공감해 준다.", type: 'G' },
                { text: "차분하게 상황을 분석해서 실용적인 조언을 한다.", type: 'B' },
                { text: "분위기를 바꾸려 맛있는 걸 먹으러 가자고 한다.", type: 'Y' },
                { text: "친구가 울음을 그칠 때까지 같이 화내며 욕해준다.", type: 'R' }
            ]
        },
        {
            q: "당신의 옷장을 열었을 때 가장 많이 보이는 스타일은?",
            options: [
                { text: "깔끔한 무채색 계열의 단정한 스타일.", type: 'B' },
                { text: "밝고 화사한 색감의 기분 좋아지는 옷들.", type: 'Y' },
                { text: "활동성 좋은 트레이닝복이나 강렬한 옷들.", type: 'R' },
                { text: "독특하고 유니크한 나만의 개성이 담긴 옷들.", type: 'P' }
            ]
        }
    ];

    const results = {
        Y: { 
            name: "찬란한 빛\n서니 골드 (Sunny Gold)", 
            img: "✨💛", color: "#eab308", 
            desc: "당신은 주변을 밝게 만드는 태양 같은 존재입니다! 긍정적인 에너지가 넘쳐 사람들의 마음을 환하게 밝히는군요. 당신의 찬란함을 잃지 마세요!" 
        },
        B: { 
            name: "깊고 고요한 지혜\n딥 오션 블루 (Deep Ocean Blue)", 
            img: "🌊💙", color: "#1e40af", 
            desc: "당신은 폭풍우 속에서도 흔들리지 않는 냉철함을 지녔습니다. 당신의 침착함은 주변 사람들에게 큰 신뢰와 안정감을 주는군요." 
        },
        R: { 
            name: "심장을 뛰게 만드는 불꽃\n패션 레드 (Passion Red)", 
            img: "🔥❤️", color: "#dc2626", 
            desc: "당신은 목표를 향해 달려가는 열정의 소유자입니다! 강한 추진력과 넘치는 에너지는 주변의 지루함을 한순간에 날려보낼 힘이 있습니다." 
        },
        P: { 
            name: "신비로운 꿈\n갤럭시 퍼플 (Galaxy Purple)", 
            img: "🌌💜", color: "#7e22ce", 
            desc: "당신은 남들이 보지 못하는 것을 느끼는 독창적인 영혼의 소유자입니다. 예술적인 감수성과 상상력이 당신을 더욱 특별하게 만드네요." 
        },
        G: { 
            name: "평온한 대지\n힐링 에메랄드 (Healing Emerald)", 
            img: "🌿💚", color: "#059669", 
            desc: "당신은 지친 이들에게 안식처를 주는 숲 같은 사람입니다. 타인의 아픔을 진심으로 안아주는 당신의 포용력은 정말 위대합니다." 
        }
    };

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function startTest() {
        shuffle(questions);
        questions.forEach(q => shuffle(q.options));
        document.getElementById('start-area').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        let percent = (currentQ / questions.length) * 100;
        document.getElementById('progress').style.width = percent + '%';
        document.getElementById('q-number').innerText = `Question ${currentQ + 1} / ${questions.length}`;
        let currentData = questions[currentQ];
        document.getElementById('question-text').innerText = currentData.q;
        let container = document.getElementById('options-container');
        container.innerHTML = "";
        currentData.options.forEach(opt => {
            let btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt.text;
            btn.onclick = () => nextQuestion(opt.type);
            container.appendChild(btn);
        });
    }

    function nextQuestion(type) {
        score[type]++;
        currentQ++;
        if (currentQ < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        
        let finalType = Object.keys(score).reduce((a, b) => score[a] >= score[b] ? a : b);
        let resultData = results[finalType];

        document.getElementById('res-image').innerText = resultData.img;
        document.getElementById('res-name').innerHTML = resultData.name.replace('\n', '<br>');
        document.getElementById('res-desc').innerHTML = resultData.desc;
        
        document.documentElement.style.setProperty('--main-color', resultData.color);
    }
</script>
</body>
</html>
