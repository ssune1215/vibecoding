<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연애 동물 테스트 | 나의 야생적 연애 본능은? 🦊</title>
    
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="연애 동물 테스트 | 나는 어떤 동물일까?" />
    <meta property="og:description" content="본능에 충실한 나의 연애 스타일! 동물 유형으로 확인해보세요." />
    <meta property="og:url" content="./" />
    <meta property="og:image" content="../assets/share-thumb.jpg" />

    <link rel="stylesheet" href="../assets/vibe-theme.css">
    <style>
        :root {
            --main-color: #f59e0b; /* 앰버/오렌지 */
            --bg-light: #fffbeb;
            --border-color: #fef3c7;
            --btn-hover-shadow: rgba(245, 158, 11, 0.2);
        }
    </style>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="../assets/kakao-share.js" defer></script>
</head>
<body>

<div class="card">
    <div id="start-area">
        <div class="result-image">🦁🦒</div>
        <h1 class="title">나의 야생적 본능<br>연애 동물 테스트</h1>
        <p class="description">당신이 한 마리의 동물이 되어 숲을 다닌다면?<br>본능적인 선택으로 알아보는 연애 스타일!</p>
        <button class="btn-start" onclick="startTest()">본능 탐험 시작 🚀</button>
    </div>

    <div id="quiz-area" style="display: none;">
        <div class="progress-bar"><div class="progress" id="progress"></div></div>
        <div id="q-number" class="tiny" style="margin-bottom: 10px; font-weight:700;">Question 1 / 5</div>
        <div class="title" id="question-text" style="font-size: 19px; line-height: 1.4;">상황 로딩 중...</div>
        <div id="options-container"></div>
    </div>

    <div id="result-area" style="display: none;">
        <div class="tiny" style="font-weight: 700;">당신을 상징하는 연애 동물은?</div>
        <div id="res-image" class="result-image">🦊</div>
        <div id="res-name" class="result-title">결과 이름</div>
        
        <div class="result-box">
            <span class="result-box-title">🐾 야생 본능 리포트</span>
            <div id="res-desc" class="result-desc">결과 분석 내용이 여기에 나옵니다.</div>
        </div>

        <div class="action-btns">
            <button class="btn-kakao">
                <img src="https://developers.kakao.com/assets/img/about/logos/kakaotalksharing/kakaotalk_sharing_btn_medium.png" width="20">
                결과 카톡 공유하기
            </button>
            <a href="https://blog.naver.com/forgiven_77/224219719421" target="_blank" class="btn-blog">
                👀 다른 테스트 구경가기
            </a>
            <button class="btn-retry" onclick="location.reload()">🔄 다시 하기</button>
        </div>
    </div>
</div>

<script>
    let currentQ = 0;
    let score = 0;

    const questions = [
        {
            q: "당신은 야생 동물이 되어 숲을 여행 중입니다. 자극적인 냄새가 나는 열매를 발견했을 때 반응은?",
            options: [
                { text: "무슨 맛일까? 일단 한입 크게 먹어본다.", point: 3 },
                { text: "안전할까? 충분히 냄새를 맡고 조금만 먹는다.", point: 1 },
                { text: "나만 먹을 수 없지! 무리 친구들을 불러서 부른다.", point: 2 },
                { text: "관심 없다. 더 짜릿한 사냥감을 찾아 떠난다.", point: 3 }
            ]
        },
        {
            q: "숲속에서 무리와 떨어져 혼자 동굴에서 자게 되었습니다. 당신이 휴식을 취하는 방식은?",
            options: [
                { text: "나를 완벽하게 숨길 수 있는 좁은 구석을 찾는다.", point: 1 },
                { text: "입구 근처에서 언제든 적에 대비하며 잠을 잔다.", point: 2 },
                { text: "다른 동물의 온기가 느껴지는 장소를 찾아낸다.", point: 2 },
                { text: "내가 짱이야! 동굴 한복판에서 당당하게 잔다.", point: 3 }
            ]
        },
        {
            q: "드디어 마음에 쏙 드는 이성 동물을 발견했습니다! 당신의 본능적인 유혹 기술은?",
            options: [
                { text: "지켜보다가 그가 곤란할 때 나타나서 도와준다.", point: 2 },
                { text: "화려한 깃털이나 울음소리로 존재감을 드러낸다.", point: 3 },
                { text: "수줍게 먹이를 물어다 주며 마음을 표현한다.", point: 1 },
                { text: "먼저 다가가 장난을 치며 분위기를 리드한다.", point: 3 }
            ]
        },
        {
            q: "짝꿍이 다른 경쟁 동물과 함께 있는 모습을 목격했다면, 이때 당신의 반응은?",
            options: [
                { text: "당장 뛰어가서 상대 동물을 쫓아버리려 한다.", point: 3 },
                { text: "조용히 다가가 나만 바라보게 만드는 압박을 준다.", point: 2 },
                { text: "일단 지켜보고 나중에 서운함을 조심히 전한다.", point: 1 },
                { text: "내 매력이 넘치니 결국 돌아올 거라는 자신을 갖는다.", point: 2 }
            ]
        },
        {
            q: "당신이 생각하는 가장 이상적인 '야생의 연애' 모습은?",
            options: [
                { text: "한 번 맺은 인연은 죽을 때까지 지키는 순애보.", point: 1 },
                { text: "각자의 영역을 존중하며 지켜주는 쿨한 동맹.", point: 2 },
                { text: "매일매일이 새롭고 불꽃 같은 뜨거운 사랑.", point: 3 },
                { text: "서로 털을 골라주며 일상을 공유하는 평화로운 공생.", point: 2 }
            ]
        }
    ];

    const results = [
        { min: 0, max: 4, name: "평화를 사랑하는 순둥이\n느림보 나무늘보형", img: "🦥💚", desc: "다가오는 기회에도 조심스러워서 썸만 타다 증발할 확률이 높아요. 하지만 한 번 마음을 열면 누구보다 편안한 안식처가 되어줍니다." },
        { min: 5, max: 8, name: "앙큼한 밀당러\n까칠 도도 고양이형", img: "🐈💎", desc: "새침한 척하지만 속으로는 '날 좀 꼬셔봐' 모드인 당신! 안달 나게 만드는 치명적인 매력이 넘칩니다. 사귀면 앙큼하게 잘 챙겨주겠네요." },
        { min: 9, max: 12, name: "사랑밖에 모르는 바보\n온리유 리트리버형", img: "🐕💖", desc: "한 번 꽂히면 이성 잃고 올인하는 찐 사랑꾼! 투명하고 예쁜 마음이야말로 당신을 빛나게 하는 무기입니다. 당신의 매력에 안 넘어오긴 힘들걸요?" },
        { min: 13, max: 15, name: "야성미 폭발 불도저\n카리스마 흑표범형", img: " Leopard🔥", desc: "본능에 충실한 마라맛 연애 고수입니다! 강렬한 눈빛과 거침없는 직진은 상대를 단숨에 제압하죠. 당신과의 연애는 매 순간이 짜릿할 거예요!" }
    ];

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function startTest() {
        shuffle(questions);
        questions.forEach(q => shuffle(q.options));
        document.getElementById('start-area').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        let percent = (currentQ / questions.length) * 100;
        document.getElementById('progress').style.width = percent + '%';
        document.getElementById('q-number').innerText = `Question ${currentQ + 1} / ${questions.length}`;
        let currentData = questions[currentQ];
        document.getElementById('question-text').innerText = currentData.q;
        let container = document.getElementById('options-container');
        container.innerHTML = "";
        currentData.options.forEach(opt => {
            let btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt.text;
            btn.onclick = () => nextQuestion(opt.point);
            container.appendChild(btn);
        });
    }

    function nextQuestion(point) {
        score += point;
        currentQ++;
        if (currentQ < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        let resultData = results.find(r => score >= r.min && score <= r.max);
        if(!resultData) resultData = results[0];
        document.getElementById('res-image').innerText = resultData.img;
        document.getElementById('res-name').innerHTML = resultData.name.replace('\n', '<br>');
        document.getElementById('res-desc').innerHTML = resultData.desc;
    }
</script>
</body>
</html>
