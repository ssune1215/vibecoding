<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 연애가 영화라면? | 로맨스 명작 매칭 테스트 🎬</title>
    
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="나의 연애를 영화로 만든다면 어떤 작품일까? 🎬" />
    <meta property="og:description" content="어바웃 타임부터 러브 액츄얼리, 라라랜드까지! 내 연애 스타일과 찰떡인 명작 영화 찾기" />
    <meta property="og:url" content="./" />
    <meta property="og:image" content="../assets/share-thumb.jpg" />

    <link rel="stylesheet" href="../assets/vibe-theme.css">
    <style>
        :root {
            /* 영화관 딥 버건디/와인 테마 */
            --main-color: #9f1239; 
            --bg-light: #fff1f2;
            --border-color: #f43f5e;
            --btn-hover-shadow: rgba(159, 18, 57, 0.2);
        }
        
        body, .result-image, .option-btn, .result-title, .title, .btn-start {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", sans-serif !important;
        }
    </style>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="../assets/kakao-share.js" defer></script>
</head>
<body>

<div class="card">
    <div id="start-area">
        <div class="result-image">🎟️🍿</div>
        <h1 class="title">나의 연애를<br>영화로 만든다면?</h1>
        <p class="description">내가 주인공인 로맨스의 장르는 무엇일까요?<br>5가지 명장면으로 찾는 찰떡궁합 로맨스 명작!</p>
        <button class="btn-start" onclick="startTest()">내 영화 상영하기 🎬</button>
    </div>

    <div id="quiz-area" style="display: none;">
        <div class="progress-bar"><div class="progress" id="progress" style="background-color: var(--main-color);"></div></div>
        <div id="q-number" class="tiny" style="margin-bottom: 10px; font-weight:700; color: #9f1239;">시퀀스 1 / 5</div>
        <div class="title" id="question-text" style="font-size: 19px; line-height: 1.4;">대본 분석 중...</div>
        <div id="options-container"></div>
    </div>

    <div id="result-area" style="display: none;">
        <div class="tiny" style="font-weight: 700; color: #9f1239;">✨ 크랭크 업! 당신의 연애 영화는...</div>
        <div id="res-image" class="result-image" style="font-size: 50px; margin-top: 15px;">🎬</div>
        <div id="res-name" class="result-title" style="margin-top: 5px; color: #9f1239; font-size: 24px;">결과 이름</div>
        
        <div class="result-box" style="border: 2px solid #f43f5e; background-color: white;">
            <span class="result-box-title" style="background-color: #9f1239; color: white;">📝 시놉시스 분석 리포트</span>
            <div id="res-desc" class="result-desc" style="color: #4c0519;">결과 분석 내용이 여기에 표시됩니다.</div>
        </div>

        <div class="action-btns">
            <button class="btn-kakao" style="background-color: #fde047; color: #451a03; border: 1px solid #facc15;">
                <img src="https://developers.kakao.com/assets/img/about/logos/kakaotalksharing/kakaotalk_sharing_btn_medium.png" width="20">
                내 영화 포스터 카톡 공유하기
            </button>
            <a href="https://blog.naver.com/forgiven_77/224198478277" target="_blank" class="btn-blog" style="background-color: #bae6fd; color: #042f2e;">
                👀 다른 테스트 구경 가기
            </a>
            <button class="btn-retry" onclick="location.reload()" style="background-color: #9f1239; color: white;">🔄 다시 상영하기</button>
        </div>
    </div>
</div>

<script>
    let currentQ = 0;
    let score = 0;

    const questions = [
        {
            q: "🎬 남녀 주인공이 처음 만나는 오프닝 시퀀스. 내가 바라는 우리의 첫 만남은?",
            options: [
                { text: "도서관이나 카페에서 무심코 같은 책을 잡으며 시선이 얽히는 클래식한 우연", point: 1 },
                { text: "비 내리는 버스 정류장, 우산이 없어 서성일 때 누군가 슥 씌워주는 우산 속 낭만", point: 2 },
                { text: "왁자지껄한 친구들의 모임 속에서, 유독 나랑만 죽이 잘 맞아 빵 터지는 강렬함", point: 3 },
                { text: "첫인상 최악! 마주칠 때마다 웬수처럼 으르렁거리다 어느새 미운 정이 들어버리는 로코", point: 4 }
            ]
        },
        {
            q: "🎥 영화의 중반부. 가장 달콤한 분위기가 연출될 데이트 명장면은?",
            options: [
                { text: "집에서 편안한 트레이닝복 차림으로 치킨을 시켜놓고 넷플릭스를 정주행하는 소박한 씬", point: 1 },
                { text: "한적하고 예쁜 바다 마을로 무작정 계획 없이 떠나서 발길 닿는 대로 걷고 웃는 씬", point: 2 },
                { text: "유명한 레스토랑 예약에 성공해, 완벽하고 맛있는 식사를 하며 와인잔을 부딪치는 씬", point: 3 },
                { text: "야경이 한눈에 보이는 높은 언덕에 나란히 앉아, 서로의 미래와 꿈에 대해 이야기하는 씬", point: 4 }
            ]
        },
        {
            q: "⚡ 줄거리에 찾아온 필수 위기(갈등)! 주인공인 나는 어떻게 대처할까?",
            options: [
                { text: "일단 각자의 동굴 속에서 감정을 가라앉힐 혼자만의 시간을 가지며 문제점을 곱씹는다.", point: 1 },
                { text: "\"우리 지금 뭐가 문제일까?\" 차분히 테이블에 마주 앉아 논리적이고 어른스럽게 대화한다.", point: 2 },
                { text: "\"미안해, 내가 다 잘못했어ㅠㅠ\" 따뜻하게 왈칵 안아주고 먼저 져주며 서운함을 녹인다.", point: 3 },
                { text: "서로 엉엉 울며 오해를 풀기 위해 비를 뚫고 연인의 집 앞으로 미친 듯이 달려간다.", point: 4 }
            ]
        },
        {
            q: "💖 클라이맥스! 벅차오르는 OST와 함께 서로의 마음을 확인할 때 나올 대사는?",
            options: [
                { text: "\"신기해. 너와 함께 있을 땐 가장 꾸밈없는 나다운 모습이 돼.\"", point: 1 },
                { text: "\"네가 지나가듯 무심코 했던 말들, 내가 하나하나 다 기억하고 있어.\"", point: 2 },
                { text: "\"우리가 함께 손을 잡는다면, 앞으로 이 세상에 못 해낼 일이 없을 거야.\"", point: 3 },
                { text: "\"수많은 우연과 시간이 겹쳐서 너를 만난 건, 내 인생 기적이야.\"", point: 4 }
            ]
        },
        {
            q: "🎞️ 마지막 엔딩 크레딧이 올라갈 때, 이 영화가 관객에게 남길 장르는?",
            options: [
                { text: "서로 함께 성장하며 평생 기댈 수 있는 든든한 내 편을 찾은 [힐링 다큐멘터리 극]", point: 1 },
                { text: "보는 내내 마음이 몽글몽글해지고, 영화가 잔잔하고 짙은 감동의 여운을 남기는 [수채화 멜로]", point: 2 },
                { text: "모든 것을 미치도록 열정적으로 쏟아부어서 후회 하나 없이 짜릿했던 [도파민 액션 로맨스]", point: 3 },
                { text: "매콤달콤! 끝날 때까지 한 치 앞을 알 수 없이 웃기고 지지고 볶았던 [우당탕탕 롤러코스터 코미디]", point: 4 }
            ]
        }
    ];

    const results = [
        { min: 5, max: 6, name: "[뷰티 인사이드]\n잔잔한 수채화 로맨스", img: "🪑❄️", desc: "겉모습과 화려함보다는 내면의 깊은 결을 가장 중시하는 당신. 요란하고 시끄러운 데이트보다는 소박한 일상을 서로의 온기로 따뜻하게 채워나가는 아날로그 감성 100%의 아름다운 영화를 찍고 계시네요." },
        { min: 7, max: 8, name: "[건축학개론]\n서툴지만 아련한 첫사랑", img: "🎧💿", desc: "표현에 조금 서툴고 조심스럽지만, 그 안에 담긴 마음의 크기만큼은 누구보다 큰 당신. 전람회의 노래가 흘러나올 것만 같은, 순수하고 풋풋해서 더욱 기억에 오래 남는 클래식한 연애를 선호합니다." },
        { min: 9, max: 10, name: "[500일의 썸머]\n현실 100% 성장의 로맨스", img: "🍂🏙️", desc: "모든 것이 내 마음대로만 흘러가진 않는 쌉싸름한 현실 연애! 하지만 그 티격태격과 위기 속에서 진짜 나와 타인을 매번 새롭게 배워나가며 가장 어른스럽게 성장하는 탄탄한 스토리를 가졌습니다." },
        { min: 11, max: 13, name: "[비포 선라이즈]\n영혼이 통하는 운명적 멜로", img: "🚂🌅", desc: "기차에서의 우연한 만남처럼 낭만적인 당신! 가벼운 스몰토크보다 가치관, 세계관을 넘나드는 깊은 대화가 밤새도록 통하는 것을 무엇보다 중요하게 생각합니다. 낭만과 지성이 완벽하게 결합된 로맨스네요." },
        { min: 14, max: 15, name: "[어바웃 타임]\n매 순간 진심인 일상 로맨스", img: "⏱️👗", desc: "당신의 카테고리는 따뜻함 그 자체입니다! 거창한 이벤트나 특별한 장소가 아니더라도, 지하철에서 헤어지기 전 나누는 입맞춤 같은 사소한 일상의 모든 1분 1초에 최고의 진심을 쏟아붓는 명작을 만들고 계시네요." },
        { min: 16, max: 17, name: "[라라랜드]\n열정과 꿈이 빛나는 뮤지컬극", img: "💃🕺", desc: "화려한 불꽃처럼 터지는 에너지! 사랑에만 목매는 것이 아니라, 서로의 빛나는 꿈과 열정을 전폭적으로 응원하며 함께 춤을 추듯 찬란하게 부딪히고 성장하는 에너제틱한 텐션의 로맨스를 사랑합니다." },
        { min: 18, max: 19, name: "[노트북]\n미치도록 폭풍 같은 찐사랑", img: "🚣‍♂️🌧️", desc: "미친 듯이 싸우다가도 결국 미치도록 죽고 못 사는 폭풍우 같은 사랑! 주변의 반대나 엄청난 시련이 오더라도 절대 포기하지 않고 한번 마음먹은 감정을 끝까지 직진으로 쏟아붓는 정열의 아이콘입니다." },
        { min: 20, max: 20, name: "[엽기적인 그녀]\n우당탕탕 달콤살벌 로코", img: "👊🎢", desc: "어디로 튈지 모르는 통통 튀는 텐션 최강자! 눈물 빼는 신파 멜로보다는 매일매일 숨넘어가게 웃기고, 티키타카와 장난이 쏟아지는 유쾌 발랄한 로맨틱 코미디를 선호합니다. 지루할 틈이 1초도 없는 최고의 꿀잼 영화네요!" }
    ];

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function startTest() {
        shuffle(questions);
        questions.forEach(q => shuffle(q.options));
        document.getElementById('start-area').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        let percent = (currentQ / questions.length) * 100;
        document.getElementById('progress').style.width = percent + '%';
        document.getElementById('q-number').innerText = `시퀀스 ${currentQ + 1} / ${questions.length}`;
        let currentData = questions[currentQ];
        document.getElementById('question-text').innerText = currentData.q;
        let container = document.getElementById('options-container');
        container.innerHTML = "";
        currentData.options.forEach(opt => {
            let btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt.text;
            btn.onclick = () => nextQuestion(opt.point);
            container.appendChild(btn);
        });
    }

    function nextQuestion(point) {
        score += point;
        currentQ++;
        if (currentQ < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        
        // 와인색/금색 컨페티 효과
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#9f1239', '#fde047', '#f43f5e'] });
        
        let resultData = results.find(r => score >= r.min && score <= r.max);
        if(!resultData) resultData = results[results.length - 1];

        document.getElementById('res-image').innerText = resultData.img;
        document.getElementById('res-name').innerHTML = resultData.name.replace('\n', '<br>');
        document.getElementById('res-desc').innerHTML = resultData.desc;
    }
</script>
</body>
</html>
