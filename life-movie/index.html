<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인생 영화 테스트 | 나의 인생은 어떤 영화일까? 🎞️</title>
    
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="인생 영화 테스트 | 나는 어떤 주인공일까?" />
    <meta property="og:description" content="내가 주인공인 영화, 어떤 장르와 분위기일지 8가지 명작으로 확인해보세요!" />
    <meta property="og:url" content="./" />
    <meta property="og:image" content="../assets/share-thumb.jpg" />

    <link rel="stylesheet" href="../assets/vibe-theme.css">
    <style>
        :root {
            --main-color: #4b5563; /* 다크 그레이/영화관 톤 */
            --bg-light: #f3f4f6;
            --border-color: #d1d5db;
            --btn-hover-shadow: rgba(75, 85, 99, 0.2);
        }
    </style>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="../assets/kakao-share.js" defer></script>
</head>
<body>

<div class="card">
    <div id="start-area">
        <div class="result-image">🎞️🍿</div>
        <h1 class="title">나의 인생 장르<br>인생 영화 테스트</h1>
        <p class="description">당신의 가치관과 태도를 분석하여<br>가장 닮은 8가지 인생 영화를 매칭해 드립니다.</p>
        <button class="btn-start" onclick="startTest()">시나리오 분석 시작 🚀</button>
    </div>

    <div id="quiz-area" style="display: none;">
        <div class="progress-bar"><div class="progress" id="progress"></div></div>
        <div id="q-number" class="tiny" style="margin-bottom: 10px; font-weight:700;">Question 1 / 5</div>
        <div class="title" id="question-text" style="font-size: 19px; line-height: 1.4;">인생 시선 분석 중...</div>
        <div id="options-container"></div>
    </div>

    <div id="result-area" style="display: none;">
        <div class="tiny" style="font-weight: 700;">당신이 주인공인 영화 결과</div>
        <div id="res-image" class="result-image">🎬</div>
        <div id="res-name" class="result-title">결과 이름</div>
        
        <div class="result-box">
            <span class="result-box-title">📑 시나리오 정밀 분석</span>
            <div id="res-desc" class="result-desc">결과 분석 내용이 여기에 표시됩니다.</div>
        </div>

        <div class="action-btns">
            <button class="btn-kakao">
                <img src="https://developers.kakao.com/assets/img/about/logos/kakaotalksharing/kakaotalk_sharing_btn_medium.png" width="20">
                내 결과 카톡 공유하기
            </button>
            <a href="https://blog.naver.com/forgiven_77/224198478277" target="_blank" class="btn-blog">
                👀 다른 테스트 구경 가기
            </a>
            <button class="btn-retry" onclick="location.reload()">🔄 다시 하기</button>
        </div>
    </div>
</div>

<script>
    let currentQ = 0;
    let score = 0;

    const questions = [
        {
            q: "당신이 가장 중요하게 생각하는 삶의 가치는 무엇인가요?",
            options: [
                { text: "사랑하는 사람들과 함께하는 소소한 행복", point: 1 },
                { text: "멈추지 않고 도전하며 나 자신을 증명하는 것", point: 4 },
                { text: "나만의 고독을 즐기며 세상의 이면을 관찰하는 것", point: 5 },
                { text: "걱정 없이 웃으며 현재를 즐겁게 사는 것", point: 2 }
            ]
        },
        {
            q: "예상치 못한 큰 시련이 닥쳤을 때, 당신의 대처 방식은?",
            options: [
                { text: "조용히 혼자만의 시간을 가지며 마음을 추스른다.", point: 3 },
                { text: "정면 돌파! 해결책을 찾을 때까지 끝까지 매달린다.", point: 4 },
                { text: "나만의 방식대로 세상의 불의에 저항하거나 침묵한다.", point: 5 },
                { text: "긍정적인 마음으로 툭툭 털어내고 기분 전환을 한다.", point: 2 }
            ]
        },
        {
            q: "당신이 꿈꾸는 완벽한 휴가는 어떤 모습인가요?",
            options: [
                { text: "밤거리를 정처 없이 달리며 느끼는 고독한 도시의 공기", point: 5 },
                { text: "배낭 하나 메고 떠나는 끝없는 오지 탐험", point: 2 },
                { text: "시골집 마루에 누워 낮잠 자는 평화로운 시간", point: 3 },
                { text: "사랑하는 사람들과 음악 틀고 즐기는 홈 파티", point: 1 }
            ]
        },
        {
            q: "당신을 가장 가슴 뛰게 만드는 순간은 언제인가요?",
            options: [
                { text: "오랫동안 정성을 들인 일이 결실을 맺었을 때", point: 4 },
                { text: "아무도 모르는 나만의 비밀스러운 취향을 발견했을 때", point: 3 },
                { text: "자신을 위해 강하고 단단해지고 있음을 느낄 때", point: 5 },
                { text: "사랑하는 사람에게 진심 어린 인정을 받았을 때", point: 1 }
            ]
        },
        {
            q: "훗날 사람들이 당신을 어떻게 기억해주길 바라나요?",
            options: [
                { text: "따뜻하고 다정해서 곁에 있으면 좋았던 사람", point: 1 },
                { text: "목표를 향해 무섭게 달려갔던 멋진 승부사", point: 4 },
                { text: "세상과 타협하지 않고 자신만의 정의를 지켰던 사람", point: 5 },
                { text: "매 순간 즐길 줄 알았던 유쾌한 에너지의 소유자", point: 2 }
            ]
        }
    ];

    const results = [
        { min: 5, max: 6, name: "다정한 일상의 기적\n[어바웃 타임]", img: "⏳🌿", desc: "매 순간을 특별하게 여기는 당신! 곁에 있는 사람의 소중함을 알고, 오늘이라는 선물을 가장 다정하게 사용하며 살아가는 따뜻한 주인공이군요." },
        { min: 7, max: 9, name: "함께하면 언제나 맑음\n[인턴]", img: "👔💼", desc: "겸손함과 지혜를 모두 갖춘 당신! 주변 사람들을 조화롭게 연결하며, 연륜과 긍정적인 태도로 모두에게 귀감이 되는 든든한 조력자 스타일입니다." },
        { min: 10, max: 12, name: "매일이 축제 같은 삶\n[맘마미아]", img: "💃🥂", desc: "인생은 즐겨야 제맛! 어떤 시련 앞에서도 노래하듯 유쾌함을 잃지 않는 당신은 모두에게 행복한 에너지를 전파하는 이 구역의 활기찬 주인공입니다." },
        { min: 13, max: 15, name: "꿈을 찾아 떠나는 모험\n[월터의 상상은 현실이 된다]", img: "🎒🏔️", desc: "상상만 하던 일을 마침내 실행에 옮기는 용기쟁이! 당신의 인생은 반복되는 지루한 일상을 깨고 더 넓은 세상으로 나아가는 도전적인 로드무비와 같습니다." },
        { min: 16, max: 18, name: "담백해서 더 아름다운\n[리틀 포레스트]", img: "🥗🏡", desc: "남들의 속도가 아닌 나만의 속도로 걷는 사람! 자극적이지 않아도 충분히 풍요로운 당신의 인생은 한 편의 평온하고 정갈한 다큐멘터리 같습니다." },
        { min: 19, max: 21, name: "지적인 예술가의 낭만\n[미드나잇 인 파리]", img: "🎨🌙", desc: "현실보다는 꿈속의 낭만을 사랑하는 로맨티스트군요! 자신만의 독창적인 감수성과 예술적 시각으로 세상을 아름답게 채워가는 영화 속 지식인 스타일입니다." },
        { min: 22, max: 23, name: "지독한 프로페셔널\n[악마는 프라다를 입는다]", img: "👠👠", desc: "세상의 기준보다 나 자신의 한계를 넘어설 때 짜릿함을 느끼는 분이군요! 지독한 열정과 완벽한 프로 정신으로 성공의 꼭대기를 향해 달려가는 승부사입니다." },
        { min: 24, max: 25, name: "고독한 도시의 관찰자\n[택시 드라이버]", img: "🚕🥃", desc: "세상과 일정한 거리를 두며 자신만의 정의를 응시하는 당신! 때로는 차갑고 고독해 보이지만, 그 누구보다 날카로운 통찰력과 단단한 자아를 가진 고고한 관찰자 스타일입니다." }
    ];

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function startTest() {
        shuffle(questions);
        questions.forEach(q => shuffle(q.options));
        document.getElementById('start-area').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        let percent = (currentQ / questions.length) * 100;
        document.getElementById('progress').style.width = percent + '%';
        document.getElementById('q-number').innerText = `Question ${currentQ + 1} / ${questions.length}`;
        let currentData = questions[currentQ];
        document.getElementById('question-text').innerText = currentData.q;
        let container = document.getElementById('options-container');
        container.innerHTML = "";
        currentData.options.forEach(opt => {
            let btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt.text;
            btn.onclick = () => nextQuestion(opt.point);
            container.appendChild(btn);
        });
    }

    function nextQuestion(point) {
        score += point;
        currentQ++;
        if (currentQ < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        
        let resultData = results.find(r => score >= r.min && score <= r.max);
        if(!resultData) resultData = results[results.length - 1];

        document.getElementById('res-image').innerText = resultData.img;
        document.getElementById('res-name').innerHTML = resultData.name.replace('\n', '<br>');
        document.getElementById('res-desc').innerHTML = resultData.desc;
    }
</script>
</body>
</html>
