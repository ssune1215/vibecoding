        "ESTJ": { worst: "INFP", name: "[뿌리 깊은 감성 빌런]\nINFP 빌런", img: "🥀💧", desc: "빠릿빠릿하게 일을 처리해야 하는데, 옆에서 감정에 취해 딴청 피우는 꼴을 못 견디게 만듭니다. 현실적인 조언을 해주면 '상처받았다'며 동굴로 숨어버리는 이들의 유리 멘탈은 당신의 인내심을 테스트할 것입니다." },
        "ESFJ": { worst: "INTP", name: "[사회성 결여된 분석가]\nINTP 빌런", img: "💻🌑", desc: "다 같이 어울려 잘 지내고 싶은 당신의 노력을 '비효율적인 감정 낭비'라며 무시하는 차가운 천재입니다. 기념일이나 사회적 에티켓에 무관심한 그들의 태도는 당신을 투명인간으로 만들 것입니다." },

        "ENTJ": { worst: "ISFP", name: "[게으른 평화주의자]\nISFP 빌런", img: "🛌🎈", desc: "목표를 향해 달려가야 하는데, 옆에서 '천하태평'하게 누워있는 모습을 보면 울화통이 치밀 것입니다. 계획 따위는 안중에도 없고 오직 자기 기분에 따라 움직이는 그들의 태도는 당신의 리더십을 파괴할 것입니다." }
    };

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function startTest() {
        shuffle(questionPool);
        selectedQuestions = questionPool.slice(0, 5); // 10개 중 5개 무작위 선택
        selectedQuestions.forEach(q => shuffle(q.options));
        document.getElementById('start-area').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        let percent = (currentQ / selectedQuestions.length) * 100;
        document.getElementById('progress').style.width = percent + '%';
        let currentData = selectedQuestions[currentQ];
        document.getElementById('q-number').innerText = `빌런 탐색 단계 ${currentQ + 1} / ${selectedQuestions.length}`;
        document.getElementById('question-text').innerText = currentData.q;
        let container = document.getElementById('options-container');
        container.innerHTML = "";
        currentData.options.forEach(opt => {
            let btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt.text;
            btn.onclick = () => nextQuestion(opt.points);
            container.appendChild(btn);
        });
    }

    function nextQuestion(points) {
        for (let key in points) {
            scores[key] += points[key];
        }
        currentQ++;
        if (currentQ < selectedQuestions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        
        let mbti = "";
        mbti += (scores.E >= scores.I) ? "E" : "I";
        mbti += (scores.S >= scores.N) ? "S" : "N";
        mbti += (scores.T >= scores.F) ? "T" : "F";
        mbti += (scores.J >= scores.P) ? "J" : "P";

        let resultData = resultsMapping[mbti];

        // 세련된 퍼플/골드 컨페티!
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#a29bfe', '#6c5ce7', '#ffffff', '#ffd700'] });

        document.getElementById('res-image').innerText = resultData.img;
        document.getElementById('res-name').innerHTML = resultData.name.replace('\n', '<br>');
        document.getElementById('res-desc').innerHTML = resultData.desc;
    }
</script>
