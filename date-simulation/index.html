<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>첫 데이트 시뮬레이션 | 나의 연애 매력은? 💘</title>
    
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="첫 데이트 시뮬레이션 | 나의 설레는 지수는?" />
    <meta property="og:description" content="첫 만남부터 애프터까지! 나의 선택으로 알아보는 연애 매력 유형 테스트" />
    <meta property="og:url" content="./" />
    <meta property="og:image" content="../assets/share-thumb.jpg" />

    <link rel="stylesheet" href="../assets/vibe-theme.css">
    <style>
        :root {
            --main-color: #f472b6; /* 핑크/로맨틱 */
            --bg-light: #fdf2f8;
            --border-color: #f9a8d4;
            --btn-hover-shadow: rgba(244, 114, 182, 0.2);
        }
    </style>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="../assets/kakao-share.js" defer></script>
</head>
<body>

<div class="card">
    <div id="start-area">
        <div class="result-image">💖☕</div>
        <h1 class="title">두근두근 설레는<br>첫 데이트 시뮬레이션</h1>
        <p class="description">당신의 선택으로 결정되는 첫 데이트의 운명!<br>총 8가지 매력 유형 중 당신은 어떤 연인일까요?</p>
        <button class="btn-start" onclick="startTest()">데이트 시작하기 🚀</button>
    </div>

    <div id="quiz-area" style="display: none;">
        <div class="progress-bar"><div class="progress" id="progress"></div></div>
        <div id="q-number" class="tiny" style="margin-bottom: 10px; font-weight:700;">Question 1 / 5</div>
        <div class="title" id="question-text" style="font-size: 19px; line-height: 1.4;">두근거리는 만남 중...</div>
        <div id="options-container"></div>
    </div>

    <div id="result-area" style="display: none;">
        <div class="tiny" style="font-weight: 700;">첫 데이트 시뮬레이션 분석 완료</div>
        <div id="res-image" class="result-image">🍭</div>
        <div id="res-name" class="result-title">결과 이름</div>
        
        <div class="result-box">
            <span class="result-box-title">💌 나의 연애 매력 리포트</span>
            <div id="res-desc" class="result-desc">결과 분석 내용이 여기에 표시됩니다.</div>
        </div>

        <div class="action-btns">
            <button class="btn-kakao">
                <img src="https://developers.kakao.com/assets/img/about/logos/kakaotalksharing/kakaotalk_sharing_btn_medium.png" width="20">
                내 결과 카톡 공유하기
            </button>
            <a href="https://blog.naver.com/forgiven_77/224198478277" target="_blank" class="btn-blog">
                👀 다른 테스트 구경 가기
            </a>
            <button class="btn-retry" onclick="location.reload()">🔄 다시 하기</button>
        </div>
    </div>
</div>

<script>
    let currentQ = 0;
    let score = 0;

    const questions = [
        {
            q: "약속 장소에 도착! 멀리서 상대방이 걸어오는걸 발견했을 때 당신의 행동은?",
            options: [
                { text: "환하게 웃으며 손을 흔들고 격하게 반긴다.", point: 4 },
                { text: "벌떡 일어나 마중 나가며 다정하게 안부를 묻는다.", point: 3 },
                { text: "눈이 마주칠 때까지 기다렸다가 수줍게 미소 짓는다.", point: 2 },
                { text: "여유로운 톤으로 자연스럽게 대화를 리드한다.", point: 1 }
            ]
        },
        {
            q: "식사 도중 상대방이 실수로 물을 쏟았습니다! 이때 당신의 반응은?",
            options: [
                { text: "빠르게 휴지를 챙겨주고 침착하게 상황을 수습한다.", point: 3 },
                { text: "위트 있는 농담으로 상대방의 민망함을 풀어준다.", point: 1 },
                { text: "묵묵히 도와준 뒤, 바로 다른 화제로 자연스럽게 넘긴다.", point: 2 },
                { text: "진심으로 걱정하며 다친 곳은 없는지 세심히 살핀다.", point: 4 }
            ]
        },
        {
            q: "대화 중 짧은 정적이 흘렀습니다. 이때 당신의 대처 방식은?",
            options: [
                { text: "주변 소재로 끊임없이 질문하며 대화를 풍성하게 만든다.", point: 1 },
                { text: "상대방의 취향을 깊게 알아볼 수 있는 진지한 질문을 던진다.", point: 2 },
                { text: "디저트나 다음 장소 이야기를 꺼내며 분위기를 환기한다.", point: 3 },
                { text: "눈을 빤히 바라보며 \"조용하니까 더 설레네요\"라고 한다.", point: 4 }
            ]
        },
        {
            q: "데이트가 끝나갈 무렵, 헤어지기 아쉬울 때 당신의 행동은?",
            options: [
                { text: "\"오늘 진짜 즐거웠어요. 조만간 또 보고 싶은데 어때요?\"", point: 4 },
                { text: "\"도착하면 꼭 톡 해줘요!\"라며 끝까지 상대방을 챙긴다.", point: 3 },
                { text: "아쉬운 표정을 숨기지 못한 채 여운 섞인 말을 남긴다.", point: 2 },
                { text: "재미있던 부분을 다시 언급하며 자연스럽게 다음 약속을 잡는다.", point: 1 }
            ]
        },
        {
            q: "집에 돌아가는 길, 당신이 보낼 첫 번째 애프터 카톡은?",
            options: [
                { text: "\"진심으로 오늘 최고였어요! 벌써 보고 싶네요.\"", point: 4 },
                { text: "\"오늘 바쁜데 시간 내줘서 고마워요. 덕분에 힐링했어요.\"", point: 3 },
                { text: "오늘 즐거웠던 사진을 보내며 귀여운 멘트를 남긴다.", point: 1 },
                { text: "\"오늘 어땠어요? 저는 정말 좋았는데...\" 하며 조심히 묻는다.", point: 2 }
            ]
        }
    ];

    const results = [
        { min: 5, max: 6, name: "여유로운 대화 마스터\n부드러운 카리스마 유혹가", img: "🗣️🍷", desc: "능숙한 대화법으로 어색함을 단숨에 녹이는 당신! 센스 넘치는 농담과 여유로운 태도로 상대방을 편안하게 매료시키는 타입입니다." },
        { min: 7, max: 8, name: "젠틀한 인싸 사원\n호감도 200% 매력 덩어리", img: "✨🕶️", desc: "누구에게나 호감을 사는 산뜻한 매력의 소유자군요! 적절한 완급 조절로 데이트의 분위기를 시종일관 밝게 유지하는 능력자입니다." },
        { min: 9, max: 10, name: "조용히 스며드는 여울\n가랑비에 옷 젖듯 빠져드는 매력", img: "🌙🛋️", desc: "많은 말보다는 깊이 있는 눈빛과 미소로 진심을 전하네요. 은근한 배려와 신비로운 분위기에 상대방은 당신에게 서서히 중독될 거예요." },
        { min: 11, max: 12, name: "수줍은 낭만 몽상가\n순수해서 더 사랑스러운 영혼", img: "🧚‍♀️💖", desc: "작은 행동 하나에도 진심이 묻어나는 예쁜 마음의 소유자입니다. 수줍어하면서도 최선을 다하는 당신의 모습이 상대에겐 큰 감동으로 다가갑니다." },
        { min: 13, max: 14, name: "섬세한 마음 가디언\n연인을 가장 먼저 생각하는 천사", img: "🤲🌿", desc: "상대방의 기분과 컨디션을 1순위로 챙기는 다정한 케어 테이커! 당신과 함께라면 그 누구라도 세상에서 가장 소중한 사람이 된 기분을 느낍니다." },
        { min: 15, max: 16, name: "듬직하고 따뜻한 안식처\n믿음직한 연애의 정석", img: "🏡🛡️", desc: "안정감 있는 태도로 상대방을 안심시키는 스타일입니다. 기댈 수 있는 든든함과 따뜻한 포용력이야말로 당신이 가진 최고의 무기입니다." },
        { min: 17, max: 18, name: "불꽃 같은 직진 로맨티스트\n거부할 수 없는 정열의 화신", img: "🔥💘", desc: "사랑 앞에서 계산은 없다! 솔직하고 뜨겁게 마음을 표현하는 당신의 모습은 상대방의 심장을 세차게 뛰게 만드는 힘이 있습니다." },
        { min: 19, max: 20, name: "운명적인 사랑의 불도저\n내일이 없는 뜨거운 사랑꾼", img: "🏃‍♂️💨", desc: "한 번 꽂히면 끝까지 가는 열정의 끝판왕! 거침없는 애정 표현과 넘치는 에너지로 지루한 일상을 순식간에 로맨틱 영화로 바꿔버립니다." }
    ];

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function startTest() {
        shuffle(questions);
        questions.forEach(q => shuffle(q.options));
        document.getElementById('start-area').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        let percent = (currentQ / questions.length) * 100;
        document.getElementById('progress').style.width = percent + '%';
        document.getElementById('q-number').innerText = `Question ${currentQ + 1} / ${questions.length}`;
        let currentData = questions[currentQ];
        document.getElementById('question-text').innerText = currentData.q;
        let container = document.getElementById('options-container');
        container.innerHTML = "";
        currentData.options.forEach(opt => {
            let btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt.text;
            btn.onclick = () => nextQuestion(opt.point);
            container.appendChild(btn);
        });
    }

    function nextQuestion(point) {
        score += point;
        currentQ++;
        if (currentQ < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        
        let resultData = results.find(r => score >= r.min && score <= r.max);
        if(!resultData) resultData = results[results.length - 1];

        document.getElementById('res-image').innerText = resultData.img;
        document.getElementById('res-name').innerHTML = resultData.name.replace('\n', '<br>');
        document.getElementById('res-desc').innerHTML = resultData.desc;
    }
</script>
</body>
</html>
