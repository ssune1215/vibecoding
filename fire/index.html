<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>🔥 연애할 때 나는 어떤 온도차 인간일까</title>

  <!-- Kakao SDK -->
  <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"
    integrity="sha384-8o2Q6wQv5x6f9mQb+7Wl0Xb9Q7mV1cG2d7r3mKcQ0m9vG5sP5m2pG0m2gQfQZK5C"
    crossorigin="anonymous"></script>

  <!-- confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

  <style>
    :root{
      --bg:#ffe6ef;           /* 파스텔 핑크 배경 */
      --card:#ffeff5;         /* 카드 바탕 */
      --stroke:#ffd0df;       /* 테두리 */
      --text:#2b2b2b;
      --muted:#6b6b6b;
      --shadow: 0 14px 30px rgba(0,0,0,.10);
      --radius: 22px;

      --btnYellow:#ffe04a;
      --btnBlue:#4a90ff;
      --btnRed:#ff4a6e;

      --accent:#ff5a92;
      --accent2:#ff87b2;
      --good:#18a957;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
      background: var(--bg);
      color: var(--text);
      display:flex;
      justify-content:center;
      padding:20px 12px 40px;
    }

    .wrap{
      width: 450px;
      max-width: 100%;
    }

    .card{
      background: var(--card);
      border: 1px solid var(--stroke);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px 16px 16px;
      position: relative;
      overflow:hidden;
    }

    .topBadge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      background: rgba(255,255,255,.65);
      border:1px solid rgba(255,255,255,.9);
      font-weight:700;
      font-size:13px;
      color:#ff2f79;
    }

    h1{
      margin: 14px 0 10px;
      font-size: 22px;
      line-height: 1.25;
      letter-spacing: -.2px;
    }

    .sub{
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 14px;
      white-space: pre-line;
    }

    .divider{
      height:1px;
      background: rgba(255, 100, 160, .18);
      margin: 14px 0;
    }

    .progressWrap{
      margin: 6px 0 12px;
    }
    .progressBar{
      width:100%;
      height: 10px;
      background: rgba(255,255,255,.75);
      border: 1px solid rgba(255,255,255,.95);
      border-radius:999px;
      overflow:hidden;
    }
    .progressFill{
      height:100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius:999px;
      transition: width .28s ease;
    }

    .qTitle{
      font-size: 17px;
      line-height: 1.45;
      letter-spacing: -.2px;
      margin: 8px 0 12px;
      font-weight: 800;
    }

    .choices{
      display:flex;
      flex-direction:column;
      gap: 10px;
      margin-top: 10px;
    }

    .btn{
      width:100%;
      border:0;
      padding: 14px 14px;
      border-radius: 16px;
      font-weight: 800;
      font-size: 14.5px;
      cursor:pointer;
      box-shadow: 0 10px 18px rgba(0,0,0,.08);
      transform: translateY(0);
      transition: transform .10s ease, box-shadow .10s ease, filter .10s ease;
      text-align:left;
      background: rgba(255,255,255,.85);
      border: 1px solid rgba(255,255,255,.95);
    }
    .btn:hover{ filter: brightness(.99); }
    .btn:active{
      transform: translateY(2px);
      box-shadow: 0 6px 12px rgba(0,0,0,.08);
    }

    .primary{
      background: linear-gradient(180deg, #fff, rgba(255,255,255,.78));
    }

    .cta{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-top: 14px;
    }

    .btnSolid{
      width:100%;
      border:0;
      padding: 14px 14px;
      border-radius: 16px;
      font-weight: 900;
      font-size: 14.5px;
      cursor:pointer;
      box-shadow: 0 12px 18px rgba(0,0,0,.10);
      transform: translateY(0);
      transition: transform .10s ease, box-shadow .10s ease, filter .10s ease;
      text-align:center;
      color:#111;
    }
    .btnSolid:active{
      transform: translateY(2px);
      box-shadow: 0 7px 12px rgba(0,0,0,.10);
    }
    .yellow{ background: var(--btnYellow); }
    .blue{ background: var(--btnBlue); color:#fff; }
    .red{ background: var(--btnRed); color:#fff; }

    .mini{
      font-size: 12.5px;
      color: var(--muted);
      line-height:1.5;
      margin-top: 12px;
    }

    /* Result */
    .hero{
      border-radius: 20px;
      padding: 16px 14px;
      background: rgba(255,255,255,.78);
      border: 1px solid rgba(255,255,255,.95);
    }

    .resultTag{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      background: rgba(255, 90, 146, .10);
      border: 1px solid rgba(255, 90, 146, .25);
      color: #ff2f79;
      font-weight: 900;
      font-size: 13px;
      margin-bottom: 10px;
    }

    .resultTitle{
      margin: 0 0 10px;
      font-size: 20px;
      font-weight: 1000;
      line-height:1.35;
      letter-spacing:-.2px;
    }

    .resultDesc{
      margin: 0;
      color: #3a3a3a;
      line-height: 1.6;
      font-size: 14px;
      white-space: pre-line;
    }

    .pillRow{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin: 12px 0 0;
    }
    .pill{
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.82);
      border: 1px solid rgba(255,255,255,.95);
      font-weight: 900;
      font-size: 12.5px;
      color:#ff2f79;
    }

    .tipBox{
      margin-top: 14px;
      border-radius: 18px;
      padding: 14px 14px;
      background: rgba(24,169,87,.10);
      border: 1px solid rgba(24,169,87,.18);
    }
    .tipTitle{
      font-weight: 1000;
      margin: 0 0 6px;
      color: var(--good);
      letter-spacing:-.2px;
    }
    .tipText{
      margin:0;
      color:#2f553c;
      line-height:1.6;
      font-size: 13.8px;
      white-space: pre-line;
    }

    .hidden{ display:none !important; }
    a{ text-decoration:none; }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <!-- START -->
      <section id="screenStart">
        <div class="topBadge">💗 vibe test</div>
        <h1>🔥 연애할 때 나는 어떤 온도차 인간일까</h1>
        <p class="sub">연애에서 ‘따뜻함’은 똑같지 않습니다.
누군가는 빠르게 달아오르고, 누군가는 천천히 데워져요.
지금 당신의 연애 온도를 확인해보세요. 🌡️</p>

        <div class="divider"></div>

        <button id="btnStart" class="btn btnSolid primary" style="text-align:center;background:linear-gradient(90deg,var(--accent),var(--accent2));color:#fff;">
          시작하기 💞
        </button>

        <p class="mini">※ 질문과 선택지는 매번 랜덤으로 섞여서 출제됩니다.</p>
      </section>

      <!-- QUIZ -->
      <section id="screenQuiz" class="hidden">
        <div class="progressWrap">
          <div class="progressBar"><div id="progressFill" class="progressFill"></div></div>
        </div>

        <div class="topBadge">📝 지금 당신의 온도는?</div>
        <div id="qTitle" class="qTitle"></div>

        <div id="choices" class="choices"></div>
      </section>

      <!-- RESULT -->
      <section id="screenResult" class="hidden">
        <div class="hero">
          <div id="resultTag" class="resultTag">🌡️ 연애 온도 리포트</div>
          <h2 id="resultTitle" class="resultTitle"></h2>
          <p id="resultDesc" class="resultDesc"></p>

          <div id="pillRow" class="pillRow"></div>

          <div class="tipBox">
            <p class="tipTitle">✅ TIP</p>
            <p id="tipText" class="tipText"></p>
          </div>
        </div>

        <div class="cta">
          <button id="btnKakao" class="btnSolid yellow">카톡 공유하기 💛</button>
          <a class="btnSolid blue" href="https://blog.naver.com/forgiven_77/224198478277" target="_blank" rel="noopener noreferrer">
            다른 테스트 해보기 💙
          </a>
          <button id="btnRestart" class="btnSolid red">테스트 다시하기 ❤️</button>
        </div>

        <!-- hidden Kakao default button target -->
        <button id="kakaoHidden" class="hidden"></button>
      </section>
    </div>
  </div>

  <script>
    /***********************
     * 0) 설정값만 바꾸면 됩니다
     ***********************/
    const CONFIG = {
      // 본인 카카오 JavaScript 키로 교체
      KAKAO_JS_KEY: "YOUR_KAKAO_JAVASCRIPT_KEY",

      // 공유 시 사용할 URL (배포 후 실제 주소로 교체)
      SHARE_URL: window.location.href,

      // 공유 썸네일 (원하시는 '같은 썸네일' URL로 고정해서 사용)
      THUMB_URL: "https://via.placeholder.com/800x420.png?text=LOVE+TEMP+TEST",

      // 공유 제목/설명
      SHARE_TITLE: "🔥 연애할 때 나는 어떤 온도차 인간일까?",
      SHARE_DESC: "내 연애 온도는 몇 도? 지금 바로 테스트해보기 💗"
    };

    /***********************
     * 1) 데이터
     * - 결과: 8개 (요청 범위 6~8 충족)
     * - 문항: 8개 (요청 범위 7~10 충족)
     * - 선택지: 항상 4개 고정
     * - 질문/선택지 모두 랜덤 (기본값)
     ***********************/
    const RESULTS = {
      HOT: {
        tag: "🔥 레벨: 불꽃",
        title: "🔥 직진 화염형",
        desc:
`좋아하면 숨기지 못하는 뜨거운 타입입니다.
표현이 빠르고, 애정도 ‘지금’ 바로 보여줘요.
상대가 반응만 해주면 온도가 더 올라갑니다.`,
        pills: ["직진", "표현력", "즉시반응"],
        tip:
`상대가 숨 쉴 공간을 조금만 남겨두면
‘열정’이 ‘부담’으로 오해받지 않습니다.
짧게 자주, 가볍게 확인해주는 방식이 잘 맞아요.`
      },
      WARM: {
        tag: "🌡️ 레벨: 따뜻",
        title: "🌡 천천히 데워지는 온돌형",
        desc:
`처음엔 차분하지만, 시간이 지날수록 깊게 따뜻해집니다.
한 번 마음이 열리면 오래 안정적으로 관계를 이어가요.
신뢰가 쌓일수록 온도가 올라가는 편입니다.`,
        pills: ["신뢰", "지속", "안정감"],
        tip:
`초반엔 “나도 좋아”를 작은 행동으로라도 보여주면
상대가 불안해하지 않습니다.
약속/리액션/표현 중 하나만 꾸준히 해도 충분합니다.`
      },
      COOL: {
        tag: "🧊 레벨: 쿨",
        title: "🧊 쿨한 현실형",
        desc:
`연애도 중요하지만, 내 생활 밸런스도 지키는 타입입니다.
감정에 휘둘리기보다 현실적인 기준을 먼저 생각해요.
상대 입장에선 ‘차분함’이 매력으로 느껴질 수 있습니다.`,
        pills: ["밸런스", "현실감", "자기관리"],
        tip:
`상대가 서운해하기 전에 ‘기준’을 미리 말해두면 좋습니다.
“나는 연락은 이런 편이야”처럼
룰을 공유하면 온도차가 훨씬 줄어듭니다.`
      },
      ICE: {
        tag: "❄️ 레벨: 방어",
        title: "❄ 얼음벽 방어형",
        desc:
`마음이 있어도 쉽게 티 내지 않는 타입입니다.
상대가 먼저 다가오면 천천히 반응하는 편이고,
연애 초반엔 온도차가 크게 느껴질 수 있어요.`,
        pills: ["신중", "방어", "관찰"],
        tip:
`표현이 어렵다면 ‘확인’부터 해보세요.
짧은 칭찬, 작은 약속 지키기 같은 행동이
벽을 부드럽게 만들어줍니다.`
      },
      SWING: {
        tag: "🎢 레벨: 변동",
        title: "🎢 롤러코스터형",
        desc:
`뜨거울 때는 세상에서 제일 뜨겁고,
어느 순간 혼자만의 시간이 필요해지는 타입입니다.
감정의 진폭이 커서 상대가 헷갈릴 수 있어요.`,
        pills: ["기복", "몰입", "회복시간"],
        tip:
`“지금 쉬고 싶어”를 ‘거리두기’가 아니라
‘회복’이라고 설명하면 오해가 줄어듭니다.
돌아오는 타이밍만 지켜도 관계가 안정됩니다.`
      },
      SOFT: {
        tag: "🫠 레벨: 순애",
        title: "🫠 녹아버리는 순애형",
        desc:
`좋아하는 사람 앞에서는 결국 다 져주는 타입입니다.
상대의 기분을 잘 읽고, 배려를 우선으로 둬요.
연애가 시작되면 빠르게 ‘정’이 깊어집니다.`,
        pills: ["배려", "헌신", "공감"],
        tip:
`배려가 과해지면 스스로가 지칩니다.
‘내 기준’ 1가지를 꼭 지키는 연습을 해보세요.
그래야 오래 예쁘게 따뜻해집니다.`
      },
      EXTREME: {
        tag: "🔥❄️ 레벨: 극단",
        title: "🔥❄ 온도차 극단형",
        desc:
`처음엔 차갑다가, 어느 순간 갑자기 다정해지는 타입입니다.
상대는 “나 싫어하는 줄” 착각했다가
“갑자기 왜 이렇게 좋아해?”라고 느낄 수 있어요.`,
        pills: ["반전", "확신", "폭발다정"],
        tip:
`초반에 ‘호감 신호’를 아주 작은 것이라도 남겨두세요.
메시지 한 줄, 약속 한 번이
상대의 불안을 확 줄여줍니다.`
      },
      CALM: {
        tag: "🌙 레벨: 잔잔",
        title: "🌙 잔잔한 안정형",
        desc:
`감정 기복이 적고, 관계를 오래 편안하게 끌고 가는 타입입니다.
큰 이벤트보다 일상의 안정감을 중요하게 생각해요.
상대에게는 ‘믿을 수 있음’이 가장 큰 매력입니다.`,
        pills: ["편안함", "꾸준함", "신뢰"],
        tip:
`가끔은 ‘확인 멘트’를 의도적으로 넣어주세요.
“오늘도 고마워” 같은 한 문장이
관계 온도를 은근히 올려줍니다.`
      }
    };

    // 점수 축(4축) → 최종 8결과로 매핑
    const AXES = ["hot", "warm", "cool", "swing"];

    // 문항(각 문항: choices 4개 고정)
    // 각 선택지는 axis 가중치 객체를 가짐
    const QUESTIONS_RAW = [
      {
        text: "연애 초반, 카톡 스타일은 어떤 편인가요?",
        choices: [
          { text: "보자마자 바로 답장하는 편이에요", w: { hot: 2, warm: 1 } },
          { text: "답장은 빠른데 텀을 조금 두기도 해요", w: { warm: 2 } },
          { text: "생각날 때 답장해도 문제 없다고 봐요", w: { cool: 2 } },
          { text: "답장 속도 자체를 크게 신경 안 써요", w: { cool: 2, swing: 1 } },
        ]
      },
      {
        text: "좋아하는 사람이 생기면 나는?",
        choices: [
          { text: "티가 나요. 숨기기 어려워요", w: { hot: 2 } },
          { text: "조금씩 표현하면서 분위기를 봐요", w: { warm: 2 } },
          { text: "먼저 티 내는 편은 아니에요", w: { cool: 1, ice: 1, warm: 1 } }, // ice는 매핑에만 사용(아래에서 처리)
          { text: "상대 반응 확인하고 움직여요", w: { warm: 1, cool: 1, swing: 1 } },
        ]
      },
      {
        text: "데이트 약속을 잡을 때 더 가까운 쪽은?",
        choices: [
          { text: "내가 먼저 잡고, 계획도 빠르게 세워요", w: { hot: 2 } },
          { text: "같이 정하고, 서로 맞춰가는 편이에요", w: { warm: 2 } },
          { text: "상대가 정하면 편하게 따라가요", w: { warm: 1, cool: 1 } },
          { text: "그때그때 컨디션 따라 유동적이에요", w: { swing: 2 } },
        ]
      },
      {
        text: "연인이 연락이 늦으면 나는?",
        choices: [
          { text: "이유가 궁금해요. 확인하고 싶어요", w: { hot: 2, swing: 1 } },
          { text: "살짝 신경 쓰이지만 참는 편이에요", w: { warm: 2 } },
          { text: "큰 의미를 두진 않아요", w: { cool: 2 } },
          { text: "나도 내 할 일 하다 보면 잊어요", w: { cool: 2, warm: 1 } },
        ]
      },
      {
        text: "애정 표현은 어떤 방식이 더 편한가요?",
        choices: [
          { text: "말로도 행동으로도 많이 하는 편이에요", w: { hot: 2 } },
          { text: "가끔 확실하게 해주는 편이에요", w: { warm: 2 } },
          { text: "말보단 행동으로 보여주는 편이에요", w: { warm: 1, cool: 1 } },
          { text: "표현은 적지만 마음은 깊어요", w: { cool: 2 } },
        ]
      },
      {
        text: "연애에서 가장 중요한 기준은?",
        choices: [
          { text: "감정의 밀도, 애정의 확인이에요", w: { hot: 2 } },
          { text: "신뢰가 쌓여야 오래 가요", w: { warm: 2 } },
          { text: "편안함이 없으면 오래 못 가요", w: { calm: 1, warm: 1, cool: 1 } }, // calm은 매핑에만 사용
          { text: "개인 시간이 지켜져야 해요", w: { cool: 2 } },
        ]
      },
      {
        text: "싸운 뒤, 나는 보통 이렇게 행동해요",
        choices: [
          { text: "바로 풀고 싶어서 먼저 다가가요", w: { hot: 2, warm: 1 } },
          { text: "조금 시간 두고 차분하게 대화해요", w: { warm: 2 } },
          { text: "먼저 연락하는 편은 아니에요", w: { cool: 2 } },
          { text: "그날 기분에 따라 달라져요", w: { swing: 2 } },
        ]
      },
      {
        text: "연애의 ‘온도’가 올라가는 순간은?",
        choices: [
          { text: "상대가 나를 좋아한다고 확실히 보여줄 때", w: { hot: 2, warm: 1 } },
          { text: "작은 약속이 계속 지켜질 때", w: { warm: 2, calm: 1 } },
          { text: "서로의 생활이 존중될 때", w: { cool: 2, calm: 1 } },
          { text: "갑자기 확 끌릴 때가 있어요", w: { swing: 2 } },
        ]
      }
    ];

    /***********************
     * 2) 유틸
     ***********************/
    function shuffle(arr){
      for(let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function deepClone(obj){
      return JSON.parse(JSON.stringify(obj));
    }

    function clamp(n, min, max){
      return Math.max(min, Math.min(max, n));
    }

    /***********************
     * 3) 상태
     ***********************/
    const state = {
      questions: [],
      idx: 0,
      score: { hot: 0, warm: 0, cool: 0, swing: 0 },
      flags: { ice: 0, calm: 0 } // 보조 플래그
    };

    /***********************
     * 4) DOM
     ***********************/
    const $start = document.getElementById("screenStart");
    const $quiz = document.getElementById("screenQuiz");
    const $result = document.getElementById("screenResult");

    const $btnStart = document.getElementById("btnStart");
    const $qTitle = document.getElementById("qTitle");
    const $choices = document.getElementById("choices");
    const $progressFill = document.getElementById("progressFill");

    const $resultTitle = document.getElementById("resultTitle");
    const $resultDesc = document.getElementById("resultDesc");
    const $pillRow = document.getElementById("pillRow");
    const $tipText = document.getElementById("tipText");

    const $btnKakao = document.getElementById("btnKakao");
    const $btnRestart = document.getElementById("btnRestart");

    /***********************
     * 5) 카카오 초기화
     ***********************/
    function initKakao(){
      if(!CONFIG.KAKAO_JS_KEY || CONFIG.KAKAO_JS_KEY === "YOUR_KAVAO_JAVASCRIPT_KEY" || CONFIG.KAKAO_JS_KEY === "YOUR_KAKAO_JAVASCRIPT_KEY"){
        // 키 미설정이어도 테스트는 돌아가도록 둡니다.
        return;
      }
      if(!Kakao.isInitialized()){
        Kakao.init(CONFIG.KAKAO_JS_KEY);
      }
    }

    function fireConfetti(){
      try{
        const duration = 900;
        const end = Date.now() + duration;
        (function frame(){
          confetti({
            particleCount: 5,
            spread: 65,
            startVelocity: 28,
            origin: { x: Math.random() * 0.2 + 0.4, y: 0.15 }
          });
          if(Date.now() < end) requestAnimationFrame(frame);
        })();
      }catch(e){}
    }

    /***********************
     * 6) 화면 전환
     ***********************/
    function showStart(){
      $start.classList.remove("hidden");
      $quiz.classList.add("hidden");
      $result.classList.add("hidden");
    }

    function showQuiz(){
      $start.classList.add("hidden");
      $quiz.classList.remove("hidden");
      $result.classList.add("hidden");
    }

    function showResult(){
      $start.classList.add("hidden");
      $quiz.classList.add("hidden");
      $result.classList.remove("hidden");
    }

    /***********************
     * 7) 퀴즈 준비 (질문/선택지 모두 랜덤)
     ***********************/
    function prepareQuiz(){
      // reset
      state.idx = 0;
      state.score = { hot: 0, warm: 0, cool: 0, swing: 0 };
      state.flags = { ice: 0, calm: 0 };

      // clone
      const cloned = deepClone(QUESTIONS_RAW);

      // 질문 순서 랜덤
      shuffle(cloned);

      // 선택지 순서 랜덤(각 문항마다)
      cloned.forEach(q => shuffle(q.choices));

      state.questions = cloned;
    }

    function renderQuestion(){
      const total = state.questions.length;
      const q = state.questions[state.idx];

      // progress (숫자/퍼센트 표기 없음)
      const pct = ((state.idx) / total) * 100;
      $progressFill.style.width = clamp(pct, 0, 100) + "%";

      $qTitle.textContent = q.text;

      $choices.innerHTML = "";
      q.choices.forEach((ch) => {
        const btn = document.createElement("button");
        btn.className = "btn";
        btn.type = "button";
        btn.textContent = ch.text;

        btn.addEventListener("click", () => {
          applyWeights(ch.w);
          nextStep();
        });

        $choices.appendChild(btn);
      });
    }

    function applyWeights(w){
      // 주축 점수
      if(w.hot) state.score.hot += w.hot;
      if(w.warm) state.score.warm += w.warm;
      if(w.cool) state.score.cool += w.cool;
      if(w.swing) state.score.swing += w.swing;

      // 보조 플래그(ICE/CALM 감지용)
      if(w.ice) state.flags.ice += w.ice;
      if(w.calm) state.flags.calm += w.calm;
    }

    function nextStep(){
      state.idx += 1;

      if(state.idx < state.questions.length){
        renderQuestion();
        return;
      }

      // 마지막 progress 100%
      $progressFill.style.width = "100%";

      renderResult();
      showResult();
      fireConfetti();
    }

    /***********************
     * 8) 결과 계산 (4축 + 플래그로 8결과 매핑)
     ***********************/
    function getTopAxis(){
      const entries = Object.entries(state.score); // [axis, score]
      entries.sort((a,b) => b[1] - a[1]);
      return entries; // 내림차순
    }

    function resolveResultKey(){
      const ranked = getTopAxis();
      const top = ranked[0][0];
      const second = ranked[1][0];
      const gap = ranked[0][1] - ranked[1][1];

      // 극단형: 1위와 2위가 비슷하고, hot/cool이 상위권으로 섞이면 온도차가 크게 느껴지는 타입
      const hotScore = state.score.hot;
      const coolScore = state.score.cool;

      const hotCoolHigh = (hotScore >= 5 && coolScore >= 5);
      if(hotCoolHigh || (gap <= 1 && ((top === "hot" && second === "cool") || (top === "cool" && second === "hot")))){
        return "EXTREME";
      }

      // 방어형(ICE): cool 성향이 높고, ice 플래그가 일정 이상
      if(state.score.cool >= 7 && state.flags.ice >= 1){
        return "ICE";
      }

      // 잔잔형(CALM): warm/cool이 안정적으로 높고 swing이 낮으면
      const calmLike = (state.flags.calm >= 1) && (state.score.swing <= 4) && (state.score.warm + state.score.cool >= 12);
      if(calmLike){
        return "CALM";
      }

      // 롤러코스터: swing가 가장 높거나 매우 높으면
      if(top === "swing" || state.score.swing >= 8){
        return "SWING";
      }

      // 순애: warm가 높고 hot도 어느 정도, cool 낮으면
      if(state.score.warm >= 8 && state.score.hot >= 4 && state.score.cool <= 5){
        return "SOFT";
      }

      // 기본 4축 매핑
      if(top === "hot") return "HOT";
      if(top === "warm") return "WARM";
      if(top === "cool") return "COOL";

      // fallback
      return "WARM";
    }

    function renderResult(){
      const key = resolveResultKey();
      const data = RESULTS[key];

      $resultTitle.textContent = data.title;
      $resultDesc.textContent = data.desc;
      $tipText.textContent = data.tip;

      $pillRow.innerHTML = "";
      data.pills.forEach(p => {
        const span = document.createElement("span");
        span.className = "pill";
        span.textContent = "#" + p;
        $pillRow.appendChild(span);
      });

      // 카카오 공유 설정(결과 반영)
      setupKakaoShare(key, data);
    }

    /***********************
     * 9) 카카오 공유
     * - 버튼 누르면 즉시 공유되게 구성
     ***********************/
    function setupKakaoShare(resultKey, data){
      initKakao();

      $btnKakao.onclick = () => {
        // 키가 없으면 안내만
        if(!CONFIG.KAKAO_JS_KEY || CONFIG.KAKAO_JS_KEY === "YOUR_KAKAO_JAVASCRIPT_KEY"){
          alert("카카오 공유를 사용하려면 CONFIG.KAKAO_JS_KEY를 본인 키로 교체해 주세요.");
          return;
        }

        const title = CONFIG.SHARE_TITLE;
        const desc = `${CONFIG.SHARE_DESC}\n\n내 결과: ${data.title}`;

        try{
          Kakao.Share.sendDefault({
            objectType: "feed",
            content: {
              title,
              description: desc,
              imageUrl: CONFIG.THUMB_URL,
              link: {
                mobileWebUrl: CONFIG.SHARE_URL,
                webUrl: CONFIG.SHARE_URL
              }
            },
            buttons: [
              {
                title: "나도 테스트하기",
                link: {
                  mobileWebUrl: CONFIG.SHARE_URL,
                  webUrl: CONFIG.SHARE_URL
                }
              }
            ]
          });
        }catch(e){
          alert("카카오 공유 설정을 확인해 주세요.\n(도메인 등록, 키 설정, SDK 초기화 등)");
        }
      };
    }

    /***********************
     * 10) 이벤트
     ***********************/
    $btnStart.addEventListener("click", () => {
      prepareQuiz();
      showQuiz();
      renderQuestion();
    });

    $btnRestart.addEventListener("click", () => {
      showStart();
      // 시작 화면으로 완전 리셋
      prepareQuiz(); // 다음 시작 시에도 랜덤 보장
      $progressFill.style.width = "0%";
    });

    // 첫 화면
    showStart();
    prepareQuiz();
  </script>
</body>
</html>
