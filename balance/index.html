<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>무인도 생존 심리 테스트 | 나만의 생존 전략은?</title>
    
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="무인도 생존 심리 테스트 | 나의 생존 등급은?" />
    <meta property="og:description" content="위급 상황에서 드러나는 당신의 진짜 본능! 무인도에서 당신은 살아남을 수 있을까요?" />
    <meta property="og:url" content="./" />
    <meta property="og:image" content="../assets/share-thumb.jpg" />

    <link rel="stylesheet" href="../assets/vibe-theme.css">
    <style>        shuffle(questions);
        questions.forEach(q => shuffle(q.options));

        :root {
            --main-color: #059669; /* 포레스트 그린 */
            --bg-light: #f0fdf4;
            --border-color: #dcfce7;
            --btn-hover-shadow: rgba(5, 150, 105, 0.2);
        }
    </style>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="../assets/kakao-share.js" defer></script>
</head>
<body>

<div class="card">
    <div id="start-area">
        <div class="result-image">🏝️🔥</div>
        <h1 class="title">무인도 생존<br>심리 테스트</h1>
        <p class="description">위급 상황에서 드러나는 당신의 진짜 본능!<br>무인도에서 당신은 살아남을 수 있을까요?</p>
        <button class="btn-start" onclick="startTest()">생존 테스트 시작 🚀</button>
    </div>

    <div id="quiz-area" style="display: none;">
        <div class="progress-bar"><div class="progress" id="progress"></div></div>
        <div id="q-number" class="tiny" style="margin-bottom: 10px; font-weight:700;">Question 1 / 5</div>
        <div class="title" id="question-text" style="font-size: 20px;">질문 불러오는 중...</div>
        <div id="options-container"></div>
    </div>

    <div id="result-area" style="display: none;">
        <div class="tiny" style="font-weight: 700;">나의 생존 본능 분석</div>
        <div id="res-image" class="result-image">✨</div>
        <div id="res-name" class="result-title">결과 이름</div>
        
        <div class="result-box">
            <span class="result-box-title">🔦 생존 전문가의 조언</span>
            <div id="res-desc" class="result-desc">결과 설명이 여기에 나옵니다.</div>
        </div>

        <div class="action-btns">
            <button class="btn-kakao">
                <img src="https://developers.kakao.com/assets/img/about/logos/kakaotalksharing/kakaotalk_sharing_btn_medium.png" width="20">
                내 생존 결과 공유하기
            </button>
            <a href="https://blog.naver.com/forgiven_77/224219719421" target="_blank" class="btn-blog">
                👀 다른 테스트 해보기
            </a>
            <button class="btn-retry" onclick="location.reload()">🔄 다시 테스트하기</button>
        </div>
    </div>
</div>

<script>
    let currentQ = 0;
    let score = { A: 0, B: 0 };

    const questions = [
        {
            q: "무인도에 떠내려온 당신, 가장 먼저 확보할 생존 필수템은?",
            options: [
                { text: "다용도 맥가이버 칼", type: 'A' },
                { text: "식량 확보를 위한 낚시 도구", type: 'B' },
                { text: "체온 유지와 신호를 위한 라이터", type: 'A' },
                { text: "부상 대비용 구급 상자", type: 'B' }
            ]
        },
        {
            q: "첫날 밤, 잠자리를 정해야 한다면 어디가 가장 안전할까?",
            options: [
                { text: "시야가 탁 트인 해변가", type: 'A' },
                { text: "비바람을 피할 수 있는 동굴", type: 'B' },
                { text: "나무 위에 지은 간이 쉼터", type: 'A' },
                { text: "덤불 속 은폐된 비밀 공간", type: 'B' }
            ]
        },
        {
            q: "숲속에서 정체 모를 짐승의 소리가 들린다. 당신의 행동은?",
            options: [
                { text: "횃불을 들고 소리 나는 곳을 확인한다", type: 'A' },
                { text: "숨죽이고 소리가 멀어질 때까지 기다린다", type: 'B' },
                { text: "함정을 설치하고 전투 준비를 한다", type: 'A' },
                { text: "가장 높은 나무 위로 올라가 살핀다", type: 'B' }
            ]
        },
        {
            q: "구조를 기다리며 가장 견디기 힘든 고통은 무엇일까요?",
            options: [
                { text: "끊임없는 배고픔과 목마름", type: 'A' },
                { text: "끝을 알 수 없는 지독한 고독감", type: 'B' },
                { text: "이름 모를 벌레와 눅눅한 습기", type: 'A' },
                { text: "언제 나타날지 모르는 맹수의 위협", type: 'B' }
            ]
        },
        {
            q: "저 멀리 구조 헬기가 보인다! 당신이 가장 먼저 취할 행동은?",
            options: [
                { text: "불을 피워 검은 연기 신호를 보낸다", type: 'A' },
                { text: "거울을 이용해 반사광 신호를 보낸다", type: 'B' },
                { text: "미친 듯이 소리를 지르며 뛰어간다", type: 'A' },
                { text: "해변에 쓴 SOS 글자를 더 크게 다듬는다", type: 'B' }
            ]
        }
    ];

    const results = {
        A: { 
            name: "불굴의 생존력!\n강인한 행동파 생존자", 
            img: "🐺", 
            desc: "당신은 위기 상황에서 주저하지 않고 몸을 던지는 강인한 생존 본능을 가졌습니다! 빠른 판단력과 행동력으로 어떤 험난한 환경도 정복할 수 있는 사람입니다. 리더십이 뛰어나 팀원들에게 큰 힘이 됩니다." 
        },
        B: { 
            name: "차분한 분석력!\n지혜로운 전략가 생존자", 
            img: "🦊", 
            desc: "당신은 무작정 움직이기보다 주변 환경을 분석하고 최선의 전략을 짜는 지혜로운 생존자입니다! 보이지 않는 위험까지 대비하는 당신의 신중함이 장기 생존의 열쇠가 됩니다. 지적이고 차분한 매력을 가졌군요." 
        }
    };

    
    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function startTest() {
        document.getElementById('start-area').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        let percent = (currentQ / questions.length) * 100;
        document.getElementById('progress').style.width = percent + '%';
        document.getElementById('q-number').innerText = `Question ${currentQ + 1} / ${questions.length}`;
        let currentData = questions[currentQ];
        document.getElementById('question-text').innerText = currentData.q;
        let container = document.getElementById('options-container');
        container.innerHTML = "";
        currentData.options.forEach(opt => {
            let btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt.text;
            btn.onclick = () => nextQuestion(opt.type);
            container.appendChild(btn);
        });
    }

    function nextQuestion(type) {
        score[type]++;
        currentQ++;
        if (currentQ < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        let finalType = score.A >= score.B ? 'A' : 'B';
        let resultData = results[finalType];
        document.getElementById('res-image').innerText = resultData.img;
        document.getElementById('res-name').innerHTML = resultData.name.replace('\n', '<br>');
        document.getElementById('res-desc').innerHTML = resultData.desc;
    }
</script>
</body>
</html>
