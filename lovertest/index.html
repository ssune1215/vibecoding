<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연애 성향 테스트 | 내 본능 스캐너</title>
    
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="내 집착과 바람기는 어느 정도일까? 연애 성향 테스트" />
    <meta property="og:description" content="현실 고증 200%, 과몰입 주의! 당신의 진짜 연애 본능을 스캔해드립니다." />
    <meta property="og:url" content="./" />
    <meta property="og:image" content="../assets/share-thumb.jpg" />

    <link rel="stylesheet" href="../assets/vibe-theme.css">
    <style>
        :root {
            --main-color: #6366f1; /* 인디고 */
            --bg-light: #eef2ff;
            --border-color: #e0e7ff;
            --btn-hover-shadow: rgba(99, 102, 241, 0.3);
        }
    </style>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="../assets/kakao-share.js" defer></script>
</head>
<body>

<div class="card">
    <div id="start-area">
        <div class="result-image">💘</div>
        <h1 class="title">내 집착과 바람기는<br>어느 정도일까? 👀</h1>
        <p class="description">현실 고증 200%, 과몰입 주의!<br>나의 진짜 연애 스타일을 진단해봐요.</p>
        <button class="btn-start" onclick="startTest()">진단 시작하기 🔍</button>
    </div>

    <div id="quiz-area" style="display: none;">
        <div class="progress-bar"><div class="progress" id="progress"></div></div>
        <div id="q-number" class="tiny" style="margin-bottom: 10px; font-weight:700;">Question 1 / 5</div>
        <div class="title" id="question-text" style="font-size: 20px;">질문 불러오는 중...</div>
        <div id="options-container"></div>
    </div>

    <div id="result-area" style="display: none;">
        <div class="tiny" style="font-weight: 700;">당신의 연애 성향 진찰 결과</div>
        <div id="res-image" class="result-image">❤️</div>
        <div id="res-name" class="result-title">결과 이름</div>
        
        <div class="result-box">
            <span class="result-box-title">🔎 정밀 진단 보고서</span>
            <div id="res-desc" class="result-desc">결과 설명이 여기에 나옵니다.</div>
        </div>

        <div class="action-btns">
            <button class="btn-kakao">
                <img src="https://developers.kakao.com/assets/img/about/logos/kakaotalksharing/kakaotalk_sharing_btn_medium.png" width="20">
                내 결과 카톡으로 전파하기
            </button>
            <a href="https://blog.naver.com/forgiven_77/224195220807" target="_blank" class="btn-blog">
                👀 다른 재미있는 테스트 구경가기
            </a>
            <button class="btn-retry" onclick="location.reload()">🔄 다시 테스트하기</button>
        </div>
    </div>
</div>

<script>
    let currentQ = 0;
    let score = { OBSESS: 0, FLIRT: 0, WALL: 0, SAINT: 0 };

    const questions = [
        { 
            q: "애인의 폰이 계속 울린다. 이름 없는 번호다. 나의 반응은?", 
            options: [
                { text: "'누구야?' 바로 캐묻고 폰을 본다", type: 'OBSESS' },
                { text: "'안 받아도 돼?' 하며 상대 반응을 본다", type: 'FLIRT' },
                { text: "신경 안 쓰고 딴청 피운다", type: 'WALL' },
                { text: "'누구 길래~' 장난치고 만다", type: 'SAINT' }
            ]
        },
        { 
            q: "술자리에서 매력적인 이성에게 번호를 따인다면?", 
            options: [
                { text: "절대 안 주거나 애인에게 바로 보고한다", type: 'OBSESS' },
                { text: "일단 주고 본다. 사람 일은 모르니까", type: 'FLIRT' },
                { text: "귀찮다. '저 애인 있어요' 하고 거절한다", type: 'WALL' },
                { text: "정중히 거절하지만 혼자 뿌듯해한다", type: 'SAINT' }
            ]
        },
        { 
            q: "애인이 나 몰래 친구들과 놀러 간 걸 들켰다.", 
            options: [
                { text: "바로 짐 싸서 쫓아간다", type: 'OBSESS' },
                { text: "'나도 자유네?' 바로 클럽 간다", type: 'FLIRT' },
                { text: "이성적으로 따지고 이별을 준비한다", type: 'WALL' },
                { text: "'재밌게 놀다 와~ 다음엔 말해줘'", type: 'SAINT' }
            ]
        },
        { 
            q: "이상적인 연애의 거리감은 어느 정도?", 
            options: [
                { text: "24시간 내내 일심동체!", type: 'OBSESS' },
                { text: "나 구속은 싫지만 상대는 나만 봐라", type: 'FLIRT' },
                { text: "각자 사생활 100% 존중", type: 'WALL' },
                { text: "믿음이 있다면 마음은 안 멀어진다", type: 'SAINT' }
            ]
        },
        { 
            q: "과거 연애사에 대한 나의 태도는?", 
            options: [
                { text: "카톡 다 뒤지고 인스타 염탐한다", type: 'OBSESS' },
                { text: "나도 예전 만났던 애 썰 푼다", type: 'FLIRT' },
                { text: "굳이 알고 싶지 않고 말 안 했으면 좋겠다", type: 'WALL' },
                { text: "묻어두고 앞으로가 중요하다", type: 'SAINT' }
            ]
        }
    ];

    const results = {
        OBSESS: { name: "CCTV급 맑눈광\n집착광공형", img: "👁️", desc: "사랑하는 만큼 상대를 다 알아야 직성이 풀리는 스타일! 당신의 사랑은 누구보다 무겁고 진실되지만, 가끔은 상대방을 숨 막히게 할 수도 있어요." },
        FLIRT: { name: "잡을 수 없는 매력\n자유영혼 바람둥이형", img: "🦋", desc: "선수 등장! 아슬아슬하게 선을 타며 스릴을 즐기는 본투비 플러팅 장인입니다. 매력적이지만 한곳에 정착하기엔 세상이 너무 넓네요." },
        WALL: { name: "나 홀로 평온한\n무심한 철벽왕형", img: "🧱", desc: "내 일상이 1순위인 독립적인 타입입니다. 애인이 바람을 피워도 '오케이 끝' 하고 돌아서는 냉철함을 가졌네요. 상대방은 서운할 수 있어요." },
        SAINT: { name: "모든 걸 초월한\n살아있는 보살형", img: "🙏", desc: "태평양 같은 마음의 소유자! 웬만한 잘못은 웃으며 넘깁니다. 당신의 헌신과 믿음에 상대방은 딴짓을 할 엄두도 못 낼 거예요." }
    };

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function startTest() {
        shuffle(questions);
        questions.forEach(q => shuffle(q.options));
        document.getElementById('start-area').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        let percent = (currentQ / questions.length) * 100;
        document.getElementById('progress').style.width = percent + '%';
        document.getElementById('q-number').innerText = `Question ${currentQ + 1} / ${questions.length}`;
        let currentData = questions[currentQ];
        document.getElementById('question-text').innerText = currentData.q;
        let container = document.getElementById('options-container');
        container.innerHTML = "";
        currentData.options.forEach(opt => {
            let btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt.text;
            btn.onclick = () => nextQuestion(opt.type);
            container.appendChild(btn);
        });
    }

    function nextQuestion(type) {
        score[type]++;
        currentQ++;
        if (currentQ < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        let maxVal = -1;
        let finalType = 'OBSESS';
        for (let k in score) {
            if (score[k] > maxVal) { maxVal = score[k]; finalType = k; }
        }
        let resultData = results[finalType];
        document.getElementById('res-image').innerText = resultData.img;
        document.getElementById('res-name').innerHTML = resultData.name.replace('\n', '<br>');
        document.getElementById('res-desc').innerHTML = resultData.desc;
    }
</script>
</body>
</html>
