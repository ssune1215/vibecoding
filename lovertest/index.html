<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lover Test | 나의 연애 집착도 & 플러팅 지수 💍</title>
    
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Lover Test | 나의 연애 스타일 분석" />
    <meta property="og:description" content="집착일까 사랑일까? 나의 연애 본능을 정밀하게 측정해드립니다." />
    <meta property="og:url" content="./" />
    <meta property="og:image" content="../assets/share-thumb.jpg" />

    <link rel="stylesheet" href="../assets/vibe-theme.css">
    <style>
        :root {
            --main-color: #4f46e5; /* 인디고 */
            --bg-light: #f5f3ff;
            --border-color: #ddd6fe;
            --btn-hover-shadow: rgba(79, 70, 229, 0.2);
        }
    </style>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="../assets/kakao-share.js" defer></script>
</head>
<body>

<div class="card">
    <div id="start-area">
        <div class="result-image">💍✨</div>
        <h1 class="title">나의 연애 본심<br>Lover Test</h1>
        <p class="description">친구에겐 말 못할 나의 은밀한 연애 습관!<br>당신은 어떤 연인일까요?</p>
        <button class="btn-start" onclick="startTest()">테스트 시작 🚀</button>
    </div>

    <div id="quiz-area" style="display: none;">
        <div class="progress-bar"><div class="progress" id="progress"></div></div>
        <div id="q-number" class="tiny" style="margin-bottom: 10px; font-weight:700;">Question 1 / 5</div>
        <div class="title" id="question-text" style="font-size: 19px; line-height: 1.5;">본심 분석 중...</div>
        <div id="options-container"></div>
    </div>

    <div id="result-area" style="display: none;">
        <div class="tiny" style="font-weight: 700;">Lover Test 최종 리포트</div>
        <div id="res-image" class="result-image">❤️</div>
        <div id="res-name" class="result-title">결과 이름</div>
        
        <div class="result-box">
            <span class="result-box-title">📊 연애 심리 정밀 분석</span>
            <div id="res-desc" class="result-desc">결과 분석 내용이 여기에 표시됩니다.</div>
        </div>

        <div class="action-btns">
            <button class="btn-kakao">
                <img src="https://developers.kakao.com/assets/img/about/logos/kakaotalksharing/kakaotalk_sharing_btn_medium.png" width="20">
                내 연애 결과 공유하기
            </button>
            <a href="https://blog.naver.com/forgiven_77/224198478277" target="_blank" class="btn-blog">
                👀 다른 테스트 구경가기
            </a>
            <button class="btn-retry" onclick="location.reload()">🔄 다시 테스트하기</button>
        </div>
    </div>
</div>

<script>
    let currentQ = 0;
    let score = 0;

    const questions = [
        {
            q: "사랑하는 연인의 핸드폰이 비밀번호 없이 식탁 위에 놓여있습니다. 마침 연인은 샤워 중인 절호의 상황! 당신의 본능은 어떻게 반응하나요?",
            options: [
                { text: "이게 웬 떡이야? 빛의 속도로 낚아채서 카톡과 사진첩을 샅샅이 검색한다.", point: 3 },
                { text: "궁금함이 폭발하지만 참는다... 대신 연인이 나오면 누구와 연락했는지 자연스럽게 떠본다.", point: 2 },
                { text: "전혀 관심 없다. 배터리가 없으면 충전해주고, 화면이 켜지면 조용히 뒤집어둔다.", point: 1 },
                { text: "연인의 프라이버시는 소중하다. 혹시 다른 사람이 볼까 봐 내 주머니에 살짝 넣어둔다(?)", point: 2 }
            ]
        },
        {
            q: "연인이 갑자기 오늘은 컨디션이 안 좋아서 약속을 취소하고 싶다고 합니다. 이때 당신의 머릿속을 스치는 첫 번째 생각은 무엇인가요?",
            options: [
                { text: "설마 다른 사람이라도 만나는 걸까? GPS를 확인하거나 집 근처를 배회하고 싶어진다.", point: 3 },
                { text: "많이 아픈가? 죽이라도 사다 줄까? 하지만 혹시나 하는 마음에 서운함이 몰려온다.", point: 2 },
                { text: "푹 쉬라고 말해주고, 다음에 더 재밌게 놀자며 쿨하게 넘어가려 노력한다.", point: 1 },
                { text: "오히려 좋아! 나도 집에서 게임할 시간이 생겼다며 내심 기뻐한다.", point: 0 }
            ]
        },
        {
            q: "연인이 과거 연애사에 대해 이야기할 때, 당신의 반응과 태도는 어떤가요?",
            options: [
                { text: "과거는 과거일 뿐! 쿨하게 들어주며 오히려 연애 팁을 전수받는다.", point: 1 },
                { text: "전 애인보다 내가 훨씬 낫다는 것을 증명하기 위해 끊임없이 비교하며 우월감을 느낀다.", point: 2 },
                { text: "말로는 괜찮다고 하지만 머릿속으론 그들의 다정한 모습을 상상하며 괴로워한다.", point: 3 },
                { text: "절대 듣고 싶지 않다. 과거 이야기를 꺼내는 순간 정색하며 대화를 차단한다.", point: 3 }
            ]
        },
        {
            q: "당신이 연인에게 가장 자주 듣는 말은 주로 어떤 내용인가요?",
            options: [
                { text: `"넌 왜 나한테 집착해? 적당히 좀 해!"`, point: 3 },
                { text: "넌 어쩜 그렇게 센스가 넘쳐? 역시 넌 내 마음을 너무 잘 알아!", point: 1 },
                { text: "넌 나 사랑하는 거 맞아? 왜 이렇게 표현이 없어? 좀 더 다가와 줘.", point: 0 },
                { text: "너랑 있으면 정말 편안해. 넌 나에게 가장 든든한 안식처야.", point: 1 }
            ]
        },
        {
            q: "당신에게 연애란 인생에서 어느 정도의 비중을 차지하나요?",
            options: [
                { text: "내 모든 삶의 중심! 연인이 없으면 하루도 단 1분도 견디기 힘들다.", point: 3 },
                { text: "삶의 큰 즐거움이지만, 나의 일과 꿈을 위해서라면 가끔은 뒤로 미룰 수 있다.", point: 1 },
                { text: "있으면 좋고 없으면 마는 것. 나 자신을 사랑하는 게 가장 먼저다.", point: 0 },
                { text: "연인과 하나가 되어 공동의 목표를 향해 나아가는 끈끈한 파트너십.", point: 2 }
            ]
        }
    ];

    const results = [
        { min: 0, max: 4, name: "얼음 왕국의 지배자\n감정 메마른 시크릿 고스트", img: "👻❄️", desc: "연애를 하고 있긴 한가요? 지나치게 이성적이고 독립적이라 연인이 외로움을 느낄 수 있어요. 사랑은 머리가 아니라 가슴으로 하는 것임을 잊지 마세요. 가끔은 뜨거운 표현으로 연인의 마음을 녹여줄 필요가 있습니다!" },
        { min: 5, max: 8, name: "현명한 로맨티스트\n황금 비중의 밸런스 마스터", img: "⚖️💎", desc: "집착과 방임 사이의 황금 밸런스를 찾은 당신! 적당한 질투로 연인을 설레게 하면서도, 서로의 사생활은 깔끔하게 존중해주는 연애의 정석이군요. 모든 연인이 꿈꾸는 가장 이상적인 파트너 타입입니다!" },
        { min: 9, max: 12, name: "사랑의 감옥 간수\n아슬아슬한 소유욕 대마왕", img: "⛓️❤️", desc: "사랑이라는 이름으로 연인을 꽁꽁 묶어두려 하고 있진 않나요? 당신의 넘치는 관심이 가끔은 상대방의 숨통을 조일 수 있어요. 조금만 더 연인을 믿고 내려놓는 연습이 필요합니다. 사랑은 소유가 아니라 공유니까요!" },
        { min: 13, max: 15, name: "지옥의 끝까지 쫓아가는\n치명적 집착의 화신", img: "👹🩸", desc: "축하(?)합니다! 당신의 사전엔 '쿨함'이란 단어는 없군요. 연인의 일거수일투족을 알아야 직성이 풀리는 진정한 프로 집착러입니다. 당신의 강렬한 사랑은 상대방을 미치게 만들거나, 혹은 정말 미치게 할 수도 있습니다. 조금만 진정하세요!" }
    ];

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function startTest() {
        shuffle(questions);
        questions.forEach(q => shuffle(q.options));
        document.getElementById('start-area').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        let percent = (currentQ / questions.length) * 100;
        document.getElementById('progress').style.width = percent + '%';
        document.getElementById('q-number').innerText = `Question ${currentQ + 1} / ${questions.length}`;
        let currentData = questions[currentQ];
        document.getElementById('question-text').innerText = currentData.q;
        let container = document.getElementById('options-container');
        container.innerHTML = "";
        currentData.options.forEach(opt => {
            let btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt.text;
            btn.onclick = () => nextQuestion(opt.point);
            container.appendChild(btn);
        });
    }

    function nextQuestion(point) {
        score += point;
        currentQ++;
        if (currentQ < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        let resultData = results.find(r => score >= r.min && score <= r.max);
        if(!resultData) resultData = results[0];
        document.getElementById('res-image').innerText = resultData.img;
        document.getElementById('res-name').innerHTML = resultData.name.replace('\n', '<br>');
        document.getElementById('res-desc').innerHTML = resultData.desc;
    }
</script>
</body>
</html>
